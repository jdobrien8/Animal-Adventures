 with almost no expenditure of energy. Goodnight, soaring golden eagles. 🌙", "secretary_bird": "§1§ walked with the particular dignity of a bird that had decided bipedal locomotion was not beneath it. He covered the African grassland in long unhurried strides, his feathered crest trailing behind him like a loose collection of quill pens, his red-orange face scanning the grass ahead with the focused attention of a very experienced hunter who knew exactly what he was looking for. Goodnight, stomping secretary birds. 🌙", "saiga": "The steppe was enormous. Not just large — enormous in the specific way that flat open spaces with no trees and no hills became enormous, where the sky took up more of the world than the ground, where distance was measured in how far you could see and you could see for ever. §1§ moved through it in the herd's flowing formation, his extraordinary nose working the air with each stride. Goodnight, migrating saigas. 🌙", "ibex": "The cliff face was essentially vertical — granite, smooth in sections, rough with lichen and small ledges in others — and §1§ moved up it at a pace that made no physiological sense. His hooves, split into two independent toes, spread on contact with each ledge, the hard outer rim gripping the rock face while the soft inner pad moulded to whatever texture it found. Goodnight, sure-footed ibex. 🌙", "chamois": "The first snow had come to the high peaks, and the chamois responded in a way that most animals couldn't — they moved upward. Not down toward the valley's warmth and food, but higher, onto the wind-scoured ridges where the snow was thinnest and the dry grass was still accessible beneath it. Goodnight, agile chamois. 🌙", "alpine_marmot": "The marmot colony had been in this section of the alpine meadow for at least forty years — the same tunnel systems, extended and repaired each spring, the same lookout rocks, the same boundary with the neighbouring colony three hundred metres to the east. The individuals changed; the colony endured. Goodnight, sleeping marmots. 🌙", "pika": "The rockslide that formed the pika's territory had been deposited by a glacier twelve thousand years ago — a tumble of boulders ranging from the size of a fist to the size of a house, piled in a slope of controlled chaos that created exactly the kind of three-dimensional, temperature-stable, predator-difficult environment that pikas had been using for millions of years. Goodnight, hardworking pikas. 🌙", "mountain_goat": "There were places on this mountain that nothing else went. Not wolves, not cougars, not bears — the terrain was simply too extreme, the ledges too narrow, the drops too absolute. These places belonged to the mountain goats, and §1§ moved through them with the matter-of-fact ease of an animal that had never in its life been afraid of falling. His hooves were the key. Goodnight, fearless mountain goats. 🌙", "lammergeier": "§1§ dropped the bone from forty metres. He had been carrying it for twenty minutes — a femur from a chamois, the largest marrow-containing bone available after the wolves had finished their meal the previous evening. He had found it at dawn, assessed it, picked it up in his talons, and begun the systematic process that separated the lammergeier from every other vulture on Earth. Goodnight, bone-crushing lammergeiers. 🌙", "mangrove_snake": "The mangrove canopy at midnight was a world of thin branches and filtered moonlight, the roots below vanishing into black water, the air warm and heavy with salt and mud. §1§ moved through the upper branches with a speed and certainty that seemed impossible for an animal with no limbs — flowing from branch to branch, his slender body finding every hold, his cat-slit eyes gathering the faint ligh Goodnight, golden-ringed cat snakes. 🌙", "plains_zebra": "The Kenyan grassland at dusk was turning from gold to amber to the deep copper of late evening, the tall grass rippling in the warm wind off the plains, and through it the dazzle of two hundred zebras moved north in loose formation. §1§ was in the middle of the herd — not from timidity but from statistics. Goodnight, beautiful plains zebras. 🌙", "hawk_eagle": "The mountain ridge caught the first thermal of the morning and §1§ was already on it — rising in slow spirals above the pine forest that cloaked the lower slopes, his long crest streaming back in the cold alpine wind. Goodnight, fierce hawk-eagles. 🌙", "american_lobster": "The rocky seafloor at sixty feet was a maze of ledges and crevices, kelp fronds moving in the cold current, and in the deepest overhang at the base of the largest boulder, §1§ backed himself in with his massive crusher claw facing the entrance. Goodnight, armoured lobsters. 🌙", "blue_crab": "The Chesapeake Bay estuary at night was a world of salt and mud and extraordinary abundance, the water warm and green, the bottom a mosaic of oyster reefs and seagrass beds and sandy channels. §1§ moved through it in the way that set blue crabs apart from almost every other crab on Earth: he swam, his rear paddle-legs — flattened into broad oars — beating in a figure-eight that drove him through Goodnight, swimming blue crabs. 🌙", "harbor_seal": "The rocky skerry two miles offshore was home to forty harbour seals, and at low tide they were all on it — their round dark shapes pressed together on the exposed granite, their breath steaming in the cold morning air. Goodnight, round-eyed seals. 🌙", "puffin": "The burrow was three feet into the cliff-top turf — a tunnel dug into the soft soil above the Atlantic, its entrance marked by the worn grass and the faint fish-smell of a burrow that had been used for eleven years. Goodnight, colourful puffins. 🌙", "sea_otter": "§1§ woke floating on his back in the kelp forest, the canopy of kelp blades around him rising and falling gently in the Pacific swell. He had slept holding a strand of kelp to keep from drifting — the anchor technique that sea otters used when they rested alone. Goodnight, tool-using sea otters. 🌙", "oystercatcher": "The tide was going out and §1§ was following it — walking along the tideline as it retreated, the wet rocks appearing beneath it, the mussels and limpets and cockles that made up his world becoming accessible as the water fell. Goodnight, piping oystercatchers. 🌙", "trex": "The Late Cretaceous floodplain was a world that no human eye would ever see — vast and green and hot, the air thick with humidity, the plants enormous and strange, the ground vibrating faintly with the movement of animals that dwarfed anything alive today. §1§ moved through it at the top of the food chain, and every other animal on this landscape knew it. Goodnight, terrible T. rex. 🌙", "mosasaurus": "The Cretaceous sea was warm and shallow and full of life in a density that the modern ocean couldn't match — ammonites the size of car tyres spiralling through the water column, giant sea turtles gliding over the reef, schools of Xiphactinus fish twelve feet long and built for speed. And moving through all of it, the apex predator of this entire ocean, came §1§. Goodnight, ancient sea monster. 🌙", "giganotosaurus": "The Patagonian floodplain ninety-eight million years ago was dominated by the largest animals that ever walked the Earth — the titanosaur sauropods, some of them over a hundred feet long and weighing eighty tonnes, moving across the landscape like slow living mountains. Goodnight, giant hunters. 🌙", "pterodactyl": "The Late Jurassic lagoon was a turquoise mirror in the morning light — shallow, warm, rimmed by limestone cliffs and dense cycad forest. §1§ launched from his cliff ledge with a single push of his enormous elongated fourth finger — that wing membrane stretching from fingertip to ankle — and was immediately airborne, riding the thermal that built against the cliff face every morning as the sun wa Goodnight, ancient fliers. 🌙", "triceratops": "The Late Cretaceous forest was dense with flowering plants — the angiosperms had exploded across the planet in the past twenty million years, filling every ecological niche, providing food for the enormous herds of hadrosaurids and ceratopsians that grazed the floodplains. Goodnight, three-horned giants. 🌙", "raptor": "The Mongolian desert seventy-five million years ago was not entirely desert — it was more variable than that, a landscape of dunes and scrubland and dry river channels and occasional lush valleys where water collected. Goodnight, feathered raptors. 🌙"}};
const {categories:C,animals:A,stories:S}=D;
let st={pg:"home",cat:null,ak:null,n1:"Sunny",n2:"Luna",chunks:[],idx:0,typed:"",typing:false,tm:null};
function gc(k){return C.find(c=>c.key===k)}
function ga(c){return Object.entries(A).filter(([,a])=>a.category===c).map(([k,a])=>({key:k,...a}))}
function story(k,n1,n2){return(S[k]||"Goodnight 🌙").replace(/§1§/g,n1).replace(/§2§/g,n2)}
function chunks(t){const s=[];let c="";for(let i=0;i<t.length;i++){c+=t[i];if(".!?".includes(t[i])&&c.trim().length>20){s.push(c.trim());c="";}}if(c.trim())s.push(c.trim());if(!s.length)return[t];const n=Math.min(5,s.length);const z=Math.ceil(s.length/n);const o=[];for(let i=0;i<s.length;i+=z)o.push(s.slice(i,i+z).join(" "));return o;}
function set(p){Object.assign(st,p);draw();}
window.home=()=>set({pg:"home",cat:null,ak:null});
window.cat=(k)=>set({pg:"cat",cat:k});
window.info=(k)=>set({pg:"info",ak:k});
window.begin=()=>{const n1=document.getElementById("n1").value||"Sunny";const n2=document.getElementById("n2").value||"Luna";const ch=chunks(story(st.ak,n1,n2));set({pg:"story",n1,n2,chunks:ch,idx:0,typed:"",typing:false});setTimeout(()=>type(0),30);};
window.skip=()=>{clearInterval(st.tm);state_typed(st.chunks[st.idx]||"");st.typing=false;st.tm=null;doBtns();};
window.next=()=>type(st.idx+1);
window.again=()=>type(0);
function state_typed(t){st.typed=t;const el=document.getElementById("tt");if(el)el.textContent=t;}
function type(i){clearInterval(st.tm);st.idx=i;st.typed="";st.typing=true;draw();setTimeout(()=>{const t=st.chunks[i]||"";let j=0;st.tm=setInterval(()=>{j++;st.typed=t.slice(0,j);const el=document.getElementById("tt");if(el)el.textContent=st.typed;if(j>=t.length){clearInterval(st.tm);st.tm=null;st.typing=false;doBtns();}},20);},30);}
function doBtns(){const el=document.getElementById("sb");if(!el)return;const ac=A[st.ak].accent;const done=!st.typing&&st.idx===st.chunks.length-1;if(st.typing)el.innerHTML=b("Skip →","skip()",ac);else if(done)el.innerHTML="<div style='text-align:center;font-size:20px;margin-bottom:10px'>🌙 Sweet dreams!</div>"+b("Read Again","again()",ac)+b("Choose Another","home()",ac);else el.innerHTML=b("Continue →","next()",ac);}
function b(t,oc,c){return`<button onclick="${oc}" style="width:100%;display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,${c}33,${c}55);border:1px solid ${c}77">${t}</button>`;}
function draw(){
  const el=document.getElementById("a");
  const {pg,cat,ak}=st;
  const ci=cat?gc(cat):null;
  const an=ak?{key:ak,...A[ak]}:null;
  const bg=an?an.bg:ci?ci.bg:"#010b14";
  document.body.style.background=bg;
  if(pg==="home"){
    el.innerHTML=`<div class="s"><div style="text-align:center;padding:24px 0 18px"><div style="font-size:48px">🌙</div><h1 style="font-size:20px;margin:8px 0 4px">Bedtime Animal Adventures</h1><p style="color:rgba(255,255,255,.45);font-size:13px">Choose a habitat</p></div><div class="g3">${C.map(c=>`<button onclick="cat('${c.key}')" style="background:linear-gradient(135deg,${c.color}0a,${c.color}20);border:1px solid ${c.color}44;border-radius:12px;padding:10px 4px;text-align:center"><div style="font-size:22px">${c.emoji}</div><div style="font-size:9px;color:${c.color};font-weight:bold;margin-top:3px;line-height:1.2">${c.label}</div><div style="font-size:8px;color:rgba(255,255,255,.3);margin-top:2px">${ga(c.key).length}</div></button>`).join("")}</div></div>`;
    return;
  }
  if(pg==="cat"&&ci){
    el.innerHTML=`<div class="s"><button onclick="home()" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button><div style="text-align:center;margin-bottom:18px"><div style="font-size:38px">${ci.emoji}</div><h2 style="color:${ci.color};margin:6px 0">${ci.label}</h2></div><div class="g2">${ga(cat).map(a=>`<button onclick="info('${a.key}')" style="background:linear-gradient(135deg,${a.accent}0a,${a.accent}20);border:1px solid ${a.accent}44;border-radius:12px;padding:14px 8px;text-align:center"><div style="font-size:30px">${a.emoji}</div><div style="font-size:12px;color:${a.accent};font-weight:bold;margin-top:5px">${a.name}</div></button>`).join("")}</div></div>`;
    return;
  }
  if(pg==="info"&&an){
    const ac=an.accent;
    el.innerHTML=`<div class="s"><button onclick="cat('${ci.key}')" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button>
    <a href="https://www.google.com/search?q=${encodeURIComponent(an.name+' wildlife')}&tbm=isch" target="_blank" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;border-radius:14px;margin-bottom:14px;text-decoration:none;background:linear-gradient(135deg,${an.bg},${ac}22);border:1px solid ${ac}55">
      <div style="font-size:72px">${an.emoji}</div><div style="font-size:14px;color:${ac};font-weight:bold;margin-top:8px">${an.name}</div><div style="font-size:11px;color:${ac};opacity:.6;margin-top:4px">📷 tap for photos</div></a>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px;margin-bottom:10px">
      <div style="font-size:10px;color:${ac};font-weight:bold;margin-bottom:8px;text-transform:uppercase">Amazing Facts</div>
      ${an.facts.map(f=>`<div style="font-size:13px;color:rgba(255,255,255,.8);padding:3px 0">${f}</div>`).join("")}
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px;margin-bottom:14px">
      <div style="font-size:10px;color:${ac};font-weight:bold;margin-bottom:8px;text-transform:uppercase">Name Your Adventurers</div>
      <div class="g2">
        <input id="n1" placeholder="First (boy)" value="${st.n1}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
        <input id="n2" placeholder="Second (girl)" value="${st.n2}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
      </div>
    </div>
    <button onclick="begin()" style="width:100%;background:linear-gradient(135deg,${ac}33,${ac}55);border:1px solid ${ac}77;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:bold">✨ Begin the Adventure</button>
    </div>`;
    return;
  }
  if(pg==="story"&&an){
    const ac=an.accent;
    const pct=((st.idx+(st.typing?.5:1))/st.chunks.length)*100;
    el.innerHTML=`<div class="s"><button onclick="info('${an.key}')" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:30px">${an.emoji}</div>
      <div style="background:rgba(255,255,255,.1);border-radius:99px;height:5px;margin:8px 0;overflow:hidden"><div style="height:100%;background:${ac};width:${pct}%;border-radius:99px"></div></div>
      <div style="font-size:10px;color:rgba(255,255,255,.35)">${st.idx+1} / ${st.chunks.length}</div>
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}33;border-radius:14px;padding:16px;min-height:150px;margin-bottom:14px;line-height:1.8">
      <span id="tt" style="color:rgba(255,255,255,.9);font-size:15px">${st.typed}</span>${st.typing?'<span style="opacity:.4">▋</span>':''}
    </div>
    <div id="sb"></div></div>`;
    doBtns();
    return;
  }
}
draw();
</script></body></html>
