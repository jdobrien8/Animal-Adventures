 horse.\n\nGoodnight, banded sea snakes. 🌙", "bat": "As the last purple blush of sunset faded from the sky and the first stars pricked through, §N1§ and §N2§ dropped from the rafter of the old barn — not falling, but unfolding, their wings spreading in one smooth motion that converted gravity into flight. In the half-second it took to clear the barn door, they were already hunting. Their world was built entirely from sound. Every few milliseconds, §N1§ produced a burst of ultrasonic clicks — so high-pitched that human ears couldn't detect them — that expanded outward through the warm evening air and returned as echoes. From those echoes he built a complete, three-dimensional picture of the world around him: the distance and size and texture of every object, the speed and direction of every moving thing. A moth's wing, eight metres away in the dark.\n\nGoodnight, swift bats. 🌙", "slow_loris": "The rainforest at midnight was a cathedral of sound and darkness — the continuous insect chorus, the occasional call of a nightjar, the drip of moisture from the canopy above through layer after layer of leaves until it reached the forest floor. And through the middle canopy, moving with a slowness that seemed almost theatrical, came §N1§. Slow lorises were not slow because they were inefficient. They were slow because slowness was their strategy: a technique for moving through the forest so quietly, so gradually, so without the vibration and disturbance that triggered the alarm responses of insects and lizards and small creatures, that prey animals simply did not register their approach until the moment the loris's hand closed around them. In the nighttime canopy, patience and stealth were worth more than speed.\n\nGoodnight, patient lorises. 🌙", "tawny_owl": "The oak wood in autumn was a completely different place by night. The paths that walkers used, the familiar shapes of trees visible in daylight — all of that was gone now, replaced by something richer and stranger: a world of sound and shadow and the specific scents of damp leaves and fox and the cold river nearby. §N1§ sat on a low branch at the wood's edge and listened to all of it simultaneously. Tawny owls were absolute masters of their acoustic world. The disc-shaped arrangement of feathers around their face worked exactly like a satellite dish — gathering sound from a wide area and channeling it to their ears.\n\nGoodnight, wise tawny owls. 🌙", "tokay_gecko": "The old temple wall was warm — it had absorbed the day's tropical sun and was releasing it slowly into the night air — and §N1§ moved across its surface with a confident ease that ignored entirely the fact that he was travelling upside down along the overhanging section of the eaves. His toes gripped the smooth painted plaster through a force that had nothing to do with claw or suction: each toe was covered with millions of microscopic hair-like structures called setae, each one splitting at its tip into hundreds of even smaller spatulas, and the combined van der Waals forces between all those tiny tips and any solid surface was enough to support many times his weight. He could walk on glass. He could walk on a mirror. In theory, he could walk on a ceiling in a vacuum. §N1§ paused and called: TOK-KAY.\n\nGoodnight, sticky-footed geckos. 🌙", "opossum": "The suburbs were §N1§'s territory — a landscape of garden fences and compost heaps and birdfeeders and drainage ditches and the occasional raccoon to navigate around, all of it rich with the specific urban abundance that made cities and towns, for an adaptable omnivore, a more reliable food source than any forest. He moved through it with a confidence that came from three years of learning exactly where everything was. He was, by any objective assessment, not a glamorous animal. His fur was coarse and greyish-white, his face pale and rat-like, his tail long and naked and prehensile. When frightened, he fell over and went rigid and produced a smell of death that was not theatrical but physiological — an involuntary paralysis triggered by fear, accompanied by the real biochemical smell of a stressed animal, good enough that most predators lost interest. Playing possum was not acting.\n\nGoodnight, underrated opossums. 🌙", "skunk": "§N1§ walked through the meadow at midnight with the specific unhurried confidence of an animal that had essentially nothing to be afraid of. His striking black-and-white pattern wasn't camouflage — it was the opposite of camouflage. It was an advertisement, as clear and deliberate as a warning sign: I am a skunk. You know what that means. Act accordingly. And animals did act accordingly. Foxes gave his a wide berth. Coyotes, who had been sprayed before and remembered it with the specific clarity that very unpleasant experiences produce, chose different routes. Even raccoons, generally bold, tended to find something interesting to investigate in the other direction when §N1§ was moving through an area.\n\nGoodnight, bold skunks. 🌙", "orangutan": "The dipterocarp rainforest of Borneo at dusk was a world of diminishing light and enormous trees — trunks four feet across rising sixty feet to the first branch, the canopy above so dense that the last of the evening sky was visible only in occasional patches. §N1§ moved through this upper world with the unhurried authority of an animal that had spent its entire fifty-two-year life a hundred feet above the ground and found it entirely satisfactory. He was large — a fully adult female, perhaps eighty pounds, his orange-red fur thick and long, his arm span six feet from fingertip to fingertip. Those arms were the key to his world: longer than his legs, extraordinarily strong, evolved for a lifetime of swinging and climbing and hanging, and capable of supporting his weight in positions that would have left any human muscle shrieking in protest.\n\nGoodnight, wise orangutans. 🌙", "clouded_leopard": "The forest at night was three-dimensional in a way that ground-level hunters never quite grasped: the world did not end at the canopy but continued upward through it, each layer its own community of animals, its own opportunities, its own dangers. §N1§ moved through all of it — vertically as easily as horizontally, his body adapted for the trees in ways that no other big cat had matched. His canine teeth were extraordinary: proportionally longer relative to his skull than those of any living cat, recalling the sabre-toothed cats of the Pleistocene, each one a curved ivory blade that he used to deliver the killing bite to prey much larger than himself. His paws were unusually large for his body size, spreading wide to grip bark.\n\nGoodnight, secret clouded leopards. 🌙", "sun_bear": "§N1§ smelled the bees from half a kilometre away — that specific warm-wax-and-honey smell that, in the experience of any sun bear, meant that something very good was about to happen. He oriented himself carefully, confirmed the direction, and began to move toward it with the focused purposefulness of an animal that had learned exactly how good honey was and was prepared to invest significant effort in acquiring it. He was the smallest bear on Earth — about the size of a large dog, but dense with muscle, his legs powerful and his curved claws designed for climbing and digging and tearing open whatever needed to be torn. His fur was short and sleek for the tropical heat, the distinctive pale chest patch that was unique to his visible against the dark forest floor as he moved. First — the king cobra.\n\nGoodnight, honey-loving sun bears. 🌙", "binturong": "The binturong smelled of popcorn. Not metaphorically — not in the way that things occasionally smell faintly of other things — but genuinely, strongly, unmistakably of buttered popcorn, the specific smell produced by a chemical compound in its urine that also appeared in popcorn during the heating process. §N1§ moved through the night canopy trailing this extraordinary scent, marking his route along the branches for any other binturong that came after him. He was extraordinary-looking: a large animal, thirty pounds and four feet long including his thick prehensile tail, covered in coarse black fur, his face broad and slightly bearish with long white whiskers, his eyes reflecting the moonlight with a faint red glow.\n\nGoodnight, popcorn-scented binturongs. 🌙", "tapir": "The slow river through the Malay forest was warm and dark and exactly the right temperature, and §N1§ was in it. He had been in it for twenty minutes, moving slowly through the shallows and occasionally going fully submerged, his flexible nose held up like a snorkel, breathing through it while his body was underwater. For a tapir, water was safety — from tigers, from clouded leopards, from the heat of the tropical day — and he had learned the specific bends and pools of this river over five years of nightly visits. His nose was the most useful thing about him: a short flexible trunk, almost prehensile, able to reach and grasp and strip leaves from branches with a precision that his otherwise blunt face couldn't manage.\n\nGoodnight, ancient tapirs. 🌙", "hornbill": "§N1§ called at dawn and the sound rolled across the Borneo forest canopy like something amplified through a megaphone — that extraordinary resonant whooping, produced through the casque on top of his beak, the hollow bony structure that amplified the sound in ways that ornithologists were still trying to fully understand. The call said: I am here. This is my territory. These are my figs. Rhinoceros hornbills were among the most spectacular birds in the world — and they were also, in the specific ecology of the Southeast Asian forest, among the most important. They swallowed figs whole and flew considerable distances before excreting the seeds, dispersing them far beyond the parent tree.\n\nGoodnight, magnificent hornbills. 🌙", "ring_tailed_lemur": "The morning ritual began precisely as the sun cleared the eastern trees, sending long gold shafts through the spiny forest. §N1§ turned to face the warmth — arms spread wide, palms open toward the light, his distinctive black-and-white tail curled around his feet — and held the posture of a small animal conducting a ceremony of profound gratitude toward the sun. The whole group followed, thirty ring-tailed lemurs in a line along the exposed rocks, warming themselves in that characteristic posture that had been the first thing every wildlife filmmaker who came to Madagascar learned to film. They weren't being mystical, though the posture suggested it. They were simply efficient: a lemur's dark belly skin absorbed solar radiation faster than the rest of its coat, and the spread-arm posture maximised the surface area presented to the sun.\n\nGoodnight, sun-worshipping lemurs. 🌙", "fossa": "The fossa was Madagascar's apex predator, and it looked like something evolution had built by committee — cat-like head, mongoose-like body, long tail like a civet, semi-retractable claws like a cat, ankle joints that rotated backward like a squirrel's. It was related to none of these things. It was a fossa, from a lineage that had been isolated on Madagascar for twenty million years, evolving into the island's dominant carnivore by its own specific logic. §N1§ moved through the eastern rainforest at night, reading the darkness with eyes that gathered light as efficiently as any cat's. The lemurs were his main prey — he had been following the ring-tailed troop for two days, learning their feeding routes, identifying the individuals that fed at the troop's periphery where warning from the group came later. First — the boa.\n\nGoodnight, unique fossas. 🌙", "chameleon": "The panther chameleon's colours at dawn were extraordinary — a cascade of reds and oranges and electric blues shifting across §N1§'s body as the morning light increased, each colour communicating something specific to any other panther chameleon that happened to be watching. This was the great misconception about chameleons: people thought they changed colour to match their surroundings, for camouflage. They did not. They changed colour to communicate: mood, health, dominance, receptiveness. The background-matching was secondary, almost coincidental. Right now §N1§'s colours said: I am a healthy adult female, in good condition, not currently alarmed, feeding. The background behind his was green. He matched it, but that was not the point.\n\nGoodnight, colourful chameleons. 🌙", "aye_aye": "The aye-aye was one of the strangest animals on Earth, and it moved through the Madagascar rainforest at night with the specific quality of strangeness — those huge ears rotating to catch sound, those enormous lamp-like orange eyes gathering the last light, and that extraordinary elongated middle finger tapping, tapping, tapping on the bark of every dead branch it passed. §N1§ was searching for grubs. The tapping was echolocation of a kind — percussive echolocation, the knocking transmitted through the wood and the returning sound carrying information about what lay inside. Hollow here: no grub. Solid here: no grub. And here — the sound changed slightly, the return carried a different quality, the resonance of a small air pocket surrounding something — here: grub.\n\nGoodnight, extraordinary aye-ayes. 🌙", "tenrec": "The leaf litter of the Madagascar rainforest was a universe in miniature — damp and rich with the smell of decomposing vegetation, full of earthworms and beetle larvae and centipedes and all the invertebrate life that made the forest floor its home. Through this universe, §N1§ moved with the purposeful efficiency of an animal whose entire world was measured in inches rather than miles. He was small — perhaps three inches long, covered in alternating yellow and black spines and coarse fur, looking somewhat like a small hedgehog that had been designed by someone who had never quite seen a hedgehog but had been given a description. He was not a hedgehog. He was not related to a hedgehog. He was a tenrec, from a lineage that had come to Madagascar on a raft of vegetation millions of years ago, evolved in isolation into something entirely its own.\n\nGoodnight, unique tenrecs. 🌙", "tomato_frog": "§N1§ was the colour of a ripe tomato. Not approximately, not metaphorically — he was the exact vivid orange-red of a supermarket tomato at its peak, a colour so saturated and deliberate that it looked almost painted. This was intentional. Every predator in northern Madagascar that had tried to eat a tomato frog had learned the same lesson: that vivid colour meant something unpleasant was coming. The something unpleasant was a thick white gum secreted from skin glands throughout his body when he was grabbed — a substance that got into a predator's eyes and mouth and glued its eyelids shut and made its tongue stick to its palate, causing no permanent harm but creating a profoundly discouraging experience that the predator did not repeat. He had deployed it twice in his life. Both times, what had been reaching for his had then spent several minutes trying to wipe its face.\n\nGoodnight, vivid tomato frogs. 🌙", "bison": "The Great Plains stretched to every horizon — not the flat emptiness people imagined, but a rolling landscape of deep grass that moved in waves like a slow green ocean, the grass itself alive with insects and meadowlarks and the particular smell of warm earth and wildflowers that was the smell of the American prairie in summer. And moving across it, shaking the ground with each footfall, came the herd. §N1§ was twelve years old, a large bull in his prime, his massive head swinging low as he walked. His hump rose eighteen inches above his shoulders, muscle over vertebrae built for the powerful head-swinging that would serve him during the rut. His coat was chocolate-brown, thick and matted, still carrying the dust of his morning wallow.\n\nGoodnight, thundering bison. 🌙", "pronghorn": "Nothing else on the North American prairie moved like a pronghorn. §N1§ ran at fifty-five miles an hour across the shortgrass flats, not fleeing anything specific but simply running — those extraordinary legs moving in the long reaching stride that burned distance like nothing else on the continent, his white rump patch flared and flashing a warning to the rest of the band spread across the plain behind him. His speed was a mystery in a specific way. There was nothing on the North American prairie today that could catch a healthy adult pronghorn at full speed. Coyotes could not. Wolves could not. Mountain lions could not.\n\nGoodnight, swift pronghorns. 🌙", "prairie_dog": "The prairie dog town stretched for two miles in every direction from §N1§'s burrow entrance — a complex of connected tunnels, listening chambers, sleeping rooms and escape routes built by his family group over four generations. The entrance mound — a raised rim of packed earth that kept floodwater out and provided a standing platform for scanning — was warm from the afternoon sun when he emerged, and he stood on it in the classic prairie dog posture: upright, forepaws to chest, nose reading the wind. His alarm vocabulary was something researchers had spent decades trying to understand. When a hawk circled overhead, he produced a specific call that described not just hawk but the hawk's size, colour, and speed of approach. When a coyote trotted along the town's edge, a different call described its shape, direction and distance.\n\nGoodnight, watchful prairie dogs. 🌙", "golden_eagle": "The thermal above the ridge was a column of rising warm air that §N1§ had used every clear afternoon for the three years he had hunted this valley, a reliable invisible elevator that carried him from ridge height to three thousand feet above the grassland with almost no expenditure of energy. He locked his wings in a shallow dihedral and rose in slow spirals, reading the valley below with eyes that were, by some measures, more powerful than a telescope. A golden eagle's eye contained two foveas — high-resolution zones — versus the human's one. Its visual acuity was perhaps eight times that of a human, meaning that what appeared as a vague shape to human vision at a hundred metres was, to §N1§, as sharp and detailed as something viewed from ten metres. The rabbit moving through the grass below was not a blur at this altitude.\n\nGoodnight, soaring golden eagles. 🌙", "secretary_bird": "§N1§ walked with the particular dignity of a bird that had decided bipedal locomotion was not beneath it. He covered the African grassland in long unhurried strides, his feathered crest trailing behind him like a loose collection of quill pens, his red-orange face scanning the grass ahead with the focused attention of a very experienced hunter who knew exactly what he was looking for. Secretary birds were raptors that had decided the air was optional. They could fly — their seven-foot wingspan was impressive and their soaring was elegant — but they hunted on foot, and they were so good at it that walking twenty miles per day had become their primary hunting strategy. The grassland that other raptors scanned from above, the secretary bird walked through, and what it found there were things with scales and venom that other animals carefully avoided.\n\nGoodnight, stomping secretary birds. 🌙", "saiga": "The steppe was enormous. Not just large — enormous in the specific way that flat open spaces with no trees and no hills became enormous, where the sky took up more of the world than the ground, where distance was measured in how far you could see and you could see for ever. §N1§ moved through it in the herd's flowing formation, his extraordinary nose working the air with each stride. The saiga nose was one of evolution's most striking designs: a bulbous, drooping, inflatable structure that hung over the upper lip and looked, honestly, impractical. It was not impractical. In summer, the mucous membranes inside it filtered the clouds of dust that the herd's thousands of hooves kicked up, preventing the animals from inhaling the particulates that would have shredded their lungs during the migration.\n\nGoodnight, migrating saigas. 🌙", "ibex": "The cliff face was essentially vertical — granite, smooth in sections, rough with lichen and small ledges in others — and §N1§ moved up it at a pace that made no physiological sense. His hooves, split into two independent toes, spread on contact with each ledge, the hard outer rim gripping the rock face while the soft inner pad moulded to whatever texture it found. He had been climbing this cliff since he was two months old. The movement was as natural to him as walking on flat ground was to a sheep. At the top, the world was extraordinary: the entire Alpine valley spread below in the long afternoon light, the glacier at its head glinting white, the lower slopes dark with pine, the meadows above the treeline a vivid green interrupted by rock outcrops and snowfields.\n\nGoodnight, sure-footed ibex. 🌙", "chamois": "The first snow had come to the high peaks, and the chamois responded in a way that most animals couldn't — they moved upward. Not down toward the valley's warmth and food, but higher, onto the wind-scoured ridges where the snow was thinnest and the dry grass was still accessible beneath it. This was their specific advantage: the hooves that gripped ice as well as rock, the coat that shed wind and retained warmth, and the centuries of learned knowledge about which ridges stayed passable longest into winter. §N1§ picked his route along a traverse line he had used for four years — a path worn faintly into the rock by generations of chamois before him, invisible to any other eye but obvious to his. His pace was unhurried but continuous, covering altitude with an economy of movement that made hard terrain look easy. Behind him, the lower slopes were already disappearing into cloud.\n\nGoodnight, agile chamois. 🌙", "alpine_marmot": "The marmot colony had been in this section of the alpine meadow for at least forty years — the same tunnel systems, extended and repaired each spring, the same lookout rocks, the same boundary with the neighbouring colony three hundred metres to the east. The individuals changed; the colony endured. §N1§ emerged from the main burrow entrance at the same time every morning — an hour after sunrise, when the air had warmed enough to be comfortable and the night's predators had generally retreated. He stood upright on his haunches on top of the lookout rock and checked the sky in three seconds flat: no eagle silhouettes, no large dark shapes circling. He checked the meadow slopes: no movement that resolved itself into a fox or a stoat. He made a short, soft call — all clear — and the rest of the colony emerged. Summer was about to become winter.\n\nGoodnight, sleeping marmots. 🌙", "pika": "The rockslide that formed the pika's territory had been deposited by a glacier twelve thousand years ago — a tumble of boulders ranging from the size of a fist to the size of a house, piled in a slope of controlled chaos that created exactly the kind of three-dimensional, temperature-stable, predator-difficult environment that pikas had been using for millions of years. §N1§ knew every passage through it: every tunnel between boulders wide enough for a pika and too narrow for a weasel, every sunning rock, every approach to the alpine meadow above. He was cutting hay.\n\nGoodnight, hardworking pikas. 🌙", "mountain_goat": "There were places on this mountain that nothing else went. Not wolves, not cougars, not bears — the terrain was simply too extreme, the ledges too narrow, the drops too absolute. These places belonged to the mountain goats, and §N1§ moved through them with the matter-of-fact ease of an animal that had never in its life been afraid of falling. His hooves were the key. Each hoof split into two independent toes that spread on contact, the hard outer rim of keratin gripping any surface irregularity while the rough, textured inner pad acted like a climbing shoe's sticky rubber. On a two-inch ledge three thousand feet above the valley floor, his contact area was perhaps eight square inches spread across four feet — but that eight square inches gripped with mechanical certainty that no fall could overcome without the goat actively choosing to step off. First — the cougar.\n\nGoodnight, fearless mountain goats. 🌙", "lammergeier": "§N1§ dropped the bone from forty metres. He had been carrying it for twenty minutes — a femur from a chamois, the largest marrow-containing bone available after the wolves had finished their meal the previous evening. He had found it at dawn, assessed it, picked it up in his talons, and begun the systematic process that separated the lammergeier from every other vulture on Earth. The bone fell and hit the flat rock below — an ossuary, the traditional smashing surface this lammergeier family had used for generations, pale and smooth from a thousand impacts — with a crack that was audible from several hundred metres. He dropped from the sky, folded, and checked the result. Not quite. He picked it up and climbed again. The lammergeier's diet was ninety-five percent bone marrow. Not meat. Not the soft tissue that other scavengers competed over. Bone.\n\nGoodnight, bone-crushing lammergeiers. 🌙", "mangrove_snake": "The mangrove canopy at midnight was a world of thin branches and filtered moonlight, the roots below vanishing into black water, the air warm and heavy with salt and mud. §N1§ moved through the upper branches with a speed and certainty that seemed impossible for an animal with no limbs — flowing from branch to branch, his slender body finding every hold, his cat-slit eyes gathering the faint light into a picture of his world in vivid detail. He was a gold-ringed cat snake, and the mangrove canopy was his entire kingdom. His scales were striking even in the dark: deep brown crossed with pale gold rings that caught the moonlight as he moved, a pattern that broke up his outline against the dappled bark. Those vertical pupils — wide open now, the slit expanded to a near-circle in the low light — tracked every movement in the branches ahead. A gecko on the stem three metres away.\n\nGoodnight, golden-ringed cat snakes. 🌙", "plains_zebra": "The Kenyan grassland at dusk was turning from gold to amber to the deep copper of late evening, the tall grass rippling in the warm wind off the plains, and through it the dazzle of two hundred zebras moved north in loose formation. §N1§ was in the middle of the herd — not from timidity but from statistics. The middle was where the stripes overlapped and merged with the stripes of the animals beside and behind, where the visual confusion was maximum, where a lion selecting a target from outside the herd faced the problem the stripes had evolved to create. §N2§ was twenty metres to his left, her foal — born six weeks ago and already running with the herd at full speed — pressed against her flank. The foal's stripes were slightly different from its mother's, as every zebra's were from every other's, the pattern unique as a fingerprint.\n\nGoodnight, beautiful plains zebras. 🌙", "hawk_eagle": "The mountain ridge caught the first thermal of the morning and §N1§ was already on it — rising in slow spirals above the pine forest that cloaked the lower slopes, his long crest streaming back in the cold alpine wind. From a distance he looked like a golden eagle, but where the golden eagle soared above open ground, §N1§ preferred the forest edge — that specific zone where the alpine meadow met the dense trees, where pheasants fed at dawn and hares moved between cover. His hunting style was closer to a giant sparrowhawk than to an open-country eagle, built for speed and manoeuvrability through dense timber at full flying speed. Below him, a Japanese serow — that goat-antelope of the mountain forest — moved along the cliff path. Not prey: too large and too alert. §N1§ logged its position and continued his spiral.\n\nGoodnight, fierce hawk-eagles. 🌙", "american_lobster": "The rocky seafloor at sixty feet was a maze of ledges and crevices, kelp fronds moving in the cold current, and in the deepest overhang at the base of the largest boulder, §N1§ backed himself in with his massive crusher claw facing the entrance. This was his den — the same crack in the granite he had occupied for three years, large enough for his two-foot body and small enough to make approach from the front difficult for anything that wanted to try. He had moulted last month and his new shell had hardened well. He was ready for whatever the night brought. He was old, which in lobster terms meant large. Lobsters grew their whole lives, and §N1§ had been growing for nearly forty years, each moult adding mass that the previous shell had constrained. The largest lobsters ever recorded were forty-four pounds.\n\nGoodnight, armoured lobsters. 🌙", "blue_crab": "The Chesapeake Bay estuary at night was a world of salt and mud and extraordinary abundance, the water warm and green, the bottom a mosaic of oyster reefs and seagrass beds and sandy channels. §N1§ moved through it in the way that set blue crabs apart from almost every other crab on Earth: he swam, his rear paddle-legs — flattened into broad oars — beating in a figure-eight that drove him through the water column with an efficiency that crabs who could only walk looked at with incomprehension. He was hunting the night shift. The oyster reef was his first destination. His claws — one larger, one smaller, each one a different tool — worked the oyster bed methodically, the larger crushing claw finding the precise point on the oyster shell where applied force opened it with minimum effort.\n\nGoodnight, swimming blue crabs. 🌙", "harbor_seal": "The rocky skerry two miles offshore was home to forty harbour seals, and at low tide they were all on it — their round dark shapes pressed together on the exposed granite, their breath steaming in the cold morning air. §N1§ was among them, his spotted grey coat catching the watery November light, his large dark eyes tracking the horizon with the automatic vigilance of an animal that was simultaneously very good at resting and very good at not being surprised. He slid into the water before the others. The sea at forty-eight degrees Fahrenheit was cold by human standards and entirely comfortable by his — the thick layer of blubble beneath his skin and the dense waterproof fur over it maintained his core temperature regardless of what the ocean did.\n\nGoodnight, round-eyed seals. 🌙", "puffin": "The burrow was three feet into the cliff-top turf — a tunnel dug into the soft soil above the Atlantic, its entrance marked by the worn grass and the faint fish-smell of a burrow that had been used for eleven years. §N1§ had returned to it six weeks ago after spending the winter on the open ocean, hundreds of miles from land, riding the swells and diving for fish in the grey Atlantic without ever touching shore. Every spring he came back to the same burrow, and §N2§ was always here before him. He launched from the cliff edge in the morning and the Atlantic seized him — that cold, salt-thick air, the waves below, the whole horizon empty of anything but water and sky. His wings beat four hundred times per minute, carrying him low over the water surface in the direct purposeful flight that puffins used for everything: no soaring, no gliding, just that rapid wingbeat from A to B.\n\nGoodnight, colourful puffins. 🌙", "sea_otter": "§N1§ woke floating on his back in the kelp forest, the canopy of kelp blades around him rising and falling gently in the Pacific swell. He had slept holding a strand of kelp to keep from drifting — the anchor technique that sea otters used when they rested alone. When he woke he released the kelp, rolled upright, and immediately began grooming — that critical maintenance, working air into his fur with rapid paw movements, restoring the insulating layer that was his only protection from the cold Pacific. A sea otter's fur had to be perfect to work. He spent thirty minutes on it every morning. The sea urchin problem needed solving. The kelp forest he lived in was healthy because the otter population kept the urchins in check — but on the far side of the reef, where otters were absent, the urchins had eaten the kelp down to bare rock.\n\nGoodnight, tool-using sea otters. 🌙", "oystercatcher": "The tide was going out and §N1§ was following it — walking along the tideline as it retreated, the wet rocks appearing beneath it, the mussels and limpets and cockles that made up his world becoming accessible as the water fell. He was an oystercatcher, his vivid orange-red bill a specialised chisel that had been opening shellfish for twenty-two years on this stretch of coast, and he knew every productive mussel bed from the high-tide line to the subtidal zone. The great black-backed gull was following him. That enormous gull — the largest in the world, its wingspan six feet, its bill powerful enough to tear open small seabirds — sometimes followed oystercatchers to steal their opened shellfish. §N1§ had dealt with this particular gull before.\n\nGoodnight, piping oystercatchers. 🌙", "trex": "The Late Cretaceous floodplain was a world that no human eye would ever see — vast and green and hot, the air thick with humidity, the plants enormous and strange, the ground vibrating faintly with the movement of animals that dwarfed anything alive today. §N1§ moved through it at the top of the food chain, and every other animal on this landscape knew it. He was forty feet long and weighed eight tonnes, and he moved with the specific unhurried confidence of an animal that had nothing to fear except another of his own kind. His tiny arms — powerful despite their size, each capable of curling two hundred kilograms — were folded against his chest. His massive head swung slightly as he walked, those enormous nostrils pulling in the chemical information of the floodplain in long deliberate draws. A hadrosaur herd: three miles north, moving west. A Triceratops: closer, perhaps a mile east.\n\nGoodnight, terrible T. rex. 🌙", "mosasaurus": "The Cretaceous sea was warm and shallow and full of life in a density that the modern ocean couldn't match — ammonites the size of car tyres spiralling through the water column, giant sea turtles gliding over the reef, schools of Xiphactinus fish twelve feet long and built for speed. And moving through all of it, the apex predator of this entire ocean, came §N1§. He was fifty feet of muscle and scale and two sets of teeth — the outer row in the jaw for gripping, the inner row on the roof of the mouth for working prey backward toward the throat once caught. His tail was vertical, like a fish, and drove his through the water with powerful sweeping strokes. He had evolved from a land lizard relatively recently, in geological terms, and he still had the lizard's basic body plan — but enlarged, streamlined, adapted over millions of years for open water hunting.\n\nGoodnight, ancient sea monster. 🌙", "giganotosaurus": "The Patagonian floodplain ninety-eight million years ago was dominated by the largest animals that ever walked the Earth — the titanosaur sauropods, some of them over a hundred feet long and weighing eighty tonnes, moving across the landscape like slow living mountains. §N1§ was forty-three feet long and weighed eight tonnes, and even by the standards of the largest carnivore that ever lived in South America, the sauropods were an enormous challenge. He had been tracking the herd of juvenile Argentinosaurus for two days — not the adults, which were simply too large and too dangerous, but the young ones, perhaps thirty feet and only ten or twelve tonnes. Still enormous. Still capable of crushing him with a single misstep.\n\nGoodnight, giant hunters. 🌙", "pterodactyl": "The Late Jurassic lagoon was a turquoise mirror in the morning light — shallow, warm, rimmed by limestone cliffs and dense cycad forest. §N1§ launched from his cliff ledge with a single push of his enormous elongated fourth finger — that wing membrane stretching from fingertip to ankle — and was immediately airborne, riding the thermal that built against the cliff face every morning as the sun warmed the rock. He was the size of a large hawk, his wingspan four feet, his crested head tilted downward to read the lagoon surface below. He was not a dinosaur. This was important. The pterosaurs were a separate evolutionary line — flying reptiles, not birds, not dinosaurs, their flight powered by the most extraordinary anatomical modification in vertebrate history: a single finger stretched to the length of an arm, the wing membrane attached along the body and down to the ankle.\n\nGoodnight, ancient fliers. 🌙", "triceratops": "The Late Cretaceous forest was dense with flowering plants — the angiosperms had exploded across the planet in the past twenty million years, filling every ecological niche, providing food for the enormous herds of hadrosaurids and ceratopsians that grazed the floodplains. §N1§ moved through the undergrowth with the power of an animal that weighed twelve tonnes and had three horns, and the forest parted for him accordingly. His horns were not ornament. The two brow horns — each over three feet long, solid bone covered in keratin — were weapons that had been used, successfully, against the most dangerous predator that ever walked on land. His frill showed the healed scars of tooth marks — T. rex tooth marks, the specific spacing unmistakable to any researcher who studied them. He had survived that encounter. The evidence was written in bone.\n\nGoodnight, three-horned giants. 🌙", "raptor": "The Mongolian desert seventy-five million years ago was not entirely desert — it was more variable than that, a landscape of dunes and scrubland and dry river channels and occasional lush valleys where water collected. §N1§ moved through it quickly on two powerful hind legs, his feathered body low to the ground, his sickle claw — that famous curved talon on the second toe — held up off the ground to keep it sharp. He was the size of a turkey. He was nothing like the movies. The feathers were real. Fossil evidence was unambiguous: quill knobs on Velociraptor arm bones, identical to those found on modern birds, anchoring the flight feathers. He couldn't fly — his arms were too small for sustained flight — but his feathers insulated him, allowed display, may have assisted in short leaps and assisted turns.\n\nGoodnight, feathered raptors. 🌙", "butterfly": "The night garden hums with the sounds of the smallest creatures on Earth. Every leaf and stem is a world of its own.\n\nTwo monarch butterflies move carefully through their north american meadows & forest, staying alert to everything around them.\n\n§N1§ and §N2§ search for the perfect resting spot.\nOn the way they catch a flower nectar and a milkweed (as caterpillars).\nWhen they find the ideal place they settle in with great satisfaction.\n\nBut then a birds appears nearby — a reminder that the wild is never entirely safe.\n§N1§ and §N2§ move quickly to safety and wait until all is clear.\n\nNow safe and fed, they explore their surroundings.\n\nAlong the way they see:\n* Bees\n* Dragonflies\n* Hummingbirds\n* Praying Mantises\n* Ladybirds\n\nAs the night deepens §N1§ and §N2§ find a sheltered spot and rest together.\n\nThey have eaten well. They have stayed safe. Another wonderful night.\n\n✅ Food eaten: Flower Nectar, Milkweed (As Caterpillars)\n⚠️ Predator avoided: Birds (most avoid them!)\n👀 Animals seen: Bees, Dragonflies, Hummingbirds\n\nGoodnight, monarch butterflies. 🌙", "saurolophus": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains.\n\nTwo saurolophus move carefully through their late cretaceous floodplains, staying alert to everything around them.\n\n§N1§ and §N2§ search for the perfect const C = DATA.categories;
const A = DATA.animals;
const S = DATA.stories;

function gc(k){ return C.find(function(c){ return c.key===k; }); }
function ga(c){ return Object.keys(A).filter(function(k){ return A[k].category===c; }).map(function(k){ var a=A[k]; a.key=k; return a; }); }

function getStory(k,n1,n2){
  var t = S[k] || "Goodnight. \uD83C\uDF19";
  return t.split("\u00A7N1\u00A7").join(n1).split("\u00A7N2\u00A7").join(n2);
}

function makeChunks(t){
  var sents=[]; var cur="";
  for(var i=0;i<t.length;i++){
    cur+=t[i];
    if((t[i]==="."||t[i]==="!"||t[i]==="?")&&cur.trim().length>20){
      sents.push(cur.trim()); cur="";
    }
  }
  if(cur.trim()) sents.push(cur.trim());
  if(!sents.length) return [t];
  var n=Math.min(7,sents.length);
  var z=Math.ceil(sents.length/n);
  var out=[];
  for(var i=0;i<sents.length;i+=z) out.push(sents.slice(i,i+z).join(" "));
  return out;
}

function getRead(){ try{ return JSON.parse(localStorage.getItem("read")||"{}"); }catch(e){ return {}; } }
function markRead(k){ try{ var r=getRead(); r[k]=true; localStorage.setItem("read",JSON.stringify(r)); }catch(e){} }

  if(st.pg==="cat" && ci){ renderCat(el,ci); return; }
  if(st.pg==="info" && an){ renderInfo(el,an,ci); return; }
  if(st.pg==="story" && an){ renderStory(el,an); return; }
}

function el(tag,attrs,inner){
  var s="<"+tag;
  for(var k in attrs) s+=" "+k+"=\""+attrs[k].toString().replace(/"/g,"&quot;")+"\"";
  return s+">"+inner+"</"+tag+">";
}

function btn(label,color,full){
  return "<button class=\"abtn\" data-color=\""+color+"\" style=\"width:"+(full?"100%":"auto")+";display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+color+"33,"+color+"55);border:1px solid "+color+"77\">"+label+"</button>";
}

function renderHome(el){
  var html = "<div class=\"s\"><div style=\"text-align:center;padding:24px 0 18px\"><div style=\"font-size:48px\">🌙</div><h1 style=\"font-size:20px;margin:8px 0 4px\">Bedtime Animal Adventures</h1><p style=\"color:rgba(255,255,255,.45);font-size:13px\">Choose a habitat</p></div><div class=\"g3\">";
  C.forEach(function(c){
    html += "<button class=\"catbtn\" data-cat=\""+c.key+"\" style=\"background:linear-gradient(135deg,"+c.color+"0a,"+c.color+"20);border:1px solid "+c.color+"44;border-radius:12px;padding:10px 4px;text-align:center;width:100%\"><div style=\"font-size:22px\">"+c.emoji+"</div><div style=\"font-size:9px;color:"+c.color+";font-weight:bold;margin-top:3px;line-height:1.2\">"+c.label+"</div><div style=\"font-size:8px;color:rgba(255,255,255,.3);margin-top:2px\">"+ga(c.key).length+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelectorAll(".catbtn").forEach(function(b){
    b.addEventListener("click", function(){ setState({pg:"cat",cat:this.dataset.cat}); });
  });
}

function renderCat(el,ci){
  var read = getRead();
  var html = "<div class=\"s\"><button class=\"back homebtn\">← Back</button><div style=\"text-align:center;margin-bottom:18px\"><div style=\"font-size:38px\">"+ci.emoji+"</div><h2 style=\"color:"+ci.color+";margin:6px 0\">"+ci.label+"</h2><p style=\"color:rgba(255,255,255,.4);font-size:13px\">"+ci.desc+"</p></div><div class=\"g2\">";
  ga(st.cat).forEach(function(a){
    var done = read[a.key];
    html += "<button class=\"anbtn\" data-key=\""+a.key+"\" style=\"background:linear-gradient(135deg,"+a.accent+(done?"44":"0a")+","+a.accent+(done?"66":"20")+");border:"+(done?"2":"1")+"px solid "+a.accent+(done?"99":"44")+";border-radius:12px;padding:14px 8px;text-align:center;position:relative\">"+(done?"<div style=\"position:absolute;top:5px;right:7px;font-size:12px\">✅</div>":"")+"<div style=\"font-size:30px\">"+a.emoji+"</div><div style=\"font-size:12px;color:"+a.accent+";font-weight:bold;margin-top:5px\">"+a.name+"</div></button>";
  });
  html += "</div></div>";
  el.innerHTML = html;
  el.querySelector(".homebtn").addEventListener("click", function(){ setState({pg:"home",cat:null,ak:null}); });
  el.querySelectorAll(".anbtn").forEach(function(b){
    var pressTimer = null;
    b.addEventListener("click", function(){ setState({pg:"info",ak:this.dataset.key}); });
    b.addEventListener("mousedown", function(){
      var key = this.dataset.key;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        setState({pg:"cat"});
      }, 600);
    });
    b.addEventListener("mouseup", function(){ clearTimeout(pressTimer); });
    b.addEventListener("mouseleave", function(){ clearTimeout(pressTimer); });
    b.addEventListener("touchstart", function(e){
      var key = this.dataset.key;
      pressTimer = setTimeout(function(){
        pressTimer = null;
        var r = getRead();
        if(r[key]){ delete r[key]; } else { r[key] = true; }
        try{ localStorage.setItem("read", JSON.stringify(r)); }catch(e){}
        setState({pg:"cat"});
      }, 600);
    }, {passive:true});
    b.addEventListener("touchend", function(){ clearTimeout(pressTimer); });
    b.addEventListener("touchmove", function(){ clearTimeout(pressTimer); });
  });
}

function renderInfo(el,an,ci){
  var ac = an.accent;
  var imgurl = "https://www.google.com/search?q="+encodeURIComponent(an.name+" wildlife")+"&tbm=isch";
  var html = "<div class=\"s\">"
    +"<button class=\"back catbtn2\">← Back</button>"
    +"<a href=\""+imgurl+"\" target=\"_blank\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;border-radius:14px;margin-bottom:14px;text-decoration:none;background:linear-gradient(135deg,"+an.bg+","+ac+"22);border:1px solid "+ac+"55\">"
    +"<div style=\"font-size:72px\">"+an.emoji+"</div><div style=\"font-size:14px;color:"+ac+";font-weight:bold;margin-top:8px\">"+an.name+"</div><div style=\"font-size:11px;color:"+ac+";opacity:.6;margin-top:4px\">📷 tap for photos</div></a>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:10px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:6px;text-transform:uppercase\">🏠 Habitat</div><div style=\"font-size:13px;color:rgba(255,255,255,.8)\">"+an.habitatEmoji+" "+an.habitat+"</div></div>"
    +"<div class=\"g2\" style=\"margin-bottom:10px\">"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28\"><div style=\"font-size:10px;color:#f87171;font-weight:bold;margin-bottom:6px;text-transform:uppercase\">⚠️ Predators</div>"+an.predators.map(function(p){ return "<div style=\"font-size:12px;color:rgba(255,255,255,.7);padding:2px 0\">"+p+"</div>"; }).join("")+"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28\"><div style=\"font-size:10px;color:#4ade80;font-weight:bold;margin-bottom:6px;text-transform:uppercase\">🍖 Prey</div>"+an.prey.map(function(p){ return "<div style=\"font-size:12px;color:rgba(255,255,255,.7);padding:2px 0\">"+p+"</div>"; }).join("")+"</div>"
    +"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:10px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:8px;text-transform:uppercase\">✨ Amazing Facts</div>"+an.facts.map(function(f){ return "<div style=\"font-size:13px;color:rgba(255,255,255,.8);padding:3px 0\">"+f+"</div>"; }).join("")+"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"28;margin-bottom:14px\"><div style=\"font-size:10px;color:"+ac+";font-weight:bold;margin-bottom:8px;text-transform:uppercase\">Name Your Adventurers</div>"
    +"<div class=\"g2\"><input id=\"n1\" placeholder=\"Carson\" value=\""+st.n1+"\" style=\"background:rgba(255,255,255,.07);border:1px solid "+ac+"44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%\">"
    +"<input id=\"n2\" placeholder=\"Avery\" value=\""+st.n2+"\" style=\"background:rgba(255,255,255,.07);border:1px solid "+ac+"44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%\"></div></div>"
    +"<button class=\"beginbtn\" style=\"width:100%;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:bold\">✨ Begin the Adventure</button>"
    +"</div>";
  el.innerHTML = html;
  el.querySelector(".catbtn2").addEventListener("click", function(){ setState({pg:"cat"}); });
  el.querySelector(".beginbtn").addEventListener("click", function(){
    var n1=document.getElementById("n1").value||"Carson";
    var n2=document.getElementById("n2").value||"Avery";
    var cks=makeChunks(getStory(st.ak,n1,n2));
    Object.assign(st,{pg:"story",n1:n1,n2:n2,cks:cks,idx:0,typed:"",typing:false});
    render();
    setTimeout(function(){ typeChunk(0); },30);
  });
}

function renderStory(el,an){
  var ac = an.accent;
  var pct = ((st.idx+(st.typing?.5:1))/st.cks.length)*100;
  var html = "<div class=\"s\">"
    +"<button class=\"back infobtn\">← Back</button>"
    +"<div style=\"text-align:center;margin-bottom:12px\">"
    +"<div style=\"font-size:30px\">"+an.emoji+"</div>"
    +"<div style=\"background:rgba(255,255,255,.1);border-radius:99px;height:5px;margin:8px 0;overflow:hidden\"><div id=\"progbar\" style=\"height:100%;background:"+ac+";width:"+pct+"%;border-radius:99px;transition:width .3s\"></div></div>"
    +"<div id=\"ctr\" style=\"font-size:10px;color:rgba(255,255,255,.35)\">"+(st.idx+1)+" / "+st.cks.length+"</div>"
    +"<button id=\"vbtn\" style=\"margin-top:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer\">"+(voiceOn?"🔇 Stop reading":"🔊 Read aloud")+"</button>"
    +"</div>"
    +"<div class=\"card\" style=\"border:1px solid "+ac+"33;min-height:150px;margin-bottom:14px;line-height:1.8\"><span id=\"tt\" style=\"color:rgba(255,255,255,.9);font-size:15px\">"+st.typed+"</span>"+(st.typing?"<span style=\"opacity:.4\">▋</span>":"")+"</div>"
    +"<div id=\"sb\"></div></div>";
  el.innerHTML = html;
  el.querySelector(".infobtn").addEventListener("click", function(){ 
    clearInterval(st.tm); voiceOn=false;
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    setState({pg:"info"});
  });
  document.getElementById("vbtn").addEventListener("click", function(){
    voiceOn=!voiceOn;
    this.textContent = voiceOn ? "🔇 Stop reading" : "🔊 Read aloud";
    if(voiceOn){ speakNow(); } else { if(window.speechSynthesis) window.speechSynthesis.cancel(); }
  });
  renderBtns(ac);
}

function renderBtns(ac){
  var el=document.getElementById("sb"); if(!el) return;
  var done=!st.typing&&st.idx===st.cks.length-1;
  if(st.typing){
    el.innerHTML="<button id=\"skipbtn\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Skip ahead →</button>";
    document.getElementById("skipbtn").addEventListener("click",function(){ clearInterval(st.tm); st.typed=st.cks[st.idx]||""; st.typing=false; var t=document.getElementById("tt"); if(t) t.textContent=st.typed; renderBtns(ac); });
  } else if(done){
    el.innerHTML="<div style=\"text-align:center;font-size:20px;margin-bottom:10px\">🌙 Sweet dreams!</div>"
      +"<button id=\"againbtn\" style=\"width:100%;display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Read Again</button>"
      +"<button id=\"homebtn2\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Choose Another Animal</button>";
    document.getElementById("againbtn").addEventListener("click",function(){ typeChunk(0); });
    document.getElementById("homebtn2").addEventListener("click",function(){ clearInterval(st.tm); voiceOn=false; if(window.speechSynthesis) window.speechSynthesis.cancel(); setState({pg:"home",cat:null,ak:null}); });
  } else {
    el.innerHTML="<button id=\"nxtbtn\" style=\"width:100%;display:block;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,"+ac+"33,"+ac+"55);border:1px solid "+ac+"77\">Continue →</button>";
    document.getElementById("nxtbtn").addEventListener("click",function(){ typeChunk(st.idx+1); });
  }
}

function updateProgress(){
  var an=A[st.ak]; if(!an) return;
  var ac=an.accent;
  var pct=((st.idx+(st.typing?.5:1))/st.cks.length)*100;
  var bar=document.getElementById("progbar");
  var ctr=document.getElementById("ctr");
  if(bar) bar.style.width=pct+"%";
  if(ctr) ctr.textContent=(st.idx+1)+" / "+st.cks.length;
}

function typeChunk(i){
  clearInterval(st.tm);
  st.idx=i; st.typed=""; st.typing=true;
  updateProgress();
  var t=st.cks[i]||""; var j=0;
  var ac=A[st.ak].accent;
  var ttEl=document.getElementById("tt");
  if(!ttEl){ render(); ttEl=document.getElementById("tt"); }
  // Show skip button immediately
  renderBtns(ac);
  st.tm=setInterval(function(){
    j++; st.typed=t.slice(0,j);
    if(ttEl) ttEl.textContent=st.typed;
    if(j>=t.length){
      clearInterval(st.tm); st.tm=null; st.typing=false;
      if(i===st.cks.length-1) markRead(st.ak);
      updateProgress();
      renderBtns(ac);
      if(voiceOn) speakNow();
    }
  },18);
}

function speakNow(){
  if(!voiceOn||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(st.cks[st.idx]||"");
  u.rate=0.85; u.pitch=1.0;
  var vs=window.speechSynthesis.getVoices();
  var v=vs.find(function(x){ return x.name.includes("Samantha")||x.name.includes("Karen")||x.lang==="en-US"; });
  if(v) u.voice=v;
  window.speechSynthesis.speak(u);
}

render();
</script>
</body>
</html>
