<body><div id="a"></div><script>
const D={"categories": [{"key": "savanna", "label": "Savanna", "emoji": "🌅", "color": "#f59e0b", "bg": "#1a0800"}, {"key": "forest", "label": "Forest", "emoji": "🌲", "color": "#22c55e", "bg": "#030a04"}, {"key": "arctic", "label": "Arctic & Mountain", "emoji": "❄️", "color": "#7dd3fc", "bg": "#020810"}, {"key": "ocean", "label": "Open Ocean", "emoji": "🌊", "color": "#3b82f6", "bg": "#001020"}, {"key": "rainforest", "label": "Rainforest", "emoji": "🌴", "color": "#86efac", "bg": "#040a02"}, {"key": "river", "label": "River & Wetland", "emoji": "🌿", "color": "#4ade80", "bg": "#020d05"}, {"key": "deepsea", "label": "Deep Sea", "emoji": "🌑", "color": "#a78bfa", "bg": "#02000f"}, {"key": "coral", "label": "Coral Reef", "emoji": "🪸", "color": "#f472b6", "bg": "#000d12"}, {"key": "desert", "label": "Desert", "emoji": "🏜️", "color": "#fb923c", "bg": "#100500"}, {"key": "mangrove", "label": "Mangrove Swamp", "emoji": "🌊", "color": "#2dd4bf", "bg": "#001208"}, {"key": "nocturnal", "label": "Creatures of the Night", "emoji": "🌙", "color": "#a78bfa", "bg": "#04020f"}, {"key": "southeast_asia", "label": "Southeast Asia", "emoji": "🌿", "color": "#f97316", "bg": "#050800"}, {"key": "madagascar", "label": "Madagascar", "emoji": "🌺", "color": "#e879f9", "bg": "#07020a"}, {"key": "grasslands", "label": "Grasslands & Plains", "emoji": "🌾", "color": "#f59e0b", "bg": "#060400"}, {"key": "alpine", "label": "Alpine Mountain", "emoji": "⛰️", "color": "#94a3b8", "bg": "#050810"}, {"key": "coastal", "label": "Coastal Waters", "emoji": "🌊", "color": "#06b6d4", "bg": "#001828"}, {"key": "prehistoric", "label": "Prehistoric", "emoji": "🦕", "color": "#ef4444", "bg": "#0a0300"}], "animals": {"lion": {"category": "savanna", "emoji": "🦁", "name": "Lion", "facts": ["Lions are the only cats that live in social groups called prides 🦁", "A lion's roar can be heard 8 km away! 📢"], "bg": "#1a0a00", "accent": "#ffd700"}, "cheetah": {"category": "savanna", "emoji": "🐆", "name": "Cheetah", "facts": ["Cheetahs are the fastest land animal — 0 to 70 mph in 3 seconds! 🏎️", "Unlike other big cats, cheetahs can't roar — they chirp and purr! 😸"], "bg": "#120800", "accent": "#fb923c"}, "leopard": {"category": "savanna", "emoji": "🐈‍⬛", "name": "Leopard", "facts": ["Leopards can carry prey heavier than themselves UP a tree to keep it safe! 🌳", "They are the most widespread big cat on Earth 🌍"], "bg": "#0d0800", "accent": "#d4a017"}, "hyena": {"category": "savanna", "emoji": "😈", "name": "Spotted Hyena", "facts": ["Hyenas are actually more closely related to cats than dogs! 🐱", "Female hyenas are larger and more dominant than males 💪"], "bg": "#120a00", "accent": "#c4a44a"}, "wilddog": {"category": "savanna", "emoji": "🐕", "name": "African Wild Dog", "facts": ["African wild dogs have the highest hunt success rate of any predator — 80%! 🎯", "Each dog's coat is uniquely patterned — like a fingerprint 🎨"], "bg": "#0f0900", "accent": "#e8a030"}, "vulture": {"category": "savanna", "emoji": "🦅", "name": "African White-backed Vulture", "facts": ["Vultures can spot a carcass from 7 miles up in the air 👁️", "They have stomach acid so strong it kills anthrax and cholera! 🧪"], "bg": "#160e00", "accent": "#c8a050"}, "owl": {"category": "forest", "emoji": "🦉", "name": "Barn Owl", "facts": ["Owls can rotate their heads 270 degrees! 🔄", "They have special feathers that let them fly in total silence 🤫"], "bg": "#050a1a", "accent": "#c8a96e"}, "wolf": {"category": "forest", "emoji": "🐺", "name": "Wolf", "facts": ["Wolves can smell prey from 1.75 miles away 👃", "A wolf pack is a family — parents, pups, and older siblings 👨‍👩‍👧‍👦"], "bg": "#060a0f", "accent": "#a8c8f0"}, "fox": {"category": "forest", "emoji": "🦊", "name": "Red Fox", "facts": ["Foxes use the Earth's magnetic field to help them pounce precisely on prey under snow 🧲", "A fox's bushy tail is called a brush — they wrap it around themselves to keep warm 🌡️"], "bg": "#0a0500", "accent": "#e86a1a"}, "lynx": {"category": "forest", "emoji": "🐱", "name": "Eurasian Lynx", "facts": ["Lynx have enormous ear tufts that act like directional microphones 👂", "Their massive paws act as natural snowshoes on deep powder snow 🐾"], "bg": "#080a0e", "accent": "#c8b070"}, "bear": {"category": "forest", "emoji": "🐻", "name": "Brown Bear", "facts": ["Brown bears can eat 20,000 calories a day before winter! 🍽️", "They hibernate up to 7 months — heart rate drops to 8 beats per minute! 😴"], "bg": "#080604", "accent": "#a07040"}, "pine_marten": {"category": "forest", "emoji": "🦦", "name": "Pine Marten", "facts": ["Pine martens can leap 6 feet between branches and rarely touch the ground 🌳", "They are the only predator fast enough in the trees to regularly catch red squirrels! 🐿️"], "bg": "#080a04", "accent": "#d4860a"}, "polar_bear": {"category": "arctic", "emoji": "🐻‍❄️", "name": "Polar Bear", "facts": ["Polar bears have BLACK skin under their white fur to absorb heat ☀️", "Their fur is hollow — like tiny straws — to trap warm air 🌬️"], "bg": "#020810", "accent": "#a0d8ef"}, "snow_leopard": {"category": "arctic", "emoji": "🐈", "name": "Snow Leopard", "facts": ["Snow leopards can't roar — they chuff and yowl instead 🔇", "Their enormous tail is as long as their body — for balance AND warmth! 🧣"], "bg": "#080c14", "accent": "#e2e8f0"}, "penguin": {"category": "arctic", "emoji": "🐧", "name": "Emperor Penguin", "facts": ["Emperor penguins are the tallest penguins — as tall as a 7-year-old! 📏", "They can dive 1,800 feet deep and hold their breath 20 minutes! 🤿"], "bg": "#030d1a", "accent": "#7dd4fc"}, "eagle": {"category": "arctic", "emoji": "🦅", "name": "Bald Eagle", "facts": ["Eagles can spot a rabbit from 2 miles away 👁️", "Their nest can weigh up to a ton after years of additions! 🏠"], "bg": "#0a0510", "accent": "#ffd700"}, "musk_ox": {"category": "arctic", "emoji": "🐂", "name": "Musk Ox", "facts": ["Musk oxen survived the last Ice Age alongside woolly mammoths! 🦣", "Their undercoat — called qiviut — is 8 times warmer than sheep's wool! 🧶"], "bg": "#04080e", "accent": "#8cb4c8"}, "arctic_fox": {"category": "arctic", "emoji": "🦊", "name": "Arctic Fox", "facts": ["Arctic foxes change coat colour — brilliant white in winter, brown in summer! 🎨", "They can survive temperatures of minus 70°C — the most cold-tolerant land mammal! 🥶"], "bg": "#04080e", "accent": "#e0f4ff"}, "shark": {"category": "ocean", "emoji": "🦈", "name": "Great White Shark", "facts": ["Great whites have up to 300 teeth arranged in rows 🦷", "They can detect one drop of blood in 25 gallons of water! 💧"], "bg": "#001428", "accent": "#00aaff"}, "orca": {"category": "ocean", "emoji": "🐋", "name": "Orca (Killer Whale)", "facts": ["Orcas are actually the largest member of the dolphin family! 🐬", "Each pod has its own unique dialect — like a family language! 🗣️"], "bg": "#010a14", "accent": "#38bdf8"}, "dolphin": {"category": "ocean", "emoji": "🐬", "name": "Bottlenose Dolphin", "facts": ["Dolphins call each other by individual names — unique whistle signatures! 📛", "They sleep with one eye open and one half of their brain at a time! 🧠"], "bg": "#001830", "accent": "#22d3ee"}, "humpback": {"category": "ocean", "emoji": "🐳", "name": "Humpback Whale", "facts": ["Humpback whales sing songs that can last 20 hours and change gradually over time! 🎵", "They can leap completely out of the water despite weighing 30 tonnes! 🚀"], "bg": "#001224", "accent": "#60a5fa"}, "flying_fish": {"category": "ocean", "emoji": "🐟", "name": "Flying Fish", "facts": ["Flying fish can glide up to 650 feet through the air! ✈️", "They reach 35 mph before leaping out of the water 💨"], "bg": "#001830", "accent": "#34d399"}, "whale_shark": {"category": "ocean", "emoji": "🐠", "name": "Whale Shark", "facts": ["Whale sharks are the largest fish on Earth — up to 40 feet long and 20 tonnes! 🐋", "Each whale shark has a unique spot pattern — like a fingerprint 🌟"], "bg": "#001428", "accent": "#818cf8"}, "tiger": {"category": "rainforest", "emoji": "🐅", "name": "Bengal Tiger", "facts": ["No two tigers have the same stripe pattern — like fingerprints! 🐯", "Tigers are excellent swimmers and actually love water 🏊"], "bg": "#0a0800", "accent": "#ff8c00"}, "gorilla": {"category": "rainforest", "emoji": "🦍", "name": "Mountain Gorilla", "facts": ["Gorillas share 98.3% of their DNA with humans! 🧬", "A silverback gorilla can lift 10 times his own body weight 💪"], "bg": "#050a05", "accent": "#86efac"}, "jaguar": {"category": "rainforest", "emoji": "🐆", "name": "Jaguar", "facts": ["Jaguars have the strongest bite of any big cat — they bite through turtle shells and crocodile skulls! 💪", "Unlike most cats, jaguars love swimming and regularly hunt in rivers 🏊"], "bg": "#080a00", "accent": "#d4a020"}, "poison_frog": {"category": "rainforest", "emoji": "🐸", "name": "Poison Dart Frog", "facts": ["Their brilliant colours warn: 'I am poisonous — don't eat me!' ☠️", "The most toxic species has enough poison to kill a large animal 😮"], "bg": "#060a02", "accent": "#84cc16"}, "sloth": {"category": "rainforest", "emoji": "🦥", "name": "Three-toed Sloth", "facts": ["Sloths are so slow that algae grows green IN their fur — providing camouflage! 🌿", "They only descend from trees once a week — just to use the toilet! 🚽"], "bg": "#060a03", "accent": "#84cc16"}, "harpy_eagle": {"category": "rainforest", "emoji": "🦅", "name": "Harpy Eagle", "facts": ["Harpy eagles are the most powerful eagle on Earth — their talons are the size of a grizzly bear's claws! 🦅", "They can snatch a monkey from a branch while flying at full speed 😮"], "bg": "#060a00", "accent": "#d4c090"}, "crocodile": {"category": "river", "emoji": "🐊", "name": "Nile Crocodile", "facts": ["Crocodiles have the strongest bite force of any animal on Earth! 💪", "They've barely changed in 200 million years — real living dinosaurs! 🦕"], "bg": "#020d05", "accent": "#4ade80"}, "otter": {"category": "river", "emoji": "🦦", "name": "River Otter", "facts": ["River otters can hold their breath for 8 minutes and swim at 7 mph! 🏊", "They have the densest fur of any mammal — nearly a million hairs per square inch 🪶"], "bg": "#030d08", "accent": "#6ee7b7"}, "hippo": {"category": "river", "emoji": "🦛", "name": "Hippopotamus", "facts": ["Hippos sweat a red oily liquid that acts as sunscreen AND antibiotic! ❤️", "Hippos can't actually swim — they walk and bounce along the bottom! 🚶"], "bg": "#021008", "accent": "#4ade80"}, "amazon_dolphin": {"category": "river", "emoji": "🐬", "name": "Pink River Dolphin", "facts": ["Pink river dolphins are actually pink — blood vessels close to the skin cause it! 🩷", "They can turn their heads nearly 180 degrees — unlike ocean dolphins! 🔄"], "bg": "#02080d", "accent": "#f9a8d4"}, "platypus": {"category": "river", "emoji": "🦆", "name": "Platypus", "facts": ["Platypuses have no stomach — food goes straight from oesophagus to intestine! 😮", "Male platypuses have venomous spurs on their hind legs! ☠️"], "bg": "#030a06", "accent": "#6ee7b7"}, "beaver": {"category": "river", "emoji": "🦫", "name": "North American Beaver", "facts": ["Beavers are nature's great engineers — their dams create entire ecosystems! 🏗️", "They have transparent eyelids that work as underwater goggles 👁️"], "bg": "#040a06", "accent": "#a07040"}, "octopus": {"category": "deepsea", "emoji": "🐙", "name": "Giant Pacific Octopus", "facts": ["Octopuses have THREE hearts and BLUE blood! 💙", "They can change colour and texture in less than a second 🎨"], "bg": "#020510", "accent": "#c084fc"}, "anglerfish": {"category": "deepsea", "emoji": "🎣", "name": "Anglerfish", "facts": ["Anglerfish use a glowing lure to attract prey in total darkness 💡", "They can swallow prey twice their own size — their stomach stretches enormously! 😮"], "bg": "#02000a", "accent": "#818cf8"}, "sperm_whale": {"category": "deepsea", "emoji": "🐋", "name": "Sperm Whale", "facts": ["Sperm whales have the largest brain of any animal that has ever lived! 🧠", "They can dive to 3,000 metres and hold their breath for 90 minutes! 🤿"], "bg": "#010814", "accent": "#6366f1"}, "viperfish": {"category": "deepsea", "emoji": "🐠", "name": "Viperfish", "facts": ["A viperfish's teeth are so long they curve outside its closed mouth! 😱", "They impale prey by striking with their whole body at high speed 🗡️"], "bg": "#02000a", "accent": "#818cf8"}, "giant_squid": {"category": "deepsea", "emoji": "🦑", "name": "Giant Squid", "facts": ["Giant squid have eyes the size of footballs — the largest eyes of any living animal! 👁️", "They were the basis for the legendary Kraken monster! 🐙"], "bg": "#02000a", "accent": "#7c3aed"}, "dumbo_octopus": {"category": "deepsea", "emoji": "🐙", "name": "Dumbo Octopus", "facts": ["Dumbo octopuses are named for their ear-like fins that look like Disney's Dumbo! 🐘", "They live deeper than almost any other octopus — up to 7,000 metres! 🌊"], "bg": "#02000a", "accent": "#c084fc"}, "clownfish": {"category": "coral", "emoji": "🐠", "name": "Clownfish", "facts": ["Clownfish are immune to their anemone's deadly stinging tentacles — a lifelong partnership! 🤝", "All clownfish are born male — the dominant one changes into a female! 😮"], "bg": "#000d12", "accent": "#f97316"}, "reef_shark": {"category": "coral", "emoji": "🦈", "name": "Reef Shark", "facts": ["Reef sharks navigate using an electromagnetic map built by their snouts! 🧭", "They can sleep while swimming using a kind of autopilot 😴"], "bg": "#000d12", "accent": "#38bdf8"}, "sea_turtle": {"category": "coral", "emoji": "🐢", "name": "Green Sea Turtle", "facts": ["Green sea turtles return to the exact beach where they were born to lay eggs! 🏖️", "They can hold their breath for up to 7 hours while sleeping! 😴"], "bg": "#000d12", "accent": "#34d399"}, "mantaray": {"category": "coral", "emoji": "🪁", "name": "Manta Ray", "facts": ["Manta rays have the largest brain-to-body ratio of any fish! 🧠", "They can recognise themselves in mirrors — a rare sign of self-awareness! 🪞"], "bg": "#000d12", "accent": "#818cf8"}, "nudibranch": {"category": "coral", "emoji": "🌈", "name": "Nudibranch Sea Slug", "facts": ["Nudibranchs steal stinging cells from anemones and reuse them in their own skin for defence! 💡", "There are over 3,000 known species and new ones are found every year! 🌈"], "bg": "#000d12", "accent": "#e879f9"}, "scorpion": {"category": "desert", "emoji": "🦂", "name": "Desert Scorpion", "facts": ["Scorpions glow bright blue-green under ultraviolet light — scientists still don't know why! 💙", "They can survive being frozen in ice and thaw back to life! 🧊"], "bg": "#100500", "accent": "#fb923c"}, "fennec": {"category": "desert", "emoji": "🦊", "name": "Fennec Fox", "facts": ["Fennec foxes have ENORMOUS ears — up to 6 inches long — to hear prey underground and release body heat 👂", "Their thick fur keeps them warm at night AND reflects sun in the day 🌡️"], "bg": "#0f0600", "accent": "#fcd34d"}, "camel": {"category": "desert", "emoji": "🐪", "name": "Dromedary Camel", "facts": ["A camel's hump stores FAT not water — it can fuel weeks of travel! 🐪", "They can drink 30 gallons of water in just 13 minutes! 💧"], "bg": "#140800", "accent": "#d97706"}, "roadrunner": {"category": "desert", "emoji": "🐦", "name": "Greater Roadrunner", "facts": ["Roadrunners can run at 20 mph — fast enough to outrun and catch rattlesnakes! 🏃", "They kill rattlesnakes by grabbing them and slamming them against rocks 😮"], "bg": "#0e0800", "accent": "#d97706"}, "meerkat": {"category": "desert", "emoji": "🦡", "name": "Meerkat", "facts": ["Meerkats are immune to many venoms including scorpion and cobra venom! ☠️", "A meerkat sentry gives different alarm calls for aerial vs ground predators! 🔔"], "bg": "#120a00", "accent": "#d97706"}, "seahorse": {"category": "coral", "emoji": "🌀", "name": "Seahorse", "facts": ["Male seahorses carry and give birth to the babies — the only male animal to do so! 🤱", "Seahorses can change colour to match their surroundings in seconds 🎨"], "bg": "#000d12", "accent": "#f472b6"}, "saltwater_croc": {"category": "mangrove", "emoji": "🐊", "name": "Saltwater Crocodile", "facts": ["Saltwater crocodiles are the largest reptile on Earth — up to 6 metres and 1,000 kg! 😮", "They can swim 900 miles out to sea between islands! 🌊"], "bg": "#010d08", "accent": "#4ade80"}, "mudskipper": {"category": "mangrove", "emoji": "🐟", "name": "Mudskipper", "facts": ["Mudskippers are fish that can walk on land using their fins as crutches! 🚶", "They breathe through their skin — keeping themselves moist while on land 💧"], "bg": "#020c06", "accent": "#86efac"}, "proboscis_monkey": {"category": "mangrove", "emoji": "🐒", "name": "Proboscis Monkey", "facts": ["Proboscis monkeys have the largest nose of any primate — males use it to attract females! 👃", "They are excellent swimmers and regularly cross rivers — even with crocodiles! 🏊"], "bg": "#030a04", "accent": "#86efac"}, "manatee": {"category": "mangrove", "emoji": "🐄", "name": "West Indian Manatee", "facts": ["Manatees are the closest living relatives of elephants! 🐘", "They must surface to breathe every 3-5 minutes 💨"], "bg": "#010c10", "accent": "#67e8f9"}, "fiddler_crab": {"category": "mangrove", "emoji": "🦀", "name": "Fiddler Crab", "facts": ["Male fiddler crabs have one ENORMOUS claw — sometimes half their body weight! 🦀", "They wave their giant claw to attract females and warn off rivals 👋"], "bg": "#020c06", "accent": "#fb923c"}, "roseate_spoonbill": {"category": "mangrove", "emoji": "🦩", "name": "Roseate Spoonbill", "facts": ["Roseate spoonbills get their stunning pink colour from the shrimp they eat! 🦐", "They swing their spoon-shaped bill side to side through water to feel for prey 🥄"], "bg": "#0a0210", "accent": "#f472b6"}, "sandcat": {"category": "desert", "emoji": "🐱", "name": "Sand Cat", "facts": ["Sand cats are the only wild cat species that lives primarily in true desert! 🏜️", "Their paw pads have fur underneath — acting as both heat insulation and sand snowshoes 🐾"], "bg": "#120800", "accent": "#e8b040"}, "zebra": {"category": "savanna", "emoji": "🦓", "name": "Zebra", "facts": ["No two zebras have the same stripe pattern — like fingerprints! 🦓", "Stripes may confuse predators by making it hard to pick out one animal from the herd 🌀"], "bg": "#141414", "accent": "#e2e8f0"}, "giraffe": {"category": "savanna", "emoji": "🦒", "name": "Giraffe", "facts": ["Giraffes are the tallest animals on Earth — up to 18 feet tall! 📏", "Their blue-black tongues are 18 inches long and tough as leather 👅"], "bg": "#1a1000", "accent": "#f59e0b"}, "roe_deer": {"category": "forest", "emoji": "🦌", "name": "Roe Deer", "facts": ["Roe deer are the only deer that can delay their pregnancy — the embryo pauses for 4 months! 🤰", "Males are called bucks and grow new antlers every single year 🦌"], "bg": "#060a04", "accent": "#86efac"}, "badger": {"category": "forest", "emoji": "🦡", "name": "Badger", "facts": ["Badgers dig the most complex burrow systems of any British animal — some setts are 100 years old! 🏠", "They can eat 200 earthworms in a single night 🪱"], "bg": "#0a0a08", "accent": "#a8a090"}, "reindeer": {"category": "arctic", "emoji": "🦌", "name": "Reindeer", "facts": ["Reindeer are the only deer where both males AND females grow antlers! 🦌", "Their eyes change colour from gold in summer to blue in winter to see in Arctic darkness! 👁️"], "bg": "#040810", "accent": "#93c5fd"}, "snowy_owl": {"category": "arctic", "emoji": "🦉", "name": "Snowy Owl", "facts": ["Snowy owls can eat over 1,600 lemmings in a single year! 🐭", "Unlike most owls, they hunt by day — essential in the Arctic summer with 24-hour sunlight ☀️"], "bg": "#040810", "accent": "#e0f2fe"}, "hammerhead": {"category": "ocean", "emoji": "🦈", "name": "Hammerhead Shark", "facts": ["Hammerhead sharks' wide-set eyes give them 360-degree vertical vision — they can see above AND below simultaneously! 👁️", "The hammer shape spreads their electrical sensors across a wider area to find stingrays buried in sand ⚡"], "bg": "#001428", "accent": "#38bdf8"}, "sea_lion": {"category": "ocean", "emoji": "🦭", "name": "California Sea Lion", "facts": ["Sea lions can swim at 25 mph — faster than any Olympic swimmer! 🏊", "Unlike seals, sea lions have ear flaps and can walk on all fours on land 🦻"], "bg": "#001428", "accent": "#7dd3fc"}, "anaconda": {"category": "rainforest", "emoji": "🐍", "name": "Green Anaconda", "facts": ["Green anacondas are the heaviest snakes on Earth — up to 550 lbs and 30 feet long! 😮", "They are not venomous — they kill by constriction, squeezing prey until it can't breathe 💪"], "bg": "#040a02", "accent": "#4ade80"}, "toucan": {"category": "rainforest", "emoji": "🦜", "name": "Toucan", "facts": ["A toucan's beak can be nearly as long as its body — but it's hollow and surprisingly light! 🦜", "The beak acts as a radiator — releasing heat to cool the toucan down in the hot jungle 🌡️"], "bg": "#060a02", "accent": "#f59e0b"}, "piranha": {"category": "river", "emoji": "🐟", "name": "Red-bellied Piranha", "facts": ["Piranha teeth are triangular, razor-sharp and replace themselves continuously 🦷", "They are more scavenger than killer — piranhas mostly eat dead or dying animals 😮"], "bg": "#020d05", "accent": "#ef4444"}, "giant_otter": {"category": "river", "emoji": "🦦", "name": "Giant River Otter", "facts": ["Giant otters grow up to 6 feet long — the size of a person! 📏", "They are the noisiest otters — making 9 distinct loud vocalisations 📣"], "bg": "#030d08", "accent": "#a3e635"}, "goblin_shark": {"category": "deepsea", "emoji": "🦈", "name": "Goblin Shark", "facts": ["Goblin sharks have a jaw that shoots forward out of their face to catch prey! 😱", "Their pink colour comes from blood vessels visible through their translucent skin 🩷"], "bg": "#02000a", "accent": "#f9a8d4"}, "jellyfish": {"category": "deepsea", "emoji": "🪼", "name": "Bioluminescent Jellyfish", "facts": ["Jellyfish have existed for over 500 million years — longer than dinosaurs, trees, or insects! 🌊", "They have no brain, no heart, and no bones — yet are some of Earth's most successful animals 😮"], "bg": "#02000a", "accent": "#818cf8"}, "parrotfish": {"category": "coral", "emoji": "🐠", "name": "Parrotfish", "facts": ["Parrotfish poop out white sand — a medium-sized parrotfish makes 200 lbs of sand per year! 🏖️", "They sleep inside a bubble of their own mucus — it masks their scent from predators! 💤"], "bg": "#000d12", "accent": "#06b6d4"}, "stonefish": {"category": "coral", "emoji": "🐡", "name": "Stonefish", "facts": ["Stonefish are the most venomous fish in the world — 13 sharp venomous spines on their back! ☠️", "They look exactly like a rock or piece of coral — the perfect camouflage 🪨"], "bg": "#000d12", "accent": "#a16207"}, "kangaroo_rat": {"category": "desert", "emoji": "🐀", "name": "Kangaroo Rat", "facts": ["Kangaroo rats never need to drink water — they make it inside their bodies from dry seeds! 💧", "Their enormous hind legs let them jump 9 feet in a single bound — to escape rattlesnakes! 🦘"], "bg": "#100500", "accent": "#d97706"}, "gila_woodpecker": {"category": "desert", "emoji": "🐦", "name": "Gila Woodpecker", "facts": ["Gila woodpeckers carve nest holes in saguaro cacti — the cactus seals the wound, creating a cool hollow called a boot 🌵", "After woodpeckers leave, Elf Owls move in — the tiniest owl in the world! 🦉"], "bg": "#100500", "accent": "#ef4444"}, "cassowary": {"category": "mangrove", "emoji": "🦤", "name": "Southern Cassowary", "facts": ["Cassowaries are the third-tallest bird on Earth and the most dangerous — their dagger-like inner claw is 5 inches long! ⚠️", "They can run at 31 mph through dense jungle and jump 5 feet straight up 🏃"], "bg": "#010d08", "accent": "#4ade80"}, "sea_snake": {"category": "mangrove", "emoji": "🐍", "name": "Yellow-lipped Sea Krait", "facts": ["Sea kraits are some of the most venomous snakes on Earth — but almost never bite humans! ☮️", "Unlike true sea snakes, they must return to land to digest food, drink fresh water and lay eggs 🏝️"], "bg": "#010d08", "accent": "#facc15"}, "mangrove_snake": {"category": "mangrove", "emoji": "🐍", "name": "Gold-ringed Cat Snake", "facts": ["The gold-ringed cat snake has vertical slit pupils — just like a cat — that help it judge distance in the dim mangrove light! 👁️", "It hunts almost entirely at night, moving through the mangrove canopy with extraordinary speed and agility 🌙"], "bg": "#010d08", "accent": "#fbbf24"}, "bat": {"category": "nocturnal", "emoji": "🦇", "name": "Little Brown Bat", "facts": ["Bats are the only mammals capable of true sustained flight! 🦇", "A single little brown bat can eat 1,000 mosquitoes in a single hour! 🦟"], "bg": "#07020f", "accent": "#a78bfa"}, "slow_loris": {"category": "nocturnal", "emoji": "🐒", "name": "Slow Loris", "facts": ["Slow lorises are the ONLY venomous primate — venom from a gland on their arm mixed with saliva creates a toxic bite! ☠️", "Their enormous eyes gather maximum light for night vision — but they can't move their eyes, so they swivel their whole head instead 👁️"], "bg": "#05080f", "accent": "#fb923c"}, "tawny_owl": {"category": "nocturnal", "emoji": "🦉", "name": "Tawny Owl", "facts": ["The famous tu-whit tu-whoo is actually TWO owls — the female calls tu-whit and the male answers hoo-hoo! 💑", "Tawny owls are completely blind in daylight — their pupils can't close small enough 🌟"], "bg": "#05080f", "accent": "#c8a96e"}, "tokay_gecko": {"category": "nocturnal", "emoji": "🦎", "name": "Tokay Gecko", "facts": ["Tokay geckos can walk upside down on glass — their toes have millions of microscopic hair-like setae that use van der Waals forces! 🔬", "They are one of the loudest geckos — their tok-kay call is so loud it can be heard 100 metres away! 📣"], "bg": "#050a05", "accent": "#4ade80"}, "opossum": {"category": "nocturnal", "emoji": "🐀", "name": "Virginia Opossum", "facts": ["Playing possum is a real involuntary response — opossums faint from fear and can't control it! 😴", "They eat up to 4,000 ticks per week, making them incredible for reducing Lyme disease 🎯"], "bg": "#0a0808", "accent": "#94a3b8"}, "skunk": {"category": "nocturnal", "emoji": "🦨", "name": "Striped Skunk", "facts": ["A skunk's spray can be accurately aimed up to 10 feet and smelled up to a mile away! 💨", "Before spraying, skunks give warnings — stomping feet, raising tail, doing a handstand! 🤸"], "bg": "#080808", "accent": "#f0f0f0"}, "orangutan": {"category": "southeast_asia", "emoji": "🦧", "name": "Orangutan", "facts": ["Orangutans share 96.9% of their DNA with humans — our closest relative after chimps and bonobos! 🧬", "They are the largest arboreal (tree-living) animals on Earth 🌳"], "bg": "#0a0500", "accent": "#f97316"}, "clouded_leopard": {"category": "southeast_asia", "emoji": "🐆", "name": "Clouded Leopard", "facts": ["Clouded leopards have the longest canine teeth relative to skull size of any living cat — like a sabre-tooth! 🦷", "They can hang upside down from branches by their hind feet — completely unique among cats! 🙃"], "bg": "#060a04", "accent": "#d4a017"}, "sun_bear": {"category": "southeast_asia", "emoji": "🐻", "name": "Sun Bear", "facts": ["Sun bears have the longest tongue of any bear — up to 10 inches — perfectly shaped for extracting honey! 🍯", "They are the smallest bears on Earth — about the size of a large dog 🐕"], "bg": "#060402", "accent": "#fbbf24"}, "binturong": {"category": "southeast_asia", "emoji": "🐱", "name": "Binturong", "facts": ["Binturongs genuinely smell exactly like buttered popcorn — from a chemical in their urine! 🍿", "They are one of only two carnivores with a fully prehensile tail — they can hang from it! 🪝"], "bg": "#060806", "accent": "#a16207"}, "tapir": {"category": "southeast_asia", "emoji": "🐗", "name": "Malayan Tapir", "facts": ["Tapirs are most closely related to horses and rhinos — despite looking like pigs with elephant trunks! 🐴", "Their flexible nose is a prehensile trunk they use to grab leaves and snorkel underwater! 🌿"], "bg": "#060806", "accent": "#94a3b8"}, "hornbill": {"category": "southeast_asia", "emoji": "🦜", "name": "Rhinoceros Hornbill", "facts": ["The rhinoceros hornbill has a magnificent upcurved red-and-yellow casque on top of its beak — used to amplify calls! 📯", "Female hornbills seal themselves INSIDE their nest hole using mud and droppings — the male feeds her through a tiny slit for 3 months! 🏠"], "bg": "#060804", "accent": "#ef4444"}, "ring_tailed_lemur": {"category": "madagascar", "emoji": "🐒", "name": "Ring-tailed Lemur", "facts": ["Ring-tailed lemurs sunbathe every morning in a 'sun worship' posture — arms spread wide! ☀️", "They have a special tooth comb — six teeth fused together — for grooming and scraping fruit 🦷"], "bg": "#080a04", "accent": "#f97316"}, "fossa": {"category": "madagascar", "emoji": "🦁", "name": "Fossa", "facts": ["Fossas look like a cross between a cat and a mongoose — and are related to neither! They are Madagascar's own unique family 😮", "They are Madagascar's largest carnivore — up to 6 feet including their tail! 📏"], "bg": "#060802", "accent": "#c4a44a"}, "chameleon": {"category": "madagascar", "emoji": "🦎", "name": "Panther Chameleon", "facts": ["Panther chameleons are one of the most colourful animals on Earth — males can be red, orange, blue, green or yellow depending on their location! 🌈", "They change colour to communicate emotions and health — NOT primarily for camouflage as most people think! 💬"], "bg": "#04080a", "accent": "#22d3ee"}, "aye_aye": {"category": "madagascar", "emoji": "🐀", "name": "Aye-aye", "facts": ["The aye-aye has a special elongated middle finger used to tap on wood and listen for hollow spaces containing grubs — like echolocation through wood! 🤞", "They are considered a bad omen by some Malagasy people — this superstition unfortunately makes them targets 😔"], "bg": "#06040a", "accent": "#a78bfa"}, "tenrec": {"category": "madagascar", "emoji": "🦔", "name": "Lowland Streaked Tenrec", "facts": ["Tenrecs are the most diverse mammal family on Earth — Madagascar's tenrecs have evolved into the ecological equivalent of shrews, moles, hedgehogs AND otters! 🌍", "They are the only mammals known to use stridulation — rubbing quills together to make sounds, like a cricket! 🎶"], "bg": "#060604", "accent": "#f59e0b"}, "tomato_frog": {"category": "madagascar", "emoji": "🐸", "name": "Tomato Frog", "facts": ["Tomato frogs are bright red-orange to warn predators they are toxic — like a tiny poisonous tomato! 🍅", "When grabbed, they secrete a thick white gum from their skin that glues a predator's mouth shut! 😮"], "bg": "#06040a", "accent": "#ef4444"}, "bison": {"category": "grasslands", "emoji": "🦬", "name": "American Bison", "facts": ["Bison once covered North America in herds so vast they darkened the horizon — 60 million animals! 🌍", "They can run 35mph and leap 6 feet vertically from standing still 🏃"], "bg": "#060400", "accent": "#a16207"}, "pronghorn": {"category": "grasslands", "emoji": "🦌", "name": "Pronghorn Antelope", "facts": ["Pronghorns are the second fastest land animal — 55mph! — and can maintain 45mph for miles 🏎️", "They evolved their speed to outrun the American cheetah — extinct 10,000 years ago! 🐆"], "bg": "#060400", "accent": "#f59e0b"}, "prairie_dog": {"category": "grasslands", "emoji": "🐿️", "name": "Prairie Dog", "facts": ["Prairie dogs have the most sophisticated animal language decoded — they can describe a predator's colour, size and speed in one call! 📣", "Their towns can house millions of animals covering hundreds of square miles 🏙️"], "bg": "#060400", "accent": "#d97706"}, "golden_eagle": {"category": "grasslands", "emoji": "🦅", "name": "Golden Eagle", "facts": ["Golden eagles can spot a rabbit from 2 miles away and dive at 150mph! 💨", "Their talons exert 750psi — stronger than any known animal bite 💪"], "bg": "#060400", "accent": "#f59e0b"}, "secretary_bird": {"category": "grasslands", "emoji": "🦅", "name": "Secretary Bird", "facts": ["Secretary birds kill snakes by stamping with 5x their own body weight of force — and are immune to most venom! 🐍", "They walk up to 20 miles per day hunting on foot — unusual for a large raptor 🚶"], "bg": "#060400", "accent": "#6b7280"}, "saiga": {"category": "grasslands", "emoji": "🐑", "name": "Saiga Antelope", "facts": ["The saiga's enormous inflatable nose filters dust in summer and warms cold air in winter! 👃", "They can run at 50mph across open steppe 🏎️"], "bg": "#060400", "accent": "#94a3b8"}, "plains_zebra": {"category": "grasslands", "emoji": "🦓", "name": "Plains Zebra", "facts": ["No two zebras have the same stripe pattern — every individual is unique, like a fingerprint! 🦓", "Stripes may confuse predators by making it hard to single out one animal from a running herd 🌀"], "bg": "#0a0a06", "accent": "#e2e8f0"}, "ibex": {"category": "alpine", "emoji": "🐐", "name": "Alpine Ibex", "facts": ["Alpine ibex can climb near-vertical cliff faces — they have been filmed on 90-degree dam walls! 🧗", "They have enormous backward-curving horns up to 1 metre long 🦌"], "bg": "#050810", "accent": "#94a3b8"}, "chamois": {"category": "alpine", "emoji": "🦌", "name": "Chamois", "facts": ["Chamois can leap 6 metres horizontally and 2 metres vertically on mountain terrain! 🦘", "Their hooves have hard outer rims and soft inner pads that grip both rock and snow 🐾"], "bg": "#050810", "accent": "#a78bfa"}, "alpine_marmot": {"category": "alpine", "emoji": "🐿️", "name": "Alpine Marmot", "facts": ["Alpine marmots hibernate for up to 9 months — their heartbeat drops from 120 to just 3 per minute! 😴", "They have one of the loudest whistles of any rodent — audible 1km away to warn of eagles! 📣"], "bg": "#050810", "accent": "#f59e0b"}, "pika": {"category": "alpine", "emoji": "🐇", "name": "American Pika", "facts": ["Pikas don't hibernate — they spend all summer cutting and drying hay piles to eat all winter! 🌾", "They die from overheating above 25°C — a living thermometer of climate change 🌡️"], "bg": "#050810", "accent": "#f97316"}, "mountain_goat": {"category": "alpine", "emoji": "🐐", "name": "Mountain Goat", "facts": ["Mountain goats can balance on ledges just 2 inches wide — their split hooves act like pincers! 🤏", "They have double-layered coats — dense woolly undercoat and long guard hairs for alpine cold 🧥"], "bg": "#050810", "accent": "#f0f0f0"}, "lammergeier": {"category": "alpine", "emoji": "🦅", "name": "Lammergeier (Bearded Vulture)", "facts": ["Lammergeiers eat almost only bone marrow — they carry bones high and drop them on rocks to smash them! 🦴", "They dye their white chest feathers orange by bathing in iron-rich mud — scientists think it signals status 🧡"], "bg": "#050810", "accent": "#f97316"}, "hawk_eagle": {"category": "alpine", "emoji": "🦅", "name": "Mountain Hawk-Eagle", "facts": ["Mountain hawk-eagles regularly take prey heavier than themselves! 💪", "Their long crests rise dramatically when alarmed or excited 🪶"], "bg": "#050810", "accent": "#b45309"}, "american_lobster": {"category": "coastal", "emoji": "🦞", "name": "American Lobster", "facts": ["American lobsters can live over 100 years and keep growing their entire lives! ⏳", "They can regenerate lost claws, legs and antennae after moulting! 🔄"], "bg": "#001428", "accent": "#dc2626"}, "blue_crab": {"category": "coastal", "emoji": "🦀", "name": "Blue Crab", "facts": ["Blue crabs can swim using paddle-shaped back legs to move through open water! 🏊", "They moult up to 23 times before reaching adult size, growing 25% larger each time 📈"], "bg": "#001428", "accent": "#3b82f6"}, "harbor_seal": {"category": "coastal", "emoji": "🦭", "name": "Harbor Seal", "facts": ["Harbor seals can dive to 600 feet and hold their breath for 30 minutes! 🤿", "Their whiskers are so sensitive they can detect the wake of a fish that swam past 30 seconds ago! 🐟"], "bg": "#001828", "accent": "#7dd3fc"}, "puffin": {"category": "coastal", "emoji": "🐦", "name": "Atlantic Puffin", "facts": ["Puffins can carry up to 62 sand eels in their beak at once — they use backward-pointing spines on their tongue! 🐟", "They flap their wings 400 times per minute to fly — they basically fly through water the same way underwater 💨"], "bg": "#001828", "accent": "#f97316"}, "sea_otter": {"category": "coastal", "emoji": "🦦", "name": "Sea Otter", "facts": ["Sea otters have the densest fur of any animal — up to a million hairs per square inch! 🪶", "They are a keystone species — without them, sea urchins eat all the kelp and the whole forest collapses 🌿"], "bg": "#001828", "accent": "#4ade80"}, "oystercatcher": {"category": "coastal", "emoji": "🐦", "name": "Oystercatcher", "facts": ["Oystercatchers have two techniques for opening mussels — stabbing the hinge or hammering until it cracks, and young birds learn one method from their parents! 🔨", "Their vivid orange-red bill is actually a specialised chisel, stronger than any other shorebird's 🦮"], "bg": "#001828", "accent": "#f97316"}, "trex": {"category": "prehistoric", "emoji": "🦖", "name": "Tyrannosaurus Rex", "facts": ["T. rex had the most powerful bite of any land animal — ever — cracking through solid bone! 💀", "Its tiny arms were actually extremely powerful — each could curl 200kg! 💪"], "bg": "#0a0500", "accent": "#ef4444"}, "mosasaurus": {"category": "prehistoric", "emoji": "🐊", "name": "Mosasaurus", "facts": ["Mosasaurus was over 50 feet long — longer than a school bus! 📏", "It had TWO sets of teeth — one in the jaw and one in the roof of its mouth to hold struggling prey! 🦷"], "bg": "#001428", "accent": "#06b6d4"}, "giganotosaurus": {"category": "prehistoric", "emoji": "🦖", "name": "Giganotosaurus", "facts": ["Giganotosaurus was slightly LARGER than T. rex — one of the biggest meat-eating dinosaurs ever! 😮", "It lived 30 million years before T. rex on a completely different continent 🌍"], "bg": "#0a0500", "accent": "#f97316"}, "pterodactyl": {"category": "prehistoric", "emoji": "🦅", "name": "Pterodactylus", "facts": ["Pterodactylus was actually quite small — about the size of a modern hawk! Most people imagine it much bigger 😮", "It was NOT a dinosaur — pterosaurs were a separate group of flying reptiles 🦎"], "bg": "#020810", "accent": "#a78bfa"}, "triceratops": {"category": "prehistoric", "emoji": "🦕", "name": "Triceratops", "facts": ["Triceratops horns were real bone — not just display — and healed bite marks prove they fought T. rex! ⚔️", "Its frill may have been brightly coloured for communication and attracting mates 🌈"], "bg": "#0a0500", "accent": "#22c55e"}, "raptor": {"category": "prehistoric", "emoji": "🦖", "name": "Velociraptor", "facts": ["Real Velociraptors were only the size of a turkey — movie raptors are actually based on Deinonychus! 🦃", "They definitely had feathers — Velociraptor had quill knobs on its arm bones, just like modern birds 🪶"], "bg": "#0a0300", "accent": "#f59e0b"}}, "stories": {"lion": "As the amber sun melted behind the savanna horizon, §1§ and §2§ stretched their golden paws and yawned enormous yawns — showing teeth as long as your finger. Around them, three cubs wrestled in the dry dust while the pride dozed in the last warmth of the day. \"Time to hunt,\" rumbled §1§, his amber eyes glowing in the fading light. Goodnight, brave lions. 🌙", "cheetah": "On top of a great termite mound — solid as concrete, tall as a doorway — §1§ and §2§ sat perfectly still, scanning the golden grassland. The black tear-marks running from their eyes to their mouths weren't decoration: they cut sun glare like a sprinter's eye-black, sharpening their vision across the blazing plain. Every part of a cheetah was built for speed. Goodnight, swift cheetahs. 🌙", "leopard": "High in the fork of a great marula tree, thirty feet above the ground, §1§ lay draped across the branch like a spotted rug, his long tail swinging in the warm breeze. Wedged safely above him: an impala he had carried up here in his jaws — heavier than himself — beyond the reach of every lion and hyena on the plain. Goodnight, secretive leopards. 🌙", "hyena": "People misunderstood hyenas. §1§ knew this and didn't mind. Let the lions get the reputation. The spotted hyena clan had the results: the highest hunt success rate, the most efficient feeding, the most sophisticated social structure on the savanna. While lions napped, the clan worked. §1§ was the dominant female — larger than any male, his authority quiet and absolute. Goodnight, laughing hyenas. 🌙", "wilddog": "Before the sun touched the horizon, the wild dog pack was already awake and performing their pre-hunt ceremony — leaping on each other, licking faces, twittering in high excited voices. §1§ and §2§ were in the middle of it, their unique painted coats of black and amber and white catching the last golden light. Every dog's coat was different. Goodnight, painted wild dogs. 🌙", "vulture": "§1§ and §2§ had been riding thermals since before dawn — two hours of effortless spiraling, the invisible columns of warm air lifting them higher and higher until the savanna below was a vast golden map. Goodnight, sky-sailing vultures. 🌙", "owl": "The ancient oak tree had stood for three hundred years, and in its heart was a hollow worn smooth by generations of barn owls. As the last light faded, §1§ and §2§ opened their eyes simultaneously — those great round coins of amber — and looked out at their moonlit world. They lifted from the hollow in complete silence. Goodnight, wise owls. 🌙", "wolf": "Three feet of fresh snow had transformed the pine forest into a cathedral of white and shadow. §1§ led the pack across the drifts on broad paws that spread wide and floated where a deer would have plunged and struggled. Behind him, six wolves stepped in his exact tracks — the classic wolf energy-saving formation, only the leader breaking trail. §2§ read the air constantly. Goodnight, brave wolves. 🌙", "fox": "The autumn forest floor was a deep carpet of amber and russet, smelling of rain and bark and something magical, and through it §1§ moved in that distinctive fox-trot — quick and light-footed, like dancing. His coat was at its best: thick, lustrous, the colour of burning coals, his enormous brush-tail tipped with white. Goodnight, clever foxes. 🌙", "lynx": "The boreal forest in January was severe and beautiful — vast dark spruce trees, snow so deep and still it had texture, silence so complete it felt like the inside of something sacred. Through it, §1§ and §2§ moved like pieces of the forest itself given purpose. Their paws were enormous — spreading wide on the snow, each toe furred between the pads, the whole foot a natural snowshoe. Goodnight, silent lynx. 🌙", "bear": "Late summer, and the river was thick with salmon — hundreds of them forcing their way upstream, their silver bodies catching the light in every pool and rapid. §1§ had been waiting here for eleven years. He knew this river's rhythms the way you knew the rooms of your own house. Goodnight, great brown bears. 🌙", "pine_marten": "Most animals had a relationship with the ground. Not §1§ and §2§. Pine martens were creatures of the upper world — the canopy, the interlocking branches, the three-dimensional highway of old-growth forest above head height. They moved through this world with a fluid ease that made watching them feel like watching water flow uphill. Goodnight, treetop martens. 🌙", "polar_bear": "The Arctic night lasted twenty hours at this time of year, and in those twenty hours the sky put on a show that had no equal anywhere: the Northern Lights cascading from horizon to horizon in curtains of green and violet and deep red, reflected in the black leads of open water between the ice floes. §1§ and §2§ sat on their haunches and watched. Even polar bears noticed the Northern Lights. Goodnight, mighty polar bears. 🌙", "snow_leopard": "At four thousand metres above sea level, where the air held only two-thirds the oxygen of the lowlands, §1§ moved along a ledge above a gorge so deep its bottom was invisible in the blue shadow below. He moved with the absolute certainty of an animal that had navigated these exact ledges since he could walk. Goodnight, ghostly snow leopards. 🌙", "penguin": "The Antarctic blizzard had been blowing for three days — seventy miles an hour, minus sixty wind-chill, visibility nothing. And in it, four thousand emperor penguins pressed together in a huddle the size of a tennis court, rotating slowly so no individual stayed on the cold outside edge for more than a few minutes. Goodnight, bold penguins. 🌙", "eagle": "The cliff dropped eight hundred feet to the river valley below, and on its highest ledge sat the nest: seven feet across, four feet deep, built up over eleven years, now so heavy it was essentially a permanent geological feature. §1§ and §2§ had raised seventeen chicks from it. Goodnight, glorious eagles. 🌙", "musk_ox": "They had walked out of the Ice Age and into the modern world, and nothing fundamental had changed about them in a hundred thousand years. §1§ and §2§ stood in a minus-forty blizzard on the open Arctic tundra and were, physiologically speaking, fine. Goodnight, ancient musk oxen. 🌙", "arctic_fox": "§1§ was the most perfectly white thing on the tundra in February, and the tundra in February was already extraordinarily white. He blended into his world so completely that the polar bear he followed at a hundred-metre distance had walked past his twice without noticing, assuming he was a lump of snow. He was fine with this. Goodnight, white foxes. 🌙", "shark": "Four hundred million years. While continents drifted, ice ages came and went, and every species on Earth changed beyond recognition, the great white shark refined itself into something so perfectly suited to its purpose that change became unnecessary. §1§ and §2§ were almost exactly what their ancestors had been. They worked. Goodnight, mighty sharks. 🌙", "orca": "The matriarch was fifty-seven years old, and she carried in her mind — in the largest brain of any dolphin — a complete map of her world: the locations of every salmon run she had visited in five decades, the territories of neighbouring pods, the individual voices of hundreds of orcas she had heard across a lifetime in the North Pacific. Goodnight, magnificent orcas. 🌙", "dolphin": "The pod of thirty dolphins had been moving north since before sunrise, travelling in the loose social formation that dolphins used for long journeys — the mothers with calves in the most protected centre positions, the big males ranging wider on the flanks. §1§ and §2§ moved in the middle, sometimes together, sometimes separating to investigate something interesting before rejoining. Goodnight, joyful dolphins. 🌙", "humpback": "§2§ had been singing for eleven hours. The song rose from somewhere deep in his chest and rolled outward through three hundred miles of ocean in every direction — complex, low, rising and falling in patterns no human had fully decoded. Humpback songs changed over time: a new phrase appeared in one whale, and within months every whale in the same ocean was singing it. Goodnight, singing whales. 🌙", "flying_fish": "The tropical ocean surface was a world of light and danger. Above: frigate birds soaring on thermals, their sharp eyes scanning for anything silver near the surface. Below: tuna and dolphins prowling at speed. The surface itself was no-man's-land, and §1§ and §2§ had evolved the most extraordinary solution to living in it: they flew. Goodnight, flying fish. 🌙", "whale_shark": "§1§ was thirty-seven feet long and weighed eighteen tonnes, and he moved through the warm tropical water like a slow, dappled dream. He was the largest fish in the ocean, and he ate plankton. The immensity of the ocean and the extraordinary numbers of the tiny things that lived in it provided enough to sustain him — filter-feeding those eighteen tonnes through the gill rakers that retained every Goodnight, gentle giants. 🌙", "tiger": "The jungle at dusk had its own particular light — green-gold, filtered through fifty metres of canopy, pooling in the clearings. In this light, §1§'s vertical black stripes on orange gold didn't make his disappear — they made his become the light itself, the play of shadow and sun shaft through the trees rendered as a living animal. Goodnight, magnificent tigers. 🌙", "gorilla": "The mist rolled through the Virunga mountain forest in slow cold waves, gathering in the valleys and spiraling up the ridges, turning the world beyond thirty metres into grey suggestion. In this mist, the mountain gorillas were dark shapes that became real only when you were close enough to hear their breathing. Goodnight, gentle gorillas. 🌙", "jaguar": "The Amazon at night was not dark. This was the thing people got wrong about it. Fireflies moved through the understory in drifting constellations. Bioluminescent fungi glowed blue-green from rotting logs. The moon made patches of silver on the forest floor. Goodnight, powerful jaguars. 🌙", "poison_frog": "At the scale of a poison dart frog — no longer than your little finger, no heavier than a few coins — the forest floor was not a flat surface but a three-dimensional labyrinth of roots and rocks and leaf layers. §1§ moved through it with the confident ease of an animal that had navigated this exact patch of Amazon floor for three years. Goodnight, vivid little frogs. 🌙", "sloth": "§1§ had been in this cecropia tree for four days. He would be in it for perhaps two more before his weekly descent to the forest floor — a twenty-foot journey taking twenty minutes, the most dangerous thing he ever did. Then back up, and he would not leave again for another week. This was not laziness. Goodnight, unhurried sloths. 🌙", "harpy_eagle": "At the very top of the rainforest, above the main canopy, in the emergent layer where the tallest trees pushed their crowns into open sky, §1§ sat on a bare branch of a brazil nut tree that had been growing for a hundred and forty years. He was the largest, most powerful eagle in the world. His talons were the size and shape of grizzly bear claws. Goodnight, powerful harpy eagles. 🌙", "crocodile": "The great African river moved dark and slow in the late afternoon, and in the shallows near the bank — barely visible, just two ridges of eye-bumps and two nostril-bumps above the waterline — §1§ and §2§ had been motionless for three hours. This was not waiting in any impatient sense. This was their natural state. They were crocodiles. Stillness was their superpower. Goodnight, ancient crocodiles. 🌙", "otter": "The river was running fast and cold and green, and §1§ found it excellent. High water meant more chaos, more crayfish dislodged from their hiding places, more small fish pushed into the open. From §1§'s perspective, a flooded river was a pantry that had been enthusiastically reorganised. Goodnight, playful otters. 🌙", "hippo": "A hippopotamus was approximately one and a half tonnes of confidence. §1§ moved through the deep channel of the river as if the water had been placed there specifically for his convenience, which in a certain territorial sense it had: his pod had used this stretch of river for longer than any living animal could remember, and the territorial reality of a three-tonne female hippo was such that ev Goodnight, mighty hippos. 🌙", "amazon_dolphin": "The Amazon river dolphin had evolved to be different. Its ocean ancestors had entered these freshwater rivers fifteen million years ago, and the demands of river life had changed them: the rigid neck of an ocean dolphin redesigned into something flexible enough to look sideways between submerged tree trunks; the torpedo shape softened into something stockier and more manoeuvrable; the grey coloura Goodnight, rosy dolphins. 🌙", "platypus": "The platypus was the result of evolution solving a set of problems with complete disregard for any existing template. Duck bill. Beaver body. Webbed feet. Dense waterproof fur. Venomous ankle spurs. Electroreception. No stomach. Egg-laying, despite being a mammal. The first European scientists to receive a specimen were certain it was a hoax. They took scissors to the bill looking for stitches. Goodnight, impossible platypuses. 🌙", "beaver": "Twelve years ago this had been a fast-running stream. Then §1§'s parents had arrived, assessed the topography with whatever it is beavers used to assess topography, and begun to dam it. What the dam created — what §1§ and §2§ now maintained — was a hectare of calm open water, a colony of muskrats, a resident family of river otters, two great blue herons, more frogs than could be counted, and Goodnight, industrious beavers. 🌙", "octopus": "The giant Pacific octopus had nine brains. One central brain in the mantle and one in each of her eight arms, allowing each arm a degree of independent decision-making — sent off to investigate a rock crevice while the central brain attended to something else entirely. Each sucker on each arm could taste and smell independently. Goodnight, clever octopuses. 🌙", "anglerfish": "Three thousand metres below the surface of the Atlantic Ocean, where the pressure was three hundred times what you would feel standing on a beach, where the temperature held at two degrees above freezing, where no sunlight had ever penetrated, §1§ drifted in absolute darkness and felt entirely at home. The esca dangled from his forehead on its modified dorsal spine, glowing a steady blue-green. Goodnight, glowing anglerfish. 🌙", "sperm_whale": "She had been alive for fifty-eight years, and the Pacific Ocean was inside her the way a homeland was inside someone who had lived there for decades — not just familiar but constitutive. The matriarch knew where cold upwellings brought nutrients to the surface and set the whole food chain running. She knew which seamounts concentrated giant squid. Goodnight, deep-diving whales. 🌙", "viperfish": "When the sun set above the surface and the last photons filtered down through the water column and were absorbed, the signal came that had been coded into the viperfish's photoreceptors by millions of years of evolution: now. Rise. §1§ had spent the day at seven hundred metres — nearly motionless, metabolic rate reduced to the minimum, burning almost nothing. Goodnight, terrifying viperfish. 🌙", "giant_squid": "For centuries, the kraken was the sea's great story. And while it couldn't sink ships and lived far from sailors' routes, the creature they were trying to describe was real. §1§ was forty feet from mantle to tentacle tip and weighed eight hundred kilograms. Goodnight, legendary giant squid. 🌙", "dumbo_octopus": "If the deep sea had a mascot, it might be the dumbo octopus — not the most dangerous or scientifically important creature in the deep, but the one that looked most like something made of joy. Round and soft and pinkish-purple, with two ear-like fins on its head that it flapped to move through the water, its large eyes perpetually wide, its whole appearance conveying a kind of bemused contentment w Goodnight, gentle dumbo octopuses. 🌙", "clownfish": "The sea anemone had been growing on this section of coral for at least thirty years — its column as wide as a dinner plate, its tentacles spread in a two-foot crown, each tentacle tipped with nematocysts so powerful that most fish felt the sting clearly. Most fish gave it a wide berth. §1§ and §2§ called it home. Goodnight, bright clownfish. 🌙", "reef_shark": "The reef at night belonged to the sharks. Not aggressively — just as a matter of fact. The daytime fish had gone to their crevices, the parrotfish wrapped in their mucus sleeping bags. The night shift had emerged: soldierfish glowing red in the dark, shrimp picking across the reef surface. Goodnight, sleek reef sharks. 🌙", "sea_turtle": "She had been swimming these waters for seventy-three years, and in that time the world above the ocean had changed considerably. The coral had bleached twice and recovered once. The seagrass beds had shrunk and expanded with the decades. She had swum through all of it with the patience of an animal whose entire existence argued against urgency. Goodnight, ancient sea turtles. 🌙", "mantaray": "The cleaning station was a particular section of coral — indistinguishable to a human eye from any other coral head, but known to every large animal on the reef as the place where the cleaner wrasses worked. §1§ arrived in the late morning and slowed to a gentle hover above it. Within seconds, a dozen wrasses were on him. Goodnight, graceful manta rays. 🌙", "nudibranch": "If you looked very closely at the coral reef — pressed your mask against the surface and really looked — you would find a world within the world. Creatures so small and so impossibly vivid that they seemed painted by someone who had decided reality was simply not colourful enough. §1§ and §2§ were among the most spectacular residents of this miniature world. Goodnight, gorgeous nudibranchs. 🌙", "seahorse": "The seahorse was evolution's most charming paradox: a fish that swam poorly, had no stomach so it ate constantly, gave birth through the male (the only animal on Earth where this was true), and anchored itself to coral by its prehensile tail whenever the current got too strong. By every conventional metric of fish-ness, it was doing everything wrong. Goodnight, dancing seahorses. 🌙", "scorpion": "The desert held its heat long after the sun had set. The rocks released their stored warmth slowly into the cooling air, and in that warmth, from beneath a flat limestone slab at the base of a tall saguaro cactus, §1§ squeezed sideways through a gap barely a centimetre wide and emerged into the evening. He was extraordinary. Goodnight, ancient scorpions. 🌙", "fennec": "The Sahara at night was the inverse of the Sahara in the day. In the day: blinding light, fifty-degree heat, everything alive pressed underground. At night: the temperature dropped thirty degrees in an hour, and the sky above was the most extraordinary sight available on Earth — no light pollution for thousands of kilometres, the Milky Way a river of light from horizon to horizon, more stars than  Goodnight, big-eared fennecs. 🌙", "camel": "The Arabian desert at full noon was a place most life declined to engage with. Sand surface temperature: seventy degrees. Air temperature in shade: fifty. And moving across this landscape, apparently unconcerned — actually unconcerned — were §1§ and §2§. Goodnight, magnificent camels. 🌙", "roadrunner": "The Sonoran desert at dawn was cold, and §1§'s first act was to find a sun-facing rock and stand on it with wings spread, back tilted toward the east. The dark skin beneath his back feathers absorbed the sun's radiation with exceptional efficiency. In twenty minutes his core temperature was at operational specification. He shook himself, his crest popped upright, and the hunt began. Goodnight, speedy roadrunners. 🌙", "meerkat": "The sun came up over the Kalahari and illuminated the most charming sight in the desert: a whole mob of meerkats standing upright at the mouth of their burrow, arms slightly out from their sides, round tummies turned directly toward the sun, eyes closed, small faces tilted upward with expressions of profound uncomplicated pleasure. They were warming up, and they had made it into an art form. Goodnight, watchful meerkats. 🌙", "sandcat": "In all the world's deserts, only one wild cat had made the true desert — not the fringe, not the semi-arid scrubland, but the actual burning heart of the Sahara and Arabian — its permanent home. §1§ was built for it at every level: paws furred on the undersides for insulation and for spreading weight on loose sand like snowshoes; wide low-set ears maximising hearing while minimising heat loss; p Goodnight, desert cats. 🌙", "saltwater_croc": "The mangrove river mouth was a world between worlds — neither sea nor land but something older and stranger than either, the tidal water threading between the stilt roots of the mangroves in patterns that changed with every flood and ebb. Goodnight, ancient crocodiles. 🌙", "mudskipper": "The mudflat at low tide was an alien landscape — grey-brown mud riddled with burrow holes, the surface still holding the warmth of the day's sun. And across it, moving in a manner that seemed to violate the basic rules of fish, came §1§ and §2§. They walked. Sort of. Goodnight, walking fish. 🌙", "proboscis_monkey": "High in the mangrove canopy above the tidal river, the afternoon light turned the leaves gold and copper. §1§ and §2§ sat in the highest fork of a tall mangrove, their remarkable noses — enormous, pendulous, built for amplifying calls and attracting mates — catching the salt breeze from the estuary below. Goodnight, big-nosed monkeys. 🌙", "manatee": "The shallow lagoon behind the mangroves was the warmest, most sheltered water for miles. §1§ drifted through it at a leisurely pace that suited him — large, round, unhurried, looking somehow deeply comfortable with his own dimensions. Goodnight, gentle manatees. 🌙", "fiddler_crab": "At low tide the mangrove mudflat came alive in the most extraordinary way. Millions of small crabs emerged from their burrows simultaneously — a tide of movement across the grey mud, each crab moving on eight nimble legs. Goodnight, waving crabs. 🌙", "roseate_spoonbill": "The shallow mangrove bay at dawn was pink — not just from the sunrise, but from the birds. §1§ and §2§ stood in the shallows with eight other roseate spoonbills, their extraordinary colouring catching the early light: rose-pink wings, deeper pink body, white neck and back, the skin of their bald green heads brightening toward the vivid yellow-green of breeding season. Goodnight, rosy spoonbills. 🌙", "zebra": "As the last orange light drained from the Kalahari sky, the dazzle of zebras moved together toward the watering hole — their stripes flickering and merging in the dusk until it was almost impossible to tell where one animal ended and another began. That, §1§ knew, was rather the point. Goodnight, beautiful zebras. 🌙", "giraffe": "The acacia tree was twenty feet tall, and §1§ was eating the very top of it. He stood with the unhurried ease of the tallest animal on Earth, his great neck reaching into the crown of the tree, his dark blue-black tongue — eighteen inches long and tough as a leather strap — curling around bunches of leaves and stripping them from the thorns with a casual expertise built over years of practice. Goodnight, towering giraffes. 🌙", "roe_deer": "The beech wood in October was extraordinary — the leaves had turned every shade of copper and amber and gold, and they fell slowly through the still air in a continuous gentle cascade, making the wood smell of something between rain and honey and time. Through this falling gold, §1§ moved with the specific delicacy of an animal that was never, in any season, entirely without caution. Goodnight, graceful deer. 🌙", "badger": "The badger sett had been in use for over eighty years. Generations of badgers had dug it, extended it, lined it with fresh bedding, and raised their cubs in its warm dark chambers. The current residents — §1§, §2§, and their three cubs — used the main entrance chamber and three sleeping chambers, connected by tunnels that went six feet below the surface, where the temperature stayed constant y Goodnight, sturdy badgers. 🌙", "reindeer": "The tundra in November was in the process of becoming something else — the last of the sedge grasses flattened by frost, the first serious snow arriving in horizontal curtains driven by winds that came without obstruction from the Arctic Ocean. Goodnight, travelling reindeer. 🌙", "snowy_owl": "The Arctic tundra in December was a study in extremes: at noon, the sun barely scraped the horizon before sinking back below it, painting the snow orange and pink for twenty minutes before darkness returned. In that brief light, and for the long hours of darkness, §1§ was already hunting — because snowy owls, unlike almost every other owl species, hunted by day as well as by night. Goodnight, white owls. 🌙", "hammerhead": "The flat sandy bottom of the warm Caribbean shelf was a landscape of rippled sand and occasional coral heads, and buried just below the sand's surface — detectable to absolutely nothing except the most refined electrical sense in the ocean — were stingrays. Dozens of them, lying flat in the sand, their bodies so perfectly matched to the sandy bottom that they were effectively invisible to sight. Goodnight, wide-eyed hammerheads. 🌙", "sea_lion": "The rocky outcrop half a mile offshore was home to three hundred California sea lions, and at any given moment a third of them were in the water, a third hauled out and sleeping in piled heaps, and a third arguing with each other about territory, rank, and the merits of the particular sleeping spot next to them. Goodnight, swift sea lions. 🌙", "anaconda": "The flooded forest was dark and warm and the water moved in slow currents between the tree trunks, carrying with it the smell of mud and vegetation and the faint chemical traces of every animal that had moved through it in the past several days. Goodnight, immense anacondas. 🌙", "toucan": "The fig tree had been bearing fruit for three days, and half the birds in the rainforest knew about it. §1§ had found it yesterday and spent the morning working through the figs with methodical pleasure, his enormous beak — nearly as long as his body, hollow and surprisingly light, coloured in improbable combinations of orange and yellow and green and black — picking each fig from its stem with  Goodnight, colourful toucans. 🌙", "piranha": "The blackwater river ran slow and tea-dark between the flooded forest walls, its surface broken only by the occasional dimple of a rising fish or the wider rings of something larger, and just below the surface, in the dappled light filtering through the canopy, the shoal of red-bellied piranhas moved together with a coherence that made them look like a single organism rather than sixty separate fi Goodnight, misunderstood piranhas. 🌙", "giant_otter": "The family's territory covered eight kilometres of slow-moving river, and they knew every metre of it. §1§ and §2§ led the group of seven — themselves, their three cubs from last year's litter, and §1§'s sister who had been with them for two seasons — in the morning patrol: a noisy, boisterous, completely characteristic giant otter survey of their waterway, announcing their presence to any e Goodnight, loud and fearless otters. 🌙", "goblin_shark": "The deep slope of the ocean floor, where the continental shelf fell away into the open abyss, was as close to truly unknown territory as anything on Earth. §1§ moved along this slope at six hundred metres depth, his extraordinary head swinging slightly from side to side in the slow, deliberate motion of a deep-sea hunter that had been using this exact technique for a hundred million years. Goodnight, ancient goblin sharks. 🌙", "jellyfish": "She had no brain. No heart. No bones, no eyes, no blood. She was ninety-six percent water, a few simple muscle fibres, a digestive cavity, and a network of nerves so basic that calling it a nervous system was generous. Goodnight, glowing jellies. 🌙", "parrotfish": "The coral reef in the morning light was the most vivid place on Earth, and moving through its upper level — crunching audibly, leaving a trail of white sand, thoroughly remodelling the reef as it went — was §1§. A parrotfish. Goodnight, crunching parrotfish. 🌙", "stonefish": "§1§ had been sitting in exactly this spot for six days. Not because he was waiting for anything in particular, and not because he lacked the ability to move — he was perfectly capable of moving, in short bursts of surprising speed — but because staying perfectly still on this patch of reef was, for a stonefish, the optimal state of being. He was invisible. He was dangerous. Goodnight, patient stonefish. 🌙", "kangaroo_rat": "The Sonoran Desert at three in the morning was cold and completely still and full of things happening that no human observer would have believed was there, had they stood in the empty-looking dark. Under the creosote bushes, under the flat stones, in the burrows below the sandy soil: a whole world of small lives conducting their small business with the concentrated urgency of creatures that had on Goodnight, leaping kangaroo rats. 🌙", "gila_woodpecker": "The saguaro cactus was forty years old — barely middle-aged for a cactus that could live to two hundred — and it had been home to a Gila woodpecker family for three of those years. §1§ had carved the nest hole himself: a vertical excavation in the upper arm of the cactus, driven by beak-strikes at twenty times per second, each strike absorbing an impact that would have caused serious brain damag Goodnight, drumming woodpeckers. 🌙", "cassowary": "The rainforest at the forest-mangrove edge was dense with the specific humidity of a coastal tropical system — the air itself almost thick, the light green-filtered and dim, the ground below the canopy a complex architecture of roots and fallen logs and the accumulated leaf litter of centuries. Through it, making more sound than almost any other animal in the forest, came §1§. Goodnight, magnificent cassowaries. 🌙", "sea_snake": "The mangrove roots descended into the warm tidal water in a complexity that would have been impossible to navigate for most animals — a three-dimensional labyrinth of arching trunks and hanging roots and root tangles that reached from the mud bottom to the surface in a dense interlocking structure. For §1§, it was a perfect hunting environment. Goodnight, banded sea snakes. 🌙", "bat": "As the last purple blush of sunset faded from the sky and the first stars pricked through, §1§ and §2§ dropped from the rafter of the old barn — not falling, but unfolding, their wings spreading in one smooth motion that converted gravity into flight. In the half-second it took to clear the barn door, they were already hunting. Their world was built entirely from sound. Goodnight, swift bats. 🌙", "slow_loris": "The rainforest at midnight was a cathedral of sound and darkness — the continuous insect chorus, the occasional call of a nightjar, the drip of moisture from the canopy above through layer after layer of leaves until it reached the forest floor. And through the middle canopy, moving with a slowness that seemed almost theatrical, came §1§. Goodnight, patient lorises. 🌙", "tawny_owl": "The oak wood in autumn was a completely different place by night. The paths that walkers used, the familiar shapes of trees visible in daylight — all of that was gone now, replaced by something richer and stranger: a world of sound and shadow and the specific scents of damp leaves and fox and the cold river nearby. Goodnight, wise tawny owls. 🌙", "tokay_gecko": "The old temple wall was warm — it had absorbed the day's tropical sun and was releasing it slowly into the night air — and §1§ moved across its surface with a confident ease that ignored entirely the fact that he was travelling upside down along the overhanging section of the eaves. Goodnight, sticky-footed geckos. 🌙", "opossum": "The suburbs were §1§'s territory — a landscape of garden fences and compost heaps and birdfeeders and drainage ditches and the occasional raccoon to navigate around, all of it rich with the specific urban abundance that made cities and towns, for an adaptable omnivore, a more reliable food source than any forest. Goodnight, underrated opossums. 🌙", "skunk": "§1§ walked through the meadow at midnight with the specific unhurried confidence of an animal that had essentially nothing to be afraid of. His striking black-and-white pattern wasn't camouflage — it was the opposite of camouflage. It was an advertisement, as clear and deliberate as a warning sign: I am a skunk. You know what that means. Act accordingly. And animals did act accordingly. Goodnight, bold skunks. 🌙", "orangutan": "The dipterocarp rainforest of Borneo at dusk was a world of diminishing light and enormous trees — trunks four feet across rising sixty feet to the first branch, the canopy above so dense that the last of the evening sky was visible only in occasional patches. Goodnight, wise orangutans. 🌙", "clouded_leopard": "The forest at night was three-dimensional in a way that ground-level hunters never quite grasped: the world did not end at the canopy but continued upward through it, each layer its own community of animals, its own opportunities, its own dangers. §1§ moved through all of it — vertically as easily as horizontally, his body adapted for the trees in ways that no other big cat had matched. Goodnight, secret clouded leopards. 🌙", "sun_bear": "§1§ smelled the bees from half a kilometre away — that specific warm-wax-and-honey smell that, in the experience of any sun bear, meant that something very good was about to happen. He oriented himself carefully, confirmed the direction, and began to move toward it with the focused purposefulness of an animal that had learned exactly how good honey was and was prepared to invest significant effo Goodnight, honey-loving sun bears. 🌙", "binturong": "The binturong smelled of popcorn. Not metaphorically — not in the way that things occasionally smell faintly of other things — but genuinely, strongly, unmistakably of buttered popcorn, the specific smell produced by a chemical compound in its urine that also appeared in popcorn during the heating process. Goodnight, popcorn-scented binturongs. 🌙", "tapir": "The slow river through the Malay forest was warm and dark and exactly the right temperature, and §1§ was in it. He had been in it for twenty minutes, moving slowly through the shallows and occasionally going fully submerged, his flexible nose held up like a snorkel, breathing through it while his body was underwater. Goodnight, ancient tapirs. 🌙", "hornbill": "§1§ called at dawn and the sound rolled across the Borneo forest canopy like something amplified through a megaphone — that extraordinary resonant whooping, produced through the casque on top of his beak, the hollow bony structure that amplified the sound in ways that ornithologists were still trying to fully understand. The call said: I am here. This is my territory. These are my figs. Goodnight, magnificent hornbills. 🌙", "ring_tailed_lemur": "The morning ritual began precisely as the sun cleared the eastern trees, sending long gold shafts through the spiny forest. §1§ turned to face the warmth — arms spread wide, palms open toward the light, his distinctive black-and-white tail curled around his feet — and held the posture of a small animal conducting a ceremony of profound gratitude toward the sun. Goodnight, sun-worshipping lemurs. 🌙", "fossa": "The fossa was Madagascar's apex predator, and it looked like something evolution had built by committee — cat-like head, mongoose-like body, long tail like a civet, semi-retractable claws like a cat, ankle joints that rotated backward like a squirrel's. It was related to none of these things. Goodnight, unique fossas. 🌙", "chameleon": "The panther chameleon's colours at dawn were extraordinary — a cascade of reds and oranges and electric blues shifting across §1§'s body as the morning light increased, each colour communicating something specific to any other panther chameleon that happened to be watching. Goodnight, colourful chameleons. 🌙", "aye_aye": "The aye-aye was one of the strangest animals on Earth, and it moved through the Madagascar rainforest at night with the specific quality of strangeness — those huge ears rotating to catch sound, those enormous lamp-like orange eyes gathering the last light, and that extraordinary elongated middle finger tapping, tapping, tapping on the bark of every dead branch it passed. Goodnight, extraordinary aye-ayes. 🌙", "tenrec": "The leaf litter of the Madagascar rainforest was a universe in miniature — damp and rich with the smell of decomposing vegetation, full of earthworms and beetle larvae and centipedes and all the invertebrate life that made the forest floor its home. Through this universe, §1§ moved with the purposeful efficiency of an animal whose entire world was measured in inches rather than miles. Goodnight, unique tenrecs. 🌙", "tomato_frog": "§1§ was the colour of a ripe tomato. Not approximately, not metaphorically — he was the exact vivid orange-red of a supermarket tomato at its peak, a colour so saturated and deliberate that it looked almost painted. This was intentional. Every predator in northern Madagascar that had tried to eat a tomato frog had learned the same lesson: that vivid colour meant something unpleasant was coming. Goodnight, vivid tomato frogs. 🌙", "bison": "The Great Plains stretched to every horizon — not the flat emptiness people imagined, but a rolling landscape of deep grass that moved in waves like a slow green ocean, the grass itself alive with insects and meadowlarks and the particular smell of warm earth and wildflowers that was the smell of the American prairie in summer. Goodnight, thundering bison. 🌙", "pronghorn": "Nothing else on the North American prairie moved like a pronghorn. §1§ ran at fifty-five miles an hour across the shortgrass flats, not fleeing anything specific but simply running — those extraordinary legs moving in the long reaching stride that burned distance like nothing else on the continent, his white rump patch flared and flashing a warning to the rest of the band spread across the plain Goodnight, swift pronghorns. 🌙", "prairie_dog": "The prairie dog town stretched for two miles in every direction from §1§'s burrow entrance — a complex of connected tunnels, listening chambers, sleeping rooms and escape routes built by his family group over four generations. Goodnight, watchful prairie dogs. 🌙", "golden_eagle": "The thermal above the ridge was a column of rising warm air that §1§ had used every clear afternoon for the three years he had hunted this valley, a reliable invisible elevator that carried him from ridge height to three thousand feet above the grassland
