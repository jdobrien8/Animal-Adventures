      <div class="g2">
        <input id="n1" placeholder="First (boy)" value="${st.n1}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
        <input id="n2" placeholder="Second (girl)" value="${st.n2}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
      </div>
    </div>
    <button onclick="begin()" style="width:100%;background:linear-gradient(135deg,${ac}33,${ac}55);border:1px solid ${ac}77;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:bold">✨ Begin the Adventure</button>
    </div>`;
    return;
  }
  if(pg==="story"&&an){
    const ac=an.accent;
    const pct=((st.idx+(st.typing?.5:1))/st.chunks.length)*100;
    el.innerHTML=`<div class="s"><button onclick="info('${an.key}')" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:30px">${an.emoji}</div>
      <div style="background:rgba(255,255,255,.1);border-radius:99px;height:5px;margin:8px 0;overflow:hidden"><div style="height:100%;background:${ac};width:${pct}%;border-radius:99px"></div></div>
      <div style="font-size:10px;color:rgba(255,255,255,.35)">${st.idx+1} / ${st.chunks.length}</div>
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}33;border-radius:14px;padding:16px;min-height:150px;margin-bottom:14px;line-height:1.8">
      <span id="tt" style="color:rgba(255,255,255,.9);font-size:15px">${st.typed}</span>${st.typing?'<span style="opacity:.4">▋</span>':''}
    </div>
    <div id="sb"></div></div>`;
    doBtns();
    return;
  }
}
draw();
</script></body></html>
