 bird!)", "Compsognathus dinosaurs", "Large fish", "Ammonites", "Horseshoe crabs"], "facts": ["Pterodactylus was actually quite small — about the size of a modern hawk! Most people imagine it much bigger 😮", "It was NOT a dinosaur — pterosaurs were a separate group of flying reptiles 🦎", "The wing was formed by an enormously elongated fourth finger — imagine your ring finger as long as your whole arm! 👆"], "bg": "#020810", "accent": "#a78bfa"}, "triceratops": {"category": "prehistoric", "emoji": "🦕", "name": "Triceratops", "habitat": "Late Cretaceous Forests & Plains", "habitatEmoji": "🦕", "predators": ["T. rex (its main predator — fossil evidence shows healed bite marks on Triceratops bones!)"], "prey": ["Palms", "Cycads", "Ferns", "Flowering plants"], "neighbours": ["T. rex", "Edmontosaurus", "Ankylosaurus", "Pterosaurs", "Pachycephalosaurus"], "facts": ["Triceratops horns were real bone — not just display — and healed bite marks prove they fought T. rex! ⚔️", "Its frill may have been brightly coloured for communication and attracting mates 🌈", "Triceratops had the largest skull of any land animal ever — up to 10 feet long! 😮"], "bg": "#0a0500", "accent": "#22c55e"}, "raptor": {"category": "prehistoric", "emoji": "🦖", "name": "Velociraptor", "habitat": "Late Cretaceous Desert & Scrubland", "habitatEmoji": "🦕", "predators": ["Larger theropod dinosaurs", "Oviraptors (competition)", "Large crocodilians"], "prey": ["Protoceratops", "Lizards", "Small mammals", "Insects"], "neighbours": ["Protoceratops", "Oviraptor", "Psittacosaurus", "Small early mammals", "Lizards"], "facts": ["Real Velociraptors were only the size of a turkey — movie raptors are actually based on Deinonychus! 🦃", "They definitely had feathers — Velociraptor had quill knobs on its arm bones, just like modern birds 🪶", "The famous sickle claw was used to pin prey and hold it still, not to slash 🌙"], "bg": "#0a0300", "accent": "#f59e0b"}, "brachiosaurus": {"category": "prehistoric", "emoji": "🦕", "name" rs": ["Larger pterosaurs", "Small theropod dinosaurs", "Large fish"], "prey": ["Insects", "Small lizards", "Worms", "Small fish"], "neighbours": ["Pterodactylus", "Compsognathus dinosaurs", "Horseshoe crabs", "Ammonites", "Small mammals"], "facts": ["Archaeopteryx is a missing link between dinosaurs and birds! 🔬", "It had feathers like a bird but teeth and a bony tail like a dinosaur 🦷", "It is 150 million years old — the earliest known bird! 🐦"], "bg": "#020810", "accent": "#fbbf24"}, "diplodocus": {"category": "prehistoric", "emoji": "🦕", "name": "Diplodocus", "habitat": "Late Jurassic Floodplains", "habitatEmoji": "🦕", "predators": ["Allosaurus", "Ceratosaurus", "Torvosaurus"], "prey": ["Ferns", "Cycads", "Horsetails", "Soft low vegetation"], "neighbours": ["Brachiosaurus", "Allosaurus", "Stegosaurus", "Pterosaurs", "Camarasaurus"], "facts": ["Diplodocus was up to 90 feet long — one of the longest animals ever! 📏", "Its tail had over 80 vertebrae and could crack like a whip making a sonic boom! 💥", "It held its neck horizontally and ate low-growing plants 🌿"], "bg": "#0a0500", "accent": "#84cc16"}, "sarcosuchus": {"category": "prehistoric", "emoji": "🐊", "name": "Sarcosuchus", "habitat": "Early Cretaceous Rivers", "habitatEmoji": "🦕", "predators": ["Very large theropod dinosaurs"], "prey": ["Large dinosaurs at the waterhole", "Giant fish", "Turtles", "Smaller crocodilians"], "neighbours": ["Spinosaurus", "Iguanodonts", "Giant fish", "Pterosaurs", "Small theropods"], "facts": ["Sarcosuchus was 40 feet long and weighed 8 tonnes — the largest crocodilian ever! 😮", "It had over 130 teeth and its jaws could never fully close 🦷", "It could ambush dinosaurs that came to drink at the river 🌊"], "bg": "#0a0500", "accent": "#15803d"}, "saurolophus": {"category": "prehistoric", "emoji": "🦕", "name": "Saurolophus", "habitat": "Late Cretaceous Floodplains", "habitatEmoji": "🦕", "predators": ["T. rex", "Albertosaurus", "Dromaeosaur packs"], "prey": ["Conifers", "Flowering plan itat": "Late Cretaceous Forests and Floodplains", "habitatEmoji": "🦕", "predators": ["T. rex", "Albertosaurus", "Dromaeosaur packs"], "prey": ["Pine needles", "Leaves", "Twigs", "Seeds", "Flowering plants"], "neighbours": ["T. rex", "Triceratops", "Pterosaurs", "Ankylosaurs", "Small mammals"], "facts": ["Parasaurolophus had a hollow crest up to 6 feet long that worked like a trombone — making deep booming calls! 🎺", "Scientists have recreated its call using CT scans — it sounded like a deep foghorn 📣", "It could walk on two legs or four — switching between them depending on speed 🦕"], "bg": "#0a0500", "accent": "#f97316"}, "allosaurus": {"category": "prehistoric", "emoji": "🦖", "name": "Allosaurus", "habitat": "Late Jurassic Floodplains and Forests", "habitatEmoji": "🦕", "predators": ["Larger Allosaurus", "Sauropod tail whips", "Stegosaurus thagomizer"], "prey": ["Stegosaurus", "Diplodocus", "Brachiosaurus (young)", "Camptosaurus", "Dryosaurus"], "neighbours": ["Stegosaurus", "Diplodocus", "Brachiosaurus", "Pterosaurs", "Ceratosaurus"], "facts": ["Allosaurus was the apex predator of the Late Jurassic — the T. rex of its time, 30 million years earlier! ⏳", "It may have hunted in groups to bring down giant sauropods — the largest prey of any predator ever 🤝", "Its skull had large holes in it to reduce weight — letting it have a huge head without being too heavy 💀"], "bg": "#0a0500", "accent": "#ef4444"}, "iguanodon": {"category": "prehistoric", "emoji": "🦕", "name": "Iguanodon", "habitat": "Early Cretaceous Forests and Plains", "habitatEmoji": "🦕", "predators": ["Baryonyx", "Neovenator", "Utahraptor"], "prey": ["Horsetails", "Cycads", "Conifers", "Ferns", "Flowering plants"], "neighbours": ["Baryonyx", "Polacanthus", "Pterosaurs", "Early crocodilians", "Small mammals"], "facts": ["Iguanodon was one of the first dinosaurs ever scientifically described — in 1825! 📜", "It had a large spike on its thumb — probably used as a weapon against predators 👆", "Iguanodon could walk on two legs or four — using all fours when grazing slowly 🦕"], "bg": "#0a0500", "accent": "#84cc16"}, "supersaurus": {"category": "prehistoric", "emoji": "🦕", "name": "Supersaurus", "habitat": "Late Jurassic Floodplains", "habitatEmoji": "🦕", "predators": ["Allosaurus", "Torvosaurus", "Ceratosaurus (attack young)"], "prey": ["Treetop conifers", "Giant ferns", "Cycads", "Horsetails", "Ancient mosses"], "neighbours": ["Allosaurus", "Stegosaurus", "Diplodocus", "Brachiosaurus", "Pterosaurs"], "facts": ["Supersaurus was one of the longest animals ever — up to 110 feet from nose to tail tip! 📏", "It weighed around 40 tonnes — as heavy as 6 or 7 large elephants 🐘", "Its neck alone was nearly 40 feet long — longer than most dinosaurs were from head to tail! 🦕"], "bg": "#0a0500", "accent": "#86efac"}, "edmontosaurus": {"category": "prehistoric", "emoji": "🦕", "name": "Edmontosaurus", "habitat": "Late Cretaceous Forests and Coasts", "habitatEmoji": "🦕", "predators": ["T. rex", "Albertosaurus", "Dromaeosaur packs"], "prey": ["Pine needles", "Magnolia leaves", "Twigs", "Seeds", "Flowering plants"], "neighbours": ["T. rex", "Triceratops", "Ankylosaurus", "Pterosaurs", "Small mammals"], "facts": ["Edmontosaurus was one of the largest hadrosaurs — up to 40 feet long and 4 tonnes! 📏", "Fossils have been found with T. rex bite marks on the tail — and healed! The edmontosaurus survived the attack 💪", "It may have had a fleshy comb or crest on its head like a rooster — we know from mummified fossils! 🐓"], "bg": "#0a0500", "accent": "#fb923c"}, "kangaroo": {"category": "australian", "emoji": "🦘", "name": "Red Kangaroo", "habitat": "Australian Outback & Grasslands", "habitatEmoji": "🌿", "predators": ["Dingoes", "Wedge-tailed Eagles", "Humans (historically)", "Large Goannas (joeys)"], "prey": ["Grasses", "Shrubs", "Leaves", "Roots", "Bark"], "neighbours": ["Emus", "Wombats", "Dingoes", "Wedge-tailed Eagles", "Wallabies"], "facts": ["Red kangaroos are the largest marsupials on Earth — asses between them.\n\n§N2§ meanwhile has found a zebra and made an easy catch.\n§N1§ returns and catches a wildebeest nearby.\nThey share their Meal and continue exploring.\n\nThen — hyenas appears on the horizon, watching them.\n§N1§ and §N2§ move calmly but quickly to a safer position.\nThey wait until the hyenas lose interest and disappears.\n\nAs the night goes on they encounter more of their Neighbours.\n\nAlong the way they see:\n* Giraffes\n* Elephants\n* Cheetahs\n* Meerkats\n* African Wild Dogs\n\nAs they settle down to rest, §N1§ spots the giraffe one more time nearby — resting peacefully.\nTwo very different animals, sharing the same quiet night.\n\nThey have eaten. They have made a new acquaintance. They have stayed safe.\n\n✅ Food eaten: Zebra, Wildebeest\n⚠️ Predator avoided: Hyenas (in large packs)\n👀 New friend spotted: Giraffes\n\nGoodnight, lions. 🌙", "cheetah": "The African sun melts toward the horizon. Golden grass ripples in the warm breeze. Acacia trees cast long shadows across the plains.\n\nTonight §N1§ and §N2§ have an important task — finding the perfect place to make their Nest and rest.\n\nThey search carefully, checking every option.\nToo exposed here. Too damp there. Too close to where lions has been.\nThey move on, looking for just the right spot.\n\nOn the way §N1§ spots a thomson's gazelle and catches it quickly — a good start to the night.\n§N2§ finds a impala nearby and catches it too.\nThey eat well, then continue their Search.\n\nAt last they find it — a sheltered spot, hidden, safe, perfectly placed.\n§N1§ begins to arrange it just right while §N2§ keeps watch.\nEvery so often they swap — one resting, one watching — until the nest is ready.\n\nWhile they work they notice their Neighbours nearby.\n\nAlong the way they see:\n* Giraffes\n* Ostriches\n* Warthogs\n* Secretary Birds\n* Mongooses\n\nWith the nest finished, they settle in together — warm, safe, and content.\n\nThey have eaten. They have built their Perfect resting plac ct place to make their Nest and rest.\n\nThey search carefully, checking every option.\nToo exposed here. Too damp there. Too close to where a great white sharks has been.\nThey move on, looking for just the right spot.\n\nOn the way §N1§ spots a herring and catches it quickly — a good start to the night.\n§N2§ finds a anchovy nearby and catches it too.\nThey eat well, then continue their Search.\n\nAt last they find it — a sheltered spot, hidden, safe, perfectly placed.\n§N1§ begins to arrange it just right while §N2§ keeps watch.\nEvery so often they swap — one resting, one watching — until the nest is ready.\n\nWhile they work they notice their Neighbours nearby.\n\nAlong the way they see:\n* Harbour Porpoises\n* Atlantic Puffins\n* Great Blue Herons\n* American Lobsters\n* Oystercatchers\n\nWith the nest finished, they settle in together — warm, safe, and content.\n\nThey have eaten. They have built their Perfect resting place. The north atlantic & pacific coastlines is quiet around them.\n\n✅ Food eaten: Herring, Anchovy\n⚠️ Predator avoided: Great White Sharks\n👀 Animals seen: Harbour Porpoises, Atlantic Puffins, Great Blue Herons\n\nGoodnight, harbor seals. 🌙", "puffin": "Waves crash rhythmically against the rocky shore. Salt spray fills the cool evening air. Seabirds call as the tide begins to turn.\n\nTonight §N1§ and §N2§ are focused on one thing — finding an excellent dinner.\n\n§N1§ has been thinking about sand eels (main food) all day and knows exactly where to look.\n§N2§ has a different idea and heads toward a spot where herring can often be found.\nThey split up, each following their Instincts.\n\n§N1§ tracks patiently — moving slowly, reading every clue in the ground and air.\nAfter a careful stalk, the catch is made. A perfect sand eels (main food).\n§N2§ is equally successful, returning with a fine herring.\n\nThey come together to enjoy their Feast — but a great black-backed gulls has smelled dinner too.\nIt approaches boldly, hoping to steal the . They have made a new acquaintance. They have stayed safe.\n\n✅ Food eaten: Sea Urchins (Favourite!), Clams\n⚠️ Predator avoided: Great White Sharks\n👀 New friend spotted: Harbor Seals\n\nGoodnight, sea otters. 🌙", "oystercatcher": "Waves crash rhythmically against the rocky shore. Salt spray fills the cool evening air. Seabirds call as the tide begins to turn.\n\nTonight §N1§ and §N2§ are focused on one thing — finding an excellent dinner.\n\n§N1§ has been thinking about mussels (main food) all day and knows exactly where to look.\n§N2§ has a different idea and heads toward a spot where cockles can often be found.\nThey split up, each following their Instincts.\n\n§N1§ tracks patiently — moving slowly, reading every clue in the ground and air.\nAfter a careful stalk, the catch is made. A perfect mussels (main food).\n§N2§ is equally successful, returning with a fine cockles.\n\nThey come together to enjoy their Feast — but a peregrine falcons has smelled dinner too.\nIt approaches boldly, hoping to steal the meal.\n§N1§ and §N2§ stand firm together until the peregrine falcons decides it is not worth the trouble and leaves.\nTheir dinner is safe.\n\nWhile they eat they watch the world around them.\n\nAlong the way they see:\n* Dunlin\n* Curlew\n* Harbor Seals\n* Turnstones\n* Purple Sandpipers\n\nFull and satisfied, they find a warm spot and curl up together as the night settles in.\n\nThey have prepared and eaten a wonderful dinner. They have defended it. A great catch of evening.\n\n✅ Dinner: Mussels (Main Food), Cockles\n⚠️ Predator driven off: Peregrine Falcons\n👀 Animals seen: Dunlin, Curlew, Harbor Seals\n\nGoodnight, oystercatchers. 🌙", "trex": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTonight §N1§ and §N2§ are focused on one thing — finding an excellent dinner.\n\n§N1§ has been thinking about triceratops all day and knows exactly where to look.\n§N2§ has a different idea and heads toward a spot where edmontosaurus can often be found.\nThey split up, each following their Instincts.\n\n§N1§ tracks patiently — moving slowly, reading every clue in the ground and air.\nAfter a careful stalk, the catch is made. A great catch of triceratop.\n§N2§ is equally successful, returning with a fine edmontosaurus.\n\nThey come together to enjoy their Feast — but a other t. rex has smelled dinner too.\nIt approaches boldly, hoping to steal the meal.\n§N1§ and §N2§ stand firm together until the other t. rex decides it is not worth the trouble and leaves.\nTheir dinner is safe.\n\nWhile they eat they watch the world around them.\n\nAlong the way they see:\n* Triceratops\n* Edmontosaurus\n* Ankylosaurus\n* Pterosaurs\n* Crocodilians\n\nFull and satisfied, they find a warm spot and curl up together as the night settles in.\n\nThey have prepared and eaten a wonderful dinner. They have defended it. A great catch of evening.\n\n✅ Dinner: Triceratops, Edmontosaurus\n⚠️ Predator driven off: Other T. rex (main threat — they fought each other!)\n👀 Animals seen: Triceratops, Edmontosaurus, Ankylosaurus\n\nGoodnight, tyrannosaurus rexes. 🌙", "mosasaurus": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTonight §N1§ and §N2§ are not just looking for food — they are curious about the world around them.\n\nThey move through their Late cretaceous shallow seas, watching and listening to everything.\n§N1§ spots a ammonite nearby — an animal they do not usually get close to.\nInstead of ignoring it, §N1§ watches carefully from a respectful distance.\nThe ammonite watches back. Neither moves. A quiet moment of curiosity passes between them.\n\n§N2§ meanwhile has found sharks and made an easy catch.\n§N1§ returns and catches a large fish nearby.\nThey share their Meal and continue exploring.\n\nThen — a other large mosasaurs appears on the horizon, watching them.\n§N1§ and §N2§ move calmly but quickly to a safer position.\nThey wait until the other large mosasaurs loses interest and disappears.\n\nAs the night goes on they encounter more of their Neighbours.\n\nAlong the way they see:\n* Ammonites\n* Giant sea turtles\n* Plesiosaurs\n* Sharks\n* Xiphactinus fish\n\nAs they settle down to rest, §N1§ spots the ammonite one more time nearby — resting peacefully.\nTwo very different animals, sharing the same quiet night.\n\nThey have eaten. They have made a new acquaintance. They have stayed safe.\n\n✅ Food eaten: Sharks, Large Fish\n⚠️ Predator avoided: Other large mosasaurs (the only real threat)\n👀 New friend spotted: Ammonites\n\nGoodnight, mosasauri. 🌙", "giganotosaurus": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTonight §N1§ and §N2§ are focused on one thing — finding an excellent dinner.\n\n§N1§ has been thinking about argentinosaurus (the largest dinosaur!) all day and knows exactly where to look.\n§N2§ has a different idea and heads toward a spot where hadrosaurs can often be found.\nThey split up, each following their Instincts.\n\n§N1§ tracks patiently — moving slowly, reading every clue in the ground and air.\nAfter a careful stalk, the catch is made. A perfect argentinosaurus (the largest dinosaur!).\n§N2§ is equally successful, returning with a fine hadrosaurs.\n\nThey come together to enjoy their Feast — but a other giganotosaurus has smelled dinner too.\nIt approaches boldly, hoping to steal the meal.\n§N1§ and §N2§ stand firm together until the other giganotosaurus decides it is not worth the trouble and leaves.\nTheir dinner is safe.\n\nWhile they eat they watch the world around them.\n\nAlong the way they see:\n* Argentinosaurus\n* Sarcosuchus (giant crocodile)\n* Pterosaurs\n* Iguanodonts\n* Titanosaurs\n\nFull and satisfied, they find a warm spot and curl up together as the night settles in.\n\nThey have prepared and eaten a wonderful dinner. They have defended it. A great catch of evening.\n\n✅ Dinner: Argentinosaurus (The Largest Dinosaur!), Hadrosaurs\n⚠️ Predator driven off: Other Giganotosaurus\n👀 Animals seen: Argentinosaurus, Sarcosuchus (giant crocodile), Pterosaurs\n\nGoodnight, giganotosauri. 🌙", "pterodactyl": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTwo pterodactyli are on the move tonight, hungry and ready to hunt.\n\n§N1§ lifts their Nose to the air and catches a scent — fish nearby.\n§N2§ spots movement in the distance and signals with a look.\nThey separate quietly, moving to surround their Prey from two sides.\n\n§N1§ moves low and slow, closing the gap with total patience.\nAt exactly the right moment — they strike together.\n§N1§ catches a fish and §N2§ finds a insects nearby.\nThey bring their Catches together and share a well-earned meal.\n\nBut then — danger.\nA larger pterosaurs appears, drawn by the activity.\n§N1§ and §N2§ move swiftly to safety, leaving nothing behind.\nThey watch from a safe distance until the larger pterosaurs moves on.\n\nNow full and safe, they explore their Surroundings.\n\nAlong the way they spot:\n* Archaeopteryx (early bird!)\n* Compsognathus dinosaurs\n* Large fish\n* Ammonites\n* Horseshoe crabs\n\nAs the night deepens they find a sheltered spot and settle in together.\n\nThey have hunted well. They have stayed safe. Another wonderful night in the late jurassic coastal lagoons.\n\n✅ Food eaten: Fish, Insects\n⚠️ Predator avoided: Larger pterosaurs\n👀 Animals seen: Archaeopteryx (early bird!), Compsognathus dinosaurs, Large fish\n\nGoodnight, pterodactyli. 🌙", "triceratops": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTonight §N1§ and §N2§ are focused on one thing — finding an excellent dinner.\n\n§N1§ has been thinking about palms all day and knows exactly where to look.\n§N2§ has a different idea and heads toward a spot where cycads can often be found.\nThey split up, each following their Instincts.\n\n§N1§ tracks patiently — moving slowly, reading every clue in the ground and air.\nAfter a careful stalk, the catch is made. A great catch of palm.\n§N2§ is equally successful, returning with a fine cycads.\n\nThey come together to enjoy their Feast — but a t. rex has smelled dinner too.\nIt approaches boldly, hoping to steal the meal.\n§N1§ and §N2§ stand firm together until the t. rex decides it is not worth the trouble and leaves.\nTheir dinner is safe.\n\nWhile they eat they watch the world around them.\n\nAlong the way they see:\n* T. rex\n* Edmontosaurus\n* Ankylosaurus\n* Pterosaurs\n* Pachycephalosaurus\n\nFull and satisfied, they find a warm spot and curl up together as the night settles in.\n\nThey have prepared and eaten a wonderful dinner. They have defended it. A great catch of evening.\n\n✅ Dinner: Palms, Cycads\n⚠️ Predator driven off: T. rex (its main predator — fossil evidence shows healed bite marks on Triceratops bones!)\n👀 Animals seen: T. rex, Edmontosaurus, Ankylosaurus\n\nGoodnight, triceratops. 🌙", "raptor": "Millions of years ago the Earth looked very different. Giant ferns and strange trees covered vast ancient floodplains. Enormous creatures ruled this world.\n\nTonight §N1§ and §N2§ have decided to explore a part of their Late cretaceous desert & scrubland they have never visited before.\n\nThey move carefully, taking in every new smell and sound.\nThe territory is unfamiliar — every shadow could hide something unexpected.\n\n§N1§ discovers a rich patch of protoceratops along the way and makes a quick catch.\n§N2§ finds a lizards nearby and catches it with easy skill.\nThey eat as they go, staying alert.\n\nSuddenly they freeze — a larger theropod dinosaurs is nearby, moving through the same area.\n§N1§ signals to §N2§ and they both go completely still.\nThe larger theropod dinosaurs passes within sight — but does not detect them.\nThey wait until it is long gone before moving again.\n\nDeeper into their Territory they make exciting discoveries.\n\nAlong the way they see:\n* Protoceratops\n* Oviraptor\n* Psittacosaurus\n* Small early mammals\n* Lizards\n\nAs the night grows late they turn back toward familiar ground and find their Favourite resting place.\n\nThey have explored somewhere new. They have stayed safe. It has been an adventure.\n\n✅ Food found: Protoceratops, Lizards\n⚠️ Predator avoided: Larger theropod dinosaurs\n👀 Animals seen: Protoceratops, Oviraptor, Psittacosaurus\n\nGoodnight, velociraptors. 🌙", "brachiosaurus": "Late Jurassic floodplains stretched to the horizon. Giant conifers rose a hundred feet into the warm sky. The air smelled of ancient plants and slow rivers.\n\nTwo brachiosauruses move slowly through the tree line, their enormous necks reaching high into the canopy above.\n\nBefore moving far, they check the air carefully.\n\nAn allosaurus has been in the area today — its tracks are fresh in the soft earth nearby. A ceratosaurus can be heard calling somewhere to the south. §N1§ and §N2§ stay close together and move toward the river.\n\nTonight §N1§ and §N2§ are searching for the best possible dinner.\n\n§N1§ stretches up into the crown of a giant conifer and strips a whole mouthful of fresh shoots — the very best leaves, thirty feet off the ground.\n§N2§ finds a patch of enormous ferns near the riverbank and feeds steadily, sweeping whole armfuls into their mouth.\nThey eat side by side, their footsteps making the ground shake with every slow step.\n\nThen — the allosaurus reappears at the forest edge, watching them.\nIt circles at a cautious distance. A full-grown brachiosaurus is simply too large to attack directly.\n§N1§ turns toward it and takes two steps forward — enough to make the point.\nThe allosaurus retreats back into the tree line.\n\nAs they continue feeding they notice their prehistoric neighbours going about their ancient lives.\n\nAlong the way they see:\n* Stegosaurus grazing nearby\n* Pterosaurs gliding overhead\n* Diplodocus at the river's edge\n* Camptosaurus in the undergrowth\n* Small early mammals darting through the roots\n\nAs the prehistoric sun sets in brilliant orange and red, §N1§ and §N2§ settle beside the river.\nThey rest together — two of the largest creatures ever to walk the Earth — as the ancient forest grows quiet.\n\nThey have eaten well. They have stayed safe. Another peaceful night in the Late Jurassic.\n\n✅ Food eaten: Conifer shoots, Ferns\n⚠️ Predator avoided: Allosaurus\n👀 Animals seen: Stegosaurus, Pterosaurs, Diplodocus\n\nGoodnight, brachiosauruses. 🌙", "spinosaurus": "The ancient river delta was vast and warm. Mangrove-like trees lined the waterways as giant fish leapt in the evening light. The air smelled of water and warm mud.\n\nTwo spinosauruses wade through the shallows of a great prehistoric river, their distinctive sail-backs rising above the surface.\n\nBefore going far, they test the water carefully.\n\nA carcharodontosaurus has been hunting along this riverbank — its tracks are pressed deep into the mud. Giant crocodilians rest on the far bank, watching. §N1§ and §N2§ move upstream where the fishing is better.\n\nTonight they are focused on one thing — finding an excellent dinner.\n\n§N1§ stands perfectly still in the shallows, watching the water. A massive prehistoric fish circles below.\nWith explosive speed §N1§ plunges their snout into the water and comes up with an enormous fish clamped in long jaws.\n§N2§ wades into deeper water and finds a giant turtle moving slowly along the bottom — an easy catch.\nThey drag their catches onto a muddy bank and eat with satisfaction.\n\nThen the carcharodontosaurus appears at the river's edge — drawn by the smell of food.\nIt is enormous — nearly as large as them. This is a real challenge.\n§N1§ and §N2§ face it together, side by side, making themselves as imposing as possible.\nAfter a long standoff the rival backs away and moves upstream.\nThe meal is safe.\n\nAs evening turns to night they watch the prehistoric river world around them.\n\nAlong the way they see:\n* Giant prehistoric fish leaping in the river\n* Pterosaurs swooping low over the water\n* Giant crocodilians resting on the far bank\n* Small iguanodont dinosaurs drinking at the edge\n* Strange prehistoric turtles in the shallows\n\nThey settle into the warm shallows as the ancient stars appear.\nThe river flows quietly around them as they rest.\n\nThey have eaten a magnificent dinner. They have defended it. A perfect prehistoric evening.\n\n✅ Dinner: Giant prehistoric fish, Turtle\n⚠️ Predator driven off: Carcharodontosaurus\n👀 Animals seen: Giant fish, Pterosaurs, Crocodilians\n\nGoodnight, spinosauruses. 🌙", "ankylosaurus": "The Late Cretaceous forest was dense and warm. Flowering plants covered the ground and ancient ferns lined every path. Somewhere in the trees a T. rex had been roaring since midday.\n\nTwo ankylosauruses move slowly through the undergrowth, their armoured backs glinting in the fading light.\n\nBefore moving far, they stop and listen carefully.\n\nThe T. rex is still nearby — its footsteps can be felt through the ground before they can be heard. §N1§ and §N2§ lower themselves slightly and continue moving through the dense ferns where their armour blends into the shadows.\n\nTonight §N1§ and §N2§ are exploring a new part of their territory.\n\n§N1§ finds a rich patch of low ferns and begins to graze steadily, their beak-like mouth perfect for cropping plants close to the ground.\n§N2§ discovers a patch of flowering plants — something new in this ancient world — and tries them cautiously. Delicious.\nThey graze together peacefully, the sounds of the ancient forest all around them.\n\nThen the T. rex finds them.\n\nIt approaches with heavy footsteps that shake the ground. It circles, looking for a weakness.\n§N1§ and §N2§ stand perfectly still, presenting only armour in every direction.\nThe T. rex sniffs them, nudges §N1§ with its snout — and gets a sharp swing of the club tail in reply.\nThe T. rex steps back, reconsidering. It tries to flip §N1§ over to reach the soft belly — but cannot get purchase on the smooth armour.\nAfter a long frustrating standoff, the T. rex gives up and walks away into the trees.\nThe living tanks have won.\n\nThey continue their peaceful grazing as their prehistoric neighbours go about their evening.\n\nAlong the way they see:\n* T. rex disappearing into the trees\n* Triceratops grazing in a clearing\n* Pterosaurs roosting in high branches\n* Small early mammals watching from the undergrowth\n* Edmontosaurus moving in a herd nearby\n\nAs the ancient night settles in, §N1§ and §N2§ find a sheltered spot between two large trees and rest.\nTheir armour glints in the moonlight. Nothing will disturb them tonight.\n\nThey have eaten. They have faced a T. rex and won. Another remarkable night in the Late Cretaceous.\n\n✅ Food eaten: Ferns, Flowering plants\n⚠️ Predator defeated: T. rex\n👀 Animals seen: Triceratops, Pterosaurs, Edmontosaurus\n\nGoodnight, ankylosauruses. 🌙", "archaeopteryx": "A Late Jurassic lagoon glittered in the warm evening light. Limestone cliffs rose on either side. The water was shallow and clear and full of small ancient fish.\n\nTwo archaeopteryxes perch on a low branch above the lagoon, their feathered wings half-spread to catch the last of the sun's warmth.\n\nThey are an extraordinary creature — part dinosaur, part bird. They have feathers and wings but also teeth, a long bony tail and clawed hands on their wings. They are among the very first birds that ever existed.\n\nTonight §N1§ and §N2§ are curious and want to explore the lagoon shore.\n\n§N1§ hops along the waterline, stabbing at small insects with toothed jaws — catching several quickly.\n§N2§ spots a small lizard basking on a warm rock and pounces on it with surprising speed.\nThey eat on the wing, hopping and gliding along the shore.\n\nA larger pterosaur sweeps low over the lagoon — a threat from the air.\n§N1§ and §N2§ drop instantly into the dense reeds at the lagoon's edge.\nThey press into the stems and stay perfectly still as the pterosaur circles overhead.\nIt passes by without finding them and glides away along the cliff face.\n\nThey emerge and continue their exploration of the ancient shore.\n\nAlong the way they see:\n* Pterodactylus catching fish over the lagoon\n* Compsognathus dinosaurs picking through the tideline\n* Horseshoe crabs moving in the shallows\n* Ammonites just visible below the surface\n* Dragonflies larger than any alive today\n\nAs the Jurassic sun sets they find a sheltered spot in the reeds and settle in together.\nTwo ancient proto-birds resting on an island that will one day be part of Europe.\n\nThey have eaten. They have explored the ancient shore. They have stayed safe.\n\n✅ Food eaten: Insects, Small lizard\n⚠️ Predator avoided: Large pterosaur\n👀 Animals seen: Pterodactylus, Compsognathus, Horseshoe crabs\n\nGoodnight, archaeopteryxes. 🌙", "diplodocus": "The Late Jurassic plains were ancient and enormous. Giant conifers and tree ferns stretched in every direction. The ground trembled faintly with the movement of enormous creatures.\n\nTwo diplodocuses move across the open floodplain, their immensely long tails trailing behind them.\n\nTheir tails are extraordinary — nearly fifty feet long, made of over eighty small bones, tapering to a thin tip that can crack through the air like a whip. Tonight they may need them.\n\nBefore going far, §N1§ sweeps their tail slowly through the air — a habit, like checking a tool is ready.\n\nAn allosaurus has been watching from the tree line since dusk. Another was spotted heading this way from the north. §N1§ and §N2§ move toward the river where the ground is more open and there is less cover for ambush.\n\nTonight they are looking for the best plants along the riverbank.\n\n§N1§ and §N2§ graze side by side along the water's edge, their long necks sweeping horizontally through the low vegetation.\n§N1§ finds a dense patch of horsetails and strips them efficiently.\n§N2§ discovers a bank of soft ferns and feeds steadily in the warm evening air.\n\nThe allosaurus makes its move — rushing from the tree line at full speed.\n§N1§ swings their tail in a wide arc. The tip cracks through the air with a sound like a thunderclap.\nThe allosaurus flinches and circles. The tail cracks again — louder.\nThe allosaurus decides this is not worth it and retreats to the shadows.\nThe tail has done its job perfectly.\n\nThey continue grazing as the ancient plains settle into evening.\n\nAlong the way they see:\n* Brachiosaurus reaching into the treetops nearby\n* Stegosaurus grazing in the distance\n* Pterosaurs gliding on the last thermals of the day\n* A small herd of Camarasaurus at the river bend\n* Firefly-like ancient insects over the water\n\nAs the Jurassic night closes in, §N1§ and §N2§ rest beside the river.\nTwo of the longest animals that ever lived, resting peacefully under an ancient sky.\n\nThey have eaten well. They have defended themselves. A perfect night on the ancient plains.\n\n✅ Food eaten: Horsetails, Ferns\n⚠️ Predator driven off: Allosaurus\n👀 Animals seen: Brachiosaurus, Stegosaurus, Pterosaurs\n\nGoodnight, diplodocuses. 🌙", "sarcosuchus": "An ancient river stretched wide and dark through the Early Cretaceous floodplain. Giant trees leaned over the water. The air was warm and heavy and smelled of mud and deep water.\n\nTwo sarcosuchuses rest motionless at the river's edge — so still they look like logs, half in and half out of the water. They are forty feet long. Their jaws hold over a hundred and thirty teeth.\n\nThey are the largest crocodilians that will ever live on Earth.\n\nThey have been here since before dawn, barely moving, watching everything that comes to the water.\n\n§N1§ detects a giant prehistoric fish moving through the deep channel — that long-distance sense through the water that crocodilians had even 112 million years ago.\n§N1§ slides silently into the river and drifts downstream, invisible below the surface.\nThe fish does not see the danger until it is too late.\n§N2§ finds a large turtle moving along the bottom and catches it with ease.\nThey drag their catches onto a sandbar and eat well.\n\nA spinosaurus appears at the river bend — that enormous sail-backed predator, also hunting the river.\nIt spots them on the sandbar and wades toward the fish remains.\n§N1§ and §N2§ open their jaws wide — that enormous gape, all those teeth.\nEven a spinosaurus respects a pair of giant crocodilians defending their meal.\nIt takes what scraps are on the edge of the sandbar and moves upstream.\n\nAs the ancient river evening settles in they return to their watching position.\n\nAlong the way they see:\n* Spinosaurus moving along the far bank\n* Giant prehistoric fish leaping at the surface\n* Pterosaurs skimming low over the water\n* Small iguanodonts drinking nervously downstream\n* Ancient turtles basking on rocks\n\nThey settle back into their log-like stillness as the warm prehistoric night begins.\nThe river flows quietly past. Nothing moves without them knowing.\n\nThey have eaten. They have held their ground. The river belongs to them.\n\n✅ Food eaten: Giant prehistoric fish, Turtle\n⚠️ Rival driven off: Spinosaurus\n👀 Animals seen: Spinosaurus, Giant fish, Pterosaurs\n\nGoodnight, sarcosuchuses. 🌙", "saurolophus": "Late Cretaceous floodplains stretched in every direction. Forests of ancient conifers and flowering plants lined the wide river channels. The air was warm and thick with the sounds of an enormous herd.\n\nTwo saurolophuses move with their herd across the ancient floodplain, their distinctive head crests raised as they call to one another.\n\nBefore going far they stop and test the air carefully.\n\nA T. rex has been in the area since yesterday — its tracks are pressed deep into the soft riverbank mud. §N1§ and §N2§ stay close to the centre of the herd where there is safety in numbers.\n\nTonight §N1§ and §N2§ are focused on finding the best dinner in the herd's new grazing area.\n\n§N1§ finds a stand of ancient conifers at the forest edge and strips mouthful after mouthful of needles and shoots with their wide duck-like beak.\n§N2§ discovers a rich patch of flowering plants — something relatively new in this ancient world — and grazes steadily.\nTheir hundreds of tightly packed teeth grind the tough vegetation into a fine paste. They eat a great deal.\n\nThen the herd alarm sounds — that deep booming honk from the crest that carries for miles across the floodplain.\nA T. rex has appeared at the herd's edge.\nThe whole herd surges and moves as one, thousands of tonnes of dinosaur in motion.\n§N1§ and §N2§ run with the herd, staying in the middle, the T. rex falling further behind.\nAfter a long run the predator gives up and the herd slows to a walk.\n\nAs the evening settles they watch their prehistoric world around them.\n\nAlong the way they see:\n* T. rex watching from the tree line\n* Triceratops grazing nearby\n* Ankylosaurus moving slowly through the undergrowth\n* Pterosaurs roosting in the treetops\n* Small early mammals darting between the giant feet\n\nThe herd settles together as the ancient sun sets. §N1§ and §N2§ rest in the middle — warm, safe, surrounded by the sounds of their family.\n\nThey have eaten well. They have stayed safe in the herd. A wonderful night in the Late Cretaceous.\n\n✅ Food eaten: Conifer shoots, Flowering plants\n⚠️ Predator outrun: T. rex\n👀 Animals seen: Triceratops, Ankylosaurus, Pterosaurs\n\nGoodnight, saurolophuses. 🌙", "stegosaurus": "Late Jurassic floodplains hummed with ancient life. Giant conifers and tree ferns stretched to the horizon. A warm wind moved through the enormous fronds.\n\nTwo stegosauruses graze slowly through the fern meadow, their extraordinary back plates catching the last light of evening.\n\nTheir plates are remarkable — seventeen large diamond shapes running from neck to tail, laced with blood vessels. As the air cools the plates absorb heat. As danger approaches, they may flush with colour.\n\nBefore moving further they check their surroundings carefully.\n\nAn allosaurus has been watching from the tree line since midday. §N1§ and §N2§ are aware of it. They keep their tails ready — those four long spikes known as the thagomizer, capable of driving straight through the leg of any predator.\n\nTonight is about exploring a new section of the floodplain.\n\n§N1§ moves to a rich patch of low ferns and grazes steadily, their small beak perfect for cropping plants close to the ground.\n§N2§ finds a dense stand of horsetails near the riverbank and eats contentedly.\nThey move slowly together, eating as they go, their spiked tails swaying gently.\n\nThe allosaurus makes its move — rushing from the trees at full speed.\n§N1§ swings the thagomizer in a powerful arc. One spike connects with the allosaurus's shin with a crack that echoes across the plain.\nThe allosaurus stumbles and backs away, reassessing.\nIt circles at a safer distance for a while, then disappears back into the trees.\nThe thagomizer has done its job.\n\nThey continue their exploration as the Jurassic evening settles around them.\n\nAlong the way they see:\n* Brachiosaurus reaching high into the treetops\n* Diplodocus at the river's edge\n* Pterosaurs gliding on the last thermals\n* Camptosaurus grazing in a clearing\n* Ancient dragonflies over the water\n\nAs the ancient stars appear §N1§ and §N2§ find a sheltered spot between two giant tree ferns.\nThey rest together, their plates slowly cooling in the evening air.\n\nThey have explored somewhere new. They have defended themselves bravely. A perfect night.\n\n✅ Food eaten: Ferns, Horsetails\n⚠️ Predator driven off: Allosaurus\n👀 Animals seen: Brachiosaurus, Diplodocus, Pterosaurs\n\nGoodnight, stegosauruses. 🌙", "pachycephalosaurus": "Late Cretaceous uplands rose above the floodplain forests. Rocky ridges and open shrubland stretched across the high ground. The air was cooler here, and clearer.\n\nTwo pachycephalosauruses move along a rocky ridge, their extraordinary domed skulls catching the late light.\n\nThose domes are ten inches of solid bone — thicker than any other bone in the animal kingdom. They have been tested against rivals. They have won.\n\nBefore going far they scan the ridgeline carefully.\n\nAn albertosaurus has been seen hunting these uplands. §N1§ and §N2§ stay on the higher ground where the open terrain gives them a clear view in every direction.\n\nTonight §N1§ and §N2§ are making a new friend — a curious exploration of their upland territory.\n\n§N1§ spots a small lizard basking on a warm rock and catches it in a quick strike — a welcome protein snack.\n§N2§ finds a patch of ancient seeds and fruiting plants and eats eagerly.\nAs they move through the shrubland §N1§ notices another pachycephalosaurus on the far side of the ridge — a stranger.\n\nThey approach slowly, neither threatening. The stranger watches them.\n§N1§ lowers their dome — not a challenge, just a show. The stranger does the same.\nFor a while the three of them graze together on the same ridge, a small temporary group.\nWhen the stranger moves on, §N1§ and §N2§ watch it go.\n\nThen — the albertosaurus appears below on the slope. It spots them.\n§N1§ and §N2§ run for the steeper rocky section where the footing is difficult for a larger predator.\nThe albertosaurus follows for a while, then gives up on the rough terrain.\n\nThey settle on a high ledge as the ancient night comes in.\n\nAlong the way they see:\n* Albertosaurus disappearing into the valley\n* Triceratops on the floodplain far below\n* Pterosaurs riding thermals over the ridge\n* Small early mammals at the rock edges\n* Edmontosaurus in the distant valley\n\nThe prehistoric stars blaze overhead. The uplands are quiet and cool.\n\nThey have eaten. They have made a brief new acquaintance. They have stayed safe on their rocky high ground.\n\n✅ Food eaten: Small lizard, Seeds and fruit\n⚠️ Predator outrun: Albertosaurus\n👀 New friend: Another Pachycephalosaurus\n\nGoodnight, pachycephalosauruses. 🌙", "parasaurolophus": "Late Cretaceous forests rang with sound. Deep booming calls echoed from crest to crest across the wide river valleys. Parasaurolophus herds were never quiet — their hollow crests made sure of that.\n\nTwo parasaurolophuses move through the ancient forest, their extraordinary crests raised and their calls bouncing back and forth between the trees.\n\nThose crests are hollow tubes — six feet long — that work like brass instruments. When air is pushed through them the sound that emerges is deep and resonant, carrying for miles. Every individual has a slightly different call. §N1§ knows §N2§'s voice as well as their own.\n\nBefore moving far they sound their contact calls and listen for the rest of the herd.\n\nA T. rex has been calling in the valley to the south — that deep territorial roar that means danger. The herd answers with alarm calls and moves north together, §N1§ and §N2§ near the centre.\n\nTonight they are exploring the northern forest where new plants have begun to grow.\n\n§N1§ finds a stand of pine trees and pulls mouthfuls of needles and young shoots with a wide sweeping bite.\n§N2§ discovers something new — a flowering shrub, one of the new plants that have been appearing across the Late Cretaceous world. The flowers are sweet. §N2§ calls to §N1§ and they both eat from it eagerly.\n\nThe T. rex appears at the forest edge behind them — it has followed the herd north.\nThe alarm call goes up — that deep foghorn boom from a dozen crests simultaneously, each one slightly different, combining into an extraordinary chorus.\nThe herd surges forward through the trees. §N1§ and §N2§ run with it.\nThe T. rex chases for a while but cannot keep up through the dense forest.\n\nThey slow and regroup, calling softly to confirm everyone is safe.\n\nAlong the way they see:\n* T. rex falling behind in the trees\n* Triceratops near the forest edge\n* Pterosaurs in the high branches\n* Ankylosaurus in the undergrowth below\n* Small early mammals watching from the roots\n\nAs the ancient forest darkens §N1§ and §N2§ settle in the middle of the resting herd.\nThe soft contact calls of the crests murmur around them as the herd settles for the night.\n\nThey have eaten well. They have sounded the alarm and kept the herd safe. A remarkable night.\n\n✅ Food eaten: Pine shoots, Flowering shrubs\n⚠️ Predator outrun: T. rex\n👀 Animals seen: Triceratops, Pterosaurs, Ankylosaurus\n\nGoodnight, parasaurolophuses. 🌙", "allosaurus": "Late Jurassic floodplains stretched wide and hot under an ancient sky. Giant conifers lined the rivers. Enormous sauropods moved across the plain like slow mountains.\n\nTwo allosauruses move through the tree line at the floodplain's edge, reading the wind with every step.\n\nThey are the apex predator of this world — the T. rex of the Jurassic, thirty million years before T. rex existed. They are thirty feet of muscle and serrated teeth and predatory intelligence.\n\nBefore moving far they circle the area to check for rivals.\n\nAnother allosaurus — a larger one — has been in this territory. Its scent marks are on the boundary trees. §N1§ and §N2§ move carefully, staying in their own hunting ground.\n\nTonight they are hunting together — a coordinated pursuit.\n\n§N1§ works upwind, driving a camptosaurus out of the undergrowth.\n§N2§ is waiting on the other side, perfectly positioned.\nThe camptosaurus runs directly toward §N2§ and the catch is clean and fast.\n§N1§ arrives and they eat together, tearing through the meal with their powerful jaws.\n\nA stegosaurus appears nearby — not prey, but a threat. That thagomizer has injured allosauruses before.\n§N1§ approaches too close and the stegosaurus swings its spiked tail with extraordinary force.\n§N1§ leaps back just in time — the spikes pass inches away.\nThey give the stegosaurus a wide berth and return to their meal.\n\nAs they eat they survey their ancient Jurassic world.\n\nAlong the way they see:\n* Stegosaurus grazing at a respectful distance\n* Brachiosaurus reaching into the high canopy\n* Diplodocus at the river's edge\n* Pterosaurs circling overhead\n* Small early mammals darting through the roots below\n\nAs the Jurassic night comes in §N1§ and §N2§ find a sheltered spot at the forest edge.\nThey rest with the confidence of animals at the very top of the food chain.\n\nThey have hunted brilliantly together. They have respected the stegosaurus's defences. A successful night.\n\n✅ Food eaten: Camptosaurus\n⚠️ Danger respected: Stegosaurus thagomizer\n👀 Animals seen: Brachiosaurus, Diplodocus, Pterosaurs\n\nGoodnight, allosauruses. 🌙", "iguanodon": "Early Cretaceous forests were ancient and dense. Giant ferns and conifers towered overhead. Rivers ran wide and brown through the floodplains between them.\n\nTwo iguanodons move through the fern forest, switching between walking on all fours and rising up on two legs to reach the higher branches.\n\nTheir hands are remarkable — three middle fingers joined into a hoof-like pad for walking, an outer finger that can grip, and a large thumb spike on each hand. That spike is a serious weapon.\n\nBefore going far they check the riverbank carefully.\n\nA baryonyx — that fish-eating theropod with the long snout — has been hunting this stretch of river and may be interested in more than fish. §N1§ and §N2§ keep away from the water's edge.\n\nTonight is a nest-building night — they have found the perfect sheltered spot.\n\n§N1§ begins gathering large fern fronds and piling them into a shallow depression between two ancient tree roots.\n§N2§ searches for softer material — mosses, cycad leaves, anything that will make the nest warm and cushioned.\nThey work together for a long time, arranging and rearranging, until the nest feels exactly right.\nAlong the way they both find patches of horsetails and cycads to eat.\n\nThe baryonyx finds them at the nest site — drawn by smell and curiosity.\nIt approaches on two legs, its long jaws open, testing their resolve.\n§N1§ rises to full height — nearly fifteen feet — and presents both thumb spikes outward.\nThe baryonyx stops, considers, and decides a pair of large iguanodons defending a nest is more trouble than it wants.\nIt turns and moves back toward the river.\nThe nest is safe.\n\nThey settle into their finished nest and watch the Early Cretaceous evening around them.\n\nAlong the way they see:\n* Baryonyx disappearing toward the river\n* Polacanthus — a spiny armoured dinosaur — in the undergrowth\n* Pterosaurs gliding over the treetops\n* Early crocodilians on the far riverbank\n* Small mammals in the tree roots\n\n§N1§ and §N2§ settle into their carefully built nest as the ancient forest darkens around them.\nIt is perfect. Warm and hidden and safe.\n\nThey have built their nest. They have defended it. They are home.\n\n✅ Food eaten: Horsetails, Cycad leaves\n⚠️ Predator driven off: Baryonyx\n👀 Animals seen: Polacanthus, Pterosaurs, Early crocodilians\n\nGoodnight, iguanodons. 🌙", "supersaurus": "Late Jurassic floodplains hummed with ancient life beneath a warm hazy sky. Giant conifers reached a hundred feet into the air. The ground shook faintly — a sound and feeling that grew steadily stronger.\n\nTwo supersauruses moved through the ancient forest. Each footstep sent ripples through puddles thirty feet away. Their necks rose forty feet above the ground — higher than any other creature alive. They were among the largest animals that would ever walk the Earth.\n\nBefore moving far they swept their enormous necks in slow arcs, reading the treetops and the horizon simultaneously.\n\nAn allosaurus pack had been in the valley since morning — they could hear the distant calls. Allosauruses sometimes tried to separate young supersauruses from adults. §N1§ and §N2§ stayed close together, their sheer size the best protection possible.\n\nTonight they were getting dinner in the highest canopy — food no other dinosaur could reach.\n\n§N1§ stretched their neck upward into the crown of the tallest conifer in the forest — sixty feet above the ground — and stripped an enormous mouthful of fresh green shoots.\n§N2§ moved to a neighbouring tree and fed from its crown with the same unhurried ease, pausing only to chew with the wide flat teeth designed for this exact purpose.\nThey worked slowly through the forest canopy, eating from treetops the way other dinosaurs ate from the ground.\n\nThe allosaurus pack found them — four animals, working together, circling the two giants.\n§N1§ turned to face them, full height, full length. One hundred and ten feet of dinosaur, regarding the allosauruses with calm ancient eyes.\n§N2§ positioned alongside. Side by side they were simply too much — too large, too aware, offering no exposed flank.\nThe pack circled for a long time, looking for weakness, finding none. Eventually they moved away toward smaller prey.\n\nAs the Jurassic evening settled they continued their slow passage through the forest canopy.\n\nAlong the way they see:\n* Allosaurus pack retreating into the trees\n* Stegosaurus grazing far below their feet\n* Diplodocus at the distant river's edge\n* Pterosaurs — tiny against their necks — gliding past\n* Small early mammals scattering from their footfalls\n\nAs the ancient stars appeared §N1§ and §N2§ slowed and rested, their great necks lowering slightly.\nThe forest was quiet around two of the largest creatures the world would ever know.\n\nThey have eaten from the very tops of the tallest trees. They have faced down predators with calm certainty. A peaceful night for the giants of the Jurassic.\n\n✅ Food eaten: Conifer shoots, Fern fronds\n⚠️ Predator faced down: Allosaurus pack\n👀 Animals seen: Stegosaurus, Diplodocus, Pterosaurs\n\nGoodnight, supersauruses. 🌙", "edmontosaurus": "Late Cretaceous coastal forests stretched to the sea. Magnolias and ancient pines grew beside wide shallow rivers. The smell of salt water drifted in on the evening breeze.\n\nTwo edmontosauruses moved along the forest edge, their wide duck-like bills sweeping through the low vegetation. They were large — forty feet long and four tonnes — but they wore their size lightly, moving with surprising grace.\n\nBefore going far they lifted their heads and scanned the tree line carefully.\n\nA T. rex had been hunting this coastline for three days. They had seen its tracks at the river crossing this morning — those enormous three-toed prints, each one bigger than a dining table. §N1§ and §N2§ moved inland slightly, away from the open ground where the T. rex preferred to hunt.\n\nTonight they were exploring the new coastal forest — plants here were richer and more varied than inland.\n\n§N1§ found a stand of magnolia trees — those flowering plants that had spread across the Late Cretaceous world — and stripped the broad leaves with steady sweeping bites.\n§N2§ found a pine grove with low hanging branches and worked through them efficiently, hundreds of small packed teeth grinding every mouthful to paste.\nThey ate side by side, unhurried, tasting the salt in the coastal air.\n\nThen the T. rex appeared from the tree line — closer than expected, having approached downwind.\nIt moved fast for something so large, covering ground with thunderous strides.\n§N1§ and §N2§ broke into a run — not their fastest, but steady and sustained, heading for the dense coastal forest where the trees grew close together.\nThe T. rex was powerful but not nimble. It crashed through the outer trees and slowed.\nThey pushed deeper, zigzagging through the trunks until the footsteps behind them faded.\n\nThey stopped and listened. Silence. Safe.\n\nThey settled in the dense coastal forest and watched the prehistoric evening.\n\nAlong the way they see:\n* T. rex moving away along the coastline\n* Triceratops grazing in a forest clearing\n* Ankylosaurus moving slowly through the undergrowth\n* Pterosaurs roosting in the high branches\n* Small early mammals emerging for the night\n\nThe salt breeze moved through the ancient coastal trees as §N1§ and §N2§ rested together.\nSomewhere out in the darkness the sea moved against a prehistoric shore.\n\nThey have eaten from the rich coastal forest. They have outrun the T. rex. Another night survived in the Late Cretaceous.\n\n✅ Food eaten: Magnolia leaves, Pine branches\n⚠️ Predator outrun: T. rex\n👀 Animals seen: Triceratops, Ankylosaurus, Pterosaurs\n\nGoodnight, edmontosauruses. 🌙", "kangaroo": "The Australian outback stretched to every horizon in the warm evening air. Red dust drifted on the breeze. The last light of the sun turned the dry grass to copper and gold.\n\nTwo red kangaroos moved across the open plain with their mob — a group of twenty animals, their long tails swinging with each bound.\n\nBefore moving far §N1§ stood tall on his hind legs and scanned the plain in every direction. At six feet, he could see a long way.\n\nA dingo pack had been following the mob since sundown — five animals working the edges, looking for a joey separated from its mother. §N1§ and §N2§ moved toward the mob's centre and kept the youngest animals surrounded.\n\nTonight was about exploring new grazing ground — the mob had moved two miles north where rain had fallen last week.\n\n§N1§ dropped to all fours and grazed on the fresh green shoots that had sprung up after the rain — the finest grass in weeks.\n§N2§ found a low shrub with new leaves and stripped them efficiently with strong front teeth.\nThey grazed steadily in the warm evening, the mob spread around them in every direction.\n\nThe dingo pack made its move — rushing the mob from the south.\nThe mob bounded away immediately, those powerful hind legs covering twenty-five feet in a single leap.\n§N1§ turned and kicked hard at the lead dingo — a kangaroo's kick can break bones — and the dingo veered away.\nThe mob scattered and regrouped two hundred metres north, every animal accounted for.\n\nAs the outback darkened they settled back into grazing, the dingoes gone.\n\nAlong the way they see:\n* Emus striding across the plain\n* Wedge-tailed eagle circling high above\n* Wombats emerging from their burrows\n* Wallabies grazing at the plain's edge\n* Bats beginning their nightly hunt overhead\n\nAs the stars blazed above the outback, the mob settled together in the warm darkness.\n§N1§ and §N2§ rested side by side, tails stretched out behind them.\n\nThey have eaten well on fresh rain grass. They have protected the mob. Another night safe on the Australian plain.\n\n✅ Food eaten: Fresh grass shoots, New leaves\n⚠️ Predator driven off: Dingo pack\n👀 Animals seen: Emus, Wedge-tailed eagle, Wombats\n\nGoodnight, kangaroos. 🌙", "koala": "The eucalyptus forest was still and warm in the Australian evening. The leaves of the gum trees caught the last light and turned silver. The air was full of the sharp medicinal smell of eucalyptus oil.\n\nTwo koalas rested in the fork of a tall grey gum tree, their round ears turning slowly at the sounds of the forest below.\n\nBefore moving, §N1§ sniffed the branch carefully. Koalas have an extraordinary sense of smell — they can detect the exact chemical composition of each eucalyptus leaf and know which ones are safe to eat and which contain too much poison tonight.\n\nA powerful owl had been calling from the far end of the grove since dusk. §N1§ and §N2§ moved higher into the canopy, out of the owl's easy reach.\n\nTonight was a nest-building night — they would find the perfect fork and settle in properly.\n\n§N1§ moved along three different branches before finding the ideal fork — deep, wide, perfectly angled to be comfortable for a long sleep.\n§N2§ chose a nearby fork in the same tree and settled in, gripping the branch with two thumbs on each hand.\nBetween settling, they both reached for the nearest leaves and began to eat — slowly, methodically, choosing only the freshest shoots.\n\nThe python appeared on the branch below — an amethystine python, large and patient, moving upward.\n§N1§ gave the deep grunting bellow that koalas use as an alarm — a sound surprisingly loud for such a peaceful animal.\n§N2§ moved to a thinner outer branch where the python's weight would be a problem.\nThe python reached the fork, assessed the situation, and turned back down. The outer branches were not worth the risk.\n\nThey settled back into their chosen forks and watched the eucalyptus forest grow dark.\n\nAlong the way they see:\n* Powerful owl gliding silently between trees\n* Possums emerging to feed in the canopy\n* Sugar gliders launching between the high branches\n* A python moving away below\n* Flying foxes passing overhead in the dark\n\nThe forest was quiet and still. §N1§ and §N2§ settled deep into their forks and let sleep come.\nThey would sleep for twenty hours. The eucalyptus leaves demanded it.\n\nThey have found perfect resting forks. They have eaten their careful meal of leaves. A peaceful koala night.\n\n✅ Food eaten: Fresh eucalyptus leaves, New gum shoots\n⚠️ Predator avoided: Amethystine python\n👀 Animals seen: Powerful owl, Possums, Sugar gliders\n\nGoodnight, koalas. 🌙", "tasmanian_devil": "The Tasmanian bush at night was dense and dark. Ferns pressed in from every side. A thin moon gave just enough light to move by.\n\nTwo Tasmanian devils moved through the undergrowth with the purposeful trot that could cover miles in a night. Their ears flushed red — the blood rushing to the surface as they warmed up and grew excited by the night's smells.\n\nBefore going far §N1§ lifted their nose and pulled in a long breath. Their sense of smell was extraordinary. Somewhere ahead — carrion. Something large had died recently. They turned toward it.\n\nA wedge-tailed eagle had already found the carcass and was feeding. It was large and territorial. §N1§ and §N2§ approached carefully, low to the ground.\n\nTonight was a dinner night — and Tasmanian devils ate everything.\n\n§N1§ approached the carcass confidently, giving the devil scream — that blood-curdling shriek that carried through the whole bush.\nThe eagle spread its wings in threat display but §N1§ didn't flinch. The scream came again, louder.\nThe eagle lifted off and perched in a nearby tree, watching.\n§N1§ and §N2§ settled in and began to eat with the most powerful jaws of any mammal their size — crunching straight through bone, consuming fur, hooves, everything.\nNothing was left behind.\n\nAs they finished another devil appeared from the undergrowth — drawn by the smell and the noise.\nThe three of them screamed at each other in the darkness, a sound that would terrify anyone who didn't know what it was.\nThe newcomer grabbed what scraps remained and retreated. §N1§ and §N2§ had eaten the best of it.\n\nThey moved on through the night bush, alert for more.\n\nAlong the way they see:\n* Wedge-tailed eagle watching from above\n* Wallabies moving away as they approach\n* Possums freezing on branches overhead\n* Quolls — smaller carnivorous marsupials — in the undergrowth\n* Bandicoots rooting through the leaf litter\n\nAs the Tasmanian night deepened §N1§ and §N2§ found a hollow log and pressed inside together.\nFull — completely, extraordinarily full — they slept.\n\nThey have eaten magnificently. They have claimed their meal. A perfect devil night.\n\n✅ Food eaten: A full carcass — bones and all\n⚠️ Rival driven off: Wedge-tailed eagle\n👀 Animals seen: Wallabies, Possums, Quolls\n\nGoodnight, Tasmanian devils. 🌙", "fire_hawk": "The Australian savanna was dry and vast under a wide afternoon sky. To the south a thin line of smoke rose on the horizon — a grass fire moving slowly across the plain.\n\nTwo fire hawks circled high on the thermal above the smoke, their sharp eyes reading every movement on the ground below.\n\nThis was the moment they had been waiting for. Where there was fire, there was prey — insects, lizards and small mammals fleeing the flames in their thousands.\n\n§N1§ watched another fire hawk below — already working the fire's edge, diving repeatedly into the smoke.\n§N2§ spotted a burning stick at the fire line — a branch the size of an arm, one end glowing.\n§N2§ dropped, gripped the cool end in sharp talons, and lifted back into the air.\n\nThey flew together across the firebreak — away from the main blaze to a patch of unburnt grass a quarter mile ahead.\n§N2§ dropped the burning stick into the dry grass. It caught immediately.\nA new fire began to spread — and with it, a new wave of fleeing creatures.\n\n§N1§ and §N2§ worked the new fire's edge together, diving and striking at the panicking insects and lizards streaming from the advancing flames.\n§N1§ caught a large grasshopper, a lizard, and then a small mouse in quick succession.\n§N2§ found a frog leaping desperately through the smoke and took it cleanly.\nThey ate on the wing, barely pausing between strikes.\n\nA wedge-tailed eagle arrived — Australia's largest bird of prey, also drawn by the fire.\nIt was much larger than either of them and claimed the best hunting position at the fire's centre.\n§N1§ and §N2§ moved to the fire's far edge where there was plenty of prey and no competition.\n\nAs the fire burned lower they perched on a dead tree at the plain's edge to rest.\n\nAlong the way they see:\n* Wedge-tailed eagle dominating the fire centre\n* Kangaroos bounding away from the smoke\n* Monitor lizards sprinting through the ash\n* Kookaburras also hunting the fire's edge\n* Dingoes working the plain beyond the flames\n\nThe smoke drifted across the wide Australian sky as the savanna cooled.\n§N1§ and §N2§ preened their feathers and watched the last glow of the fire.\n\nThey have used fire itself as a hunting tool. They have eaten well. A remarkable fire hawk night.\n\n✅ Food eaten: Grasshopper, Lizard, Small mouse\n⚠️ Rival avoided: Wedge-tailed eagle\n👀 Animals seen: Kangaroos, Monitor lizards, Kookaburras\n\nGoodnight, fire hawks. 🌙", "tree_kangaroo": "The tropical rainforest of North Queensland was warm and dripping after afternoon rain. Every leaf held water. The canopy was a dense green world sixty feet above the forest floor.\n\nTwo tree kangaroos moved through it with surprising ease — those stocky, powerful bodies designed for exactly this, their long claws gripping each branch with complete certainty.\n\nThey were unlike any other kangaroo. Where their ground-dwelling cousins could only hop forward, tree kangaroos could move each back leg independently — climbing, descending, moving through the trees with the confidence of animals born to it.\n\nBefore moving far §N1§ checked the branch above — an amethystine python sometimes rested in this section of the canopy, perfectly still and perfectly dangerous.\n\nThe branch was clear. They moved on.\n\nTonight §N1§ and §N2§ were making a friend — exploring the edges of their territory where it met another tree kangaroo's range.\n\n§N1§ found a fig tree loaded with ripe fruit and began to eat — sitting upright on a broad branch, holding the fruit in both forepaws like hands, eating with clear enjoyment.\n§N2§ found a patch of large leaves on the same tree and ate steadily alongside.\n\nA cassowary appeared far below on the forest floor — that enormous flightless bird, its blue head and red wattles vivid in the green undergrowth. It looked up at them briefly, decided they were of no interest, and moved on.\n\nThen, from a neighbouring tree, another tree kangaroo appeared — watching them from thirty feet away.\n§N1§ made a soft chirping call. The stranger chirped back. Neither moved aggressively.\nThey watched each other across the gap between the trees for a long time.\nEventually the stranger turned and moved deeper into its own territory.\nA quiet acknowledgement between two solitary animals sharing the same forest.\n\nThey continued to move through the dripping canopy as the rainforest night came in.\n\nAlong the way they see:\n* Cassowary moving through the undergrowth below\n* Amethystine python coiled on a distant branch\n* Flying foxes launching into the evening sky\n* Possums emerging from their daytime hollows\n* Musky rat-kangaroos on the forest floor far below\n\nAs the rainforest darkened §N1§ and §N2§ settled into the dense crown of a tall fig tree.\nThe canopy held them safely sixty feet above the world.\n\nThey have eaten ripe fruit in the treetops. They have met their neighbour peacefully. A good tree kangaroo night.\n\n✅ Food eaten: Ripe figs, Large leaves\n⚠️ Predator checked: Amethystine python (not present tonight)\n👀 New friend: Neighbouring tree kangaroo\n\nGoodnight, tree kangaroos. 🌙", "wombat": "The south-eastern Australian grassland was cool and dark. Dew was already forming on the dry grass. Stars blazed overhead in a sky undimmed by any city light.\n\nTwo wombats emerged from their burrow just after dark — sniffing the entrance carefully before fully coming out, then waddling into the night with the determined energy of animals who had been sleeping all day and had serious business to attend to.\n\nTheir burrow was a masterpiece — twelve metres long, dug through solid clay with their powerful front claws, reinforced over many years. Their backwards-facing pouch had kept every particle of dirt away from their young while they dug. Tonight they were expanding it further.\n\nBefore grazing far §N1§ checked the air carefully. A dingo had been marking the boundary of their territory.\n\n§N1§ moved deliberately to the dingo's scent mark and placed their own scent over it — a cube-shaped dropping, precisely deposited. The only cube-shaped droppings on Earth. Unmistakably theirs.\n\nTonight they were getting dinner first, then back to digging.\n\n§N1§ found a patch of fresh grass shoots near the creek and cropped them close to the ground with strong teeth.\n§N2§ dug up some roots near the old gum tree — wombats could locate roots by smell through several inches of soil.\nThey grazed together in the cool darkness, unhurried.\n\nThe dingo appeared at the grassland's edge — following the trail of scent marks with its nose down.\n§N1§ moved back toward the burrow entrance without hurrying. No panic. Just steady movement toward safety.\nAt the burrow entrance §N1§ turned and backed in — presenting the cartilage rump that no dingo jaw could penetrate.\nThe dingo investigated the entrance, found only a wall of tough rump, and moved away.\n§N2§ had used a second entrance and was already safe inside.\n\nThey met underground and settled into the expansion project — digging deeper into the soft earth, their claws moving with practiced efficiency.\n\nAlong the way they see:\n* Dingo moving away across the grassland\n* Kangaroos grazing in the moonlight\n* Echidna shuffling through the leaf litter\n* Possums in the gum trees above\n* An owl hunting the open grassland\n\nAs the night passed they dug, rested, dug again. The burrow grew longer.\nBefore dawn they settled into the deepest chamber — warm, dark, perfectly made.\n\nThey have eaten. They have expanded their home. They have outwitted the dingo. A very productive wombat night.\n\n✅ Food eaten: Grass shoots, Roots\n⚠️ Predator blocked: Dingo\n👀 Animals seen: Kangaroos, Echidna, Possums\n\nGoodnight, wombats. 🌙", "kookaburra": "The Australian woodland was waking up. The first grey light of dawn appeared above the gum trees. And then — splitting the silence completely — the kookaburra call rang out.\n\nIt started with a low chuckle, built to a full rolling cackle, and climbed to a shrieking laugh that carried for a mile through the bush. §N1§ threw their head back and called from the topmost branch of the tallest dead tree in the territory. §N2§ joined in from nearby. The whole woodland echoed.\n\nThis was the morning announcement: we are here, this is our territory, all rivals take note.\n\nBefore hunting §N1§ surveyed the ground below with extraordinary eyes — eyes that could spot movement in the grass from thirty metres up.\n\nA large goanna was moving along the dry creek bed — that monitor lizard, muscular and alert. Too large to hunt. But its movement was disturbing the grass and flushing smaller things.\n\nTonight — this morning — was a hunting dawn.\n\n§N1§ spotted a brown snake moving through the grass near the creek bank. A large one.\n§N1§ dropped from the branch in a fast controlled dive, hit the snake just behind the head and was back in the air in one second — the snake gripped firmly crosswise in the beak.\nBack on the branch, §N1§ beat the snake against the wood repeatedly until it was still. Then swallowed it headfirst.\n§N2§ found a large lizard on a warm rock below and took it with equal efficiency, smashing it against the branch before eating.\n\nA peregrine falcon appeared above the canopy — that fast, high-flying predator that occasionally targeted medium-sized birds.\n§N1§ and §N2§ dropped into the dense canopy immediately and pressed against a thick fork.\nThe falcon circled twice, saw nothing useful, and moved on.\n\nThey returned to their hunting perches as the Australian morning brightened.\n\nAlong the way they see:\n* Goanna moving through the creek bed below\n* Kangaroos beginning their morning grazing\n* Koala sleeping in a fork nearby\n* Blue-tongue lizard on a warm rock\n* Echidna shuffling through the leaf litter\n\nAs the morning sun warmed the gum trees §N1§ and §N2§ settled into a comfortable fork together.\nTheir territory was announced. Their bellies were full. The Australian day was beginning.\n\nThey have hunted brilliantly at dawn. They have stayed safe from the falcon. A perfect kookaburra morning.\n\n✅ Food eaten: Brown snake, Large lizard\n⚠️ Predator avoided: Peregrine falcon\n👀 Animals seen: Goanna, Kangaroos, Koala\n\nGoodnight, kookaburras. 🌙", "echidna": "The Australian forest edge was quiet and cool. A light wind moved through the she-oaks and dry grass. The night smelled of earth and bark and the faint sharp tang of ant nests.\n\nTwo echidnas shuffled along the forest floor — that rolling, purposeful gait, their spines catching the moonlight, their long sensitive snouts testing the ground with every step.\n\nThey were ancient animals — their design almost unchanged for millions of years. Egg-laying mammals, living in the cracks between what mammals were and what reptiles had been. Tonight they had work to do.\n\nBefore moving far §N1§ pressed their snout to the soil and listened — actually listened through the earth itself, detecting the faint electrical signals of insects moving underground.\n\nA dingo had been through recently — its tracks and scent were clear. §N1§ and §N2§ were not particularly worried. They had a response to dingoes.\n\nTonight was about finding the best dinner — ants, and plenty of them.\n\n§N1§ found the termite mound by electrical detection alone and began to dig with powerful curved claws, opening the mound with six efficient strokes.\nThe tongue appeared — seven inches of it, coated in sticky saliva, flicking in and out a hundred times per minute.\nTermites stuck to it in their hundreds. §N1§ ate steadily, methodically working deeper into the mound.\n§N2§ found a large ant nest under a flat rock nearby and used the same technique — tongue a blur, thousands of ants consumed per minute.\n\nThe dingo found them. It circled, sniffed, moved closer.\n§N1§ dug straight down — not away, but down — vanishing into the soil in under a minute, only a circle of spines visible at the surface.\n§N2§ curled into a perfect ball of spines — every inch of the outside a spike, nothing soft accessible.\nThe dingo nosed the spines, flinched, and walked away with a hurt expression.\n\nWhen the dingo was gone they uncurled and continued eating.\n\nAlong the way they see:\n* Dingo moving away into the darkness\n* Wallabies grazing in the clearing\n* Possums in the trees above\n* Wombat emerging from its burrow nearby\n* Bats hunting insects overhead\n\nAs the forest cooled toward morning §N1§ and §N2§ found a sheltered spot under a rock overhang.\nThey pressed together — two balls of spines — and slept.\n\nThey have eaten thousands of termites and ants. They have defeated the dingo without even fighting. A classic echidna night.\n\n✅ Food eaten: Termites, Ants\n⚠️ Predator defeated: Dingo (spines worked perfectly!)\n👀 Animals seen: Wallabies, Possums, Wombat\n\nGoodnight, echidnas. 🌙"}};
const {categories:C,animals:A,stories:S}=D;
let st={pg:"home",cat:null,ak:null,n1:"Carson",n2:"Avery",chunks:[],idx:0,typed:"",typing:false,tm:null};
function gc(k){return C.find(c=>c.key===k)}
function ga(c){return Object.entries(A).filter(([,a])=>a.category===c).map(([k,a])=>({key:k,...a}))}
function story(k,n1,n2){return(S[k]||"Goodnight 🌙").replace(/§N1§/g,n1).replace(/§N2§/g,n2)}
function chunks(t){const s=[];let c="";for(let i=0;i<t.length;i++){c+=t[i];if(".!?".includes(t[i])&&c.trim().length>20){s.push(c.trim());c="";}}if(c.trim())s.push(c.trim());if(!s.length)return[t];const n=Math.min(5,s.length);const z=Math.ceil(s.length/n);const o=[];for(let i=0;i<s.length;i+=z)o.push(s.slice(i,i+z).join(" "));return o;}
function set(p){Object.assign(st,p);draw();}
window.home=()=>set({pg:"home",cat:null,ak:null});
window.cat=(k)=>set({pg:"cat",cat:k});
window.info=(k)=>set({pg:"info",ak:k});
window.begin=()=>{const n1=document.getElementById("n1").value||"Carson";const n2=document.getElementById("n2").value||"Avery";const ch=chunks(story(st.ak,n1,n2));set({pg:"story",n1,n2,chunks:ch,idx:0,typed:"",typing:false});setTimeout(()=>type(0),30);};
window.skip=()=>{clearInterval(st.tm);state_typed(st.chunks[st.idx]||"");st.typing=false;st.tm=null;doBtns();};
window.next=()=>type(st.idx+1);
window.again=()=>type(0);
function state_typed(t){st.typed=t;const el=document.getElementById("tt");if(el)el.textContent=t;}
function type(i){clearInterval(st.tm);st.idx=i;st.typed="";st.typing=true;draw();setTimeout(()=>{const t=st.chunks[i]||"";let j=0;st.tm=setInterval(()=>{j++;st.typed=t.slice(0,j);const el=document.getElementById("tt");if(el)el.textContent=st.typed;if(j>=t.length){clearInterval(st.tm);st.tm=null;st.typing=false;doBtns();}},20);},30);}
function doBtns(){const el=document.getElementById("sb");if(!el)return;const ac=A[st.ak].accent;const done=!st.typing&&st.idx===st.chunks.length-1;if(st.typing)el.innerHTML=b("Skip →","skip()",ac);else if(done)el.innerHTML="<div style='text-align:center;font-size:20px;margin-bottom:10px'>🌙 Sweet dreams!</div>"+b("Read Again","again()",ac)+b("Choose Another","home()",ac);else el.innerHTML=b("Continue →","next()",ac);}
function b(t,oc,c){return`<button onclick="${oc}" style="width:100%;display:block;margin-bottom:8px;padding:13px;border-radius:12px;color:#fff;font-size:15px;background:linear-gradient(135deg,${c}33,${c}55);border:1px solid ${c}77">${t}</button>`;}

  }
  if(pg==="cat"&&ci){
    el.innerHTML=`<div class="s"><button onclick="home()" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button><div style="text-align:center;margin-bottom:18px"><div style="font-size:38px">${ci.emoji}</div><h2 style="color:${ci.color};margin:6px 0">${ci.label}</h2></div><div class="g2">${ga(cat).map(a=>`<button onclick="info('${a.key}')" style="background:linear-gradient(135deg,${a.accent}0a,${a.accent}20);border:1px solid ${a.accent}44;border-radius:12px;padding:14px 8px;text-align:center"><div style="font-size:30px">${a.emoji}</div><div style="font-size:12px;color:${a.accent};font-weight:bold;margin-top:5px">${a.name}</div></button>`).join("")}</div></div>`;
