  }
  if(pg==="info"&&an){
    const ac=an.accent;
    el.innerHTML=`<div class="s"><button onclick="cat('${ci.key}')" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button>
    <a href="https://www.google.com/search?q=${encodeURIComponent(an.name+' wildlife')}&tbm=isch" target="_blank" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;border-radius:14px;margin-bottom:14px;text-decoration:none;background:linear-gradient(135deg,${an.bg},${ac}22);border:1px solid ${ac}55">
      <div style="font-size:72px">${an.emoji}</div><div style="font-size:14px;color:${ac};font-weight:bold;margin-top:8px">${an.name}</div><div style="font-size:11px;color:${ac};opacity:.6;margin-top:4px">📷 tap for photos</div></a>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px;margin-bottom:10px">
      <div style="font-size:10px;color:${ac};font-weight:bold;margin-bottom:8px;text-transform:uppercase">Amazing Facts</div>
      ${an.facts.map(f=>`<div style="font-size:13px;color:rgba(255,255,255,.8);padding:3px 0">${f}</div>`).join("")}
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px;margin-bottom:10px">
      <div style="font-size:10px;color:${ac};font-weight:bold;margin-bottom:6px;text-transform:uppercase">🏠 Habitat</div>
      <div style="font-size:13px;color:rgba(255,255,255,.8)">${an.habitatEmoji} ${an.habitat}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px">
        <div style="font-size:10px;color:#f87171;font-weight:bold;margin-bottom:6px;text-transform:uppercase">⚠️ Predators</div>
        ${an.predators.map(p=>`<div style="font-size:12px;color:rgba(255,255,255,.7);padding:2px 0">${p}</div>`).join("")}
      </div>
      <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px">
        <div style="font-size:10px;color:#4ade80;font-weight:bold;margin-bottom:6px;text-transform:uppercase">🍖 Prey</div>
        ${an.prey.map(p=>`<div style="font-size:12px;color:rgba(255,255,255,.7);padding:2px 0">${p}</div>`).join("")}
      </div>
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}28;border-radius:14px;padding:12px;margin-bottom:14px">
      <div style="font-size:10px;color:${ac};font-weight:bold;margin-bottom:8px;text-transform:uppercase">Name Your Adventurers</div>
      <div class="g2">
        <input id="n1" placeholder="Carson" value="${st.n1}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
        <input id="n2" placeholder="Avery" value="${st.n2}" style="background:rgba(255,255,255,.07);border:1px solid ${ac}44;border-radius:8px;padding:9px 10px;color:#fff;font-size:13px;width:100%">
      </div>
    </div>
    <button onclick="begin()" style="width:100%;background:linear-gradient(135deg,${ac}33,${ac}55);border:1px solid ${ac}77;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:bold">✨ Begin the Adventure</button>
    </div>`;
    return;
  }
  if(pg==="story"&&an){
    const ac=an.accent;
    const pct=((st.idx+(st.typing?.5:1))/st.chunks.length)*100;
    el.innerHTML=`<div class="s"><button onclick="info('${an.key}')" style="background:none;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:14px;display:block;padding:0">← Back</button>
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:30px">${an.emoji}</div>
      <div style="background:rgba(255,255,255,.1);border-radius:99px;height:5px;margin:8px 0;overflow:hidden"><div style="height:100%;background:${ac};width:${pct}%;border-radius:99px"></div></div>
      <div style="font-size:10px;color:rgba(255,255,255,.35)">${st.idx+1} / ${st.chunks.length}</div>
      <button onclick="toggleVoice()" id="voiceBtn" style="margin-top:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;color:rgba(255,255,255,.7);font-size:13px;cursor:pointer">🔊 Read aloud</button>
    </div>
    <div style="background:rgba(255,255,255,.04);border:1px solid ${ac}33;border-radius:14px;padding:16px;min-height:150px;margin-bottom:14px;line-height:1.8">
      <span id="tt" style="color:rgba(255,255,255,.9);font-size:15px">${st.typed}</span>${st.typing?'<span style="opacity:.4">▋</span>':''}
    </div>
    <div id="sb"></div></div>`;
    doBtns();
    return;
  }
}
// ── VOICE ──
let voiceOn = false;
let voiceUtter = null;

function toggleVoice(){
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  if(voiceOn){
    if(btn) btn.textContent = '🔇 Stop reading';
    speakCurrent();
  } else {
    if(window.speechSynthesis) window.speechSynthesis.cancel();
    if(btn) btn.textContent = '🔊 Read aloud';
  }
}

function speakCurrent(){
  if(!voiceOn) return;
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const text = st.storyChunks[st.storyIdx] || '';
  voiceUtter = new SpeechSynthesisUtterance(text);
  voiceUtter.rate = 0.85;
  voiceUtter.pitch = 1.0;
  voiceUtter.volume = 1.0;
  // Try to use a good voice
  const voices = window.speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel') || v.lang === 'en-GB' || v.lang === 'en-US');
  if(preferred) voiceUtter.voice = preferred;
  window.speechSynthesis.speak(voiceUtter);
}

// Stop voice when leaving story screen
const origSet = set;
window.set = function(p){
  if(p.pg && p.pg !== 'story'){
    voiceOn = false;
    if(window.speechSynthesis) window.speechSynthesis.cancel();
  }
  origSet(p);
};

// Speak new chunk when story advances
const origNext = window.next;
window.next = function(){
  origNext();
  setTimeout(()=>{ if(voiceOn) speakCurrent(); }, 100);
};
const origAgain = window.again;
window.again = function(){
  origAgain();
  setTimeout(()=>{ if(voiceOn) speakCurrent(); }, 100);
};


draw();
</script></body></html>
